<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Japan 250</title>
<meta name="theme-color" content="#0B0907">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='13' fill='%230B0907'/%3E%3Crect x='3' y='3' width='58' height='58' rx='10' fill='none' stroke='%23E6BC66' stroke-width='2'/%3E%3Ctext x='32' y='45' font-size='38' text-anchor='middle' fill='%23E6BC66' font-family='serif'%3E宿%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0907;
  --card:#171310;
  --card-hi:#1F1A14;
  --ink:#F3EDDE;
  --ink-soft:#C2B8A2;
  --ink-faint:#8A8172;
  --gold:#E6BC66;
  --gold-deep:#C99F49;
  --shu:#E2795B;
  --band-s:#E6BC66;
  --band-a:#82C3AE;
  --band-b:#9FADD2;
  --band-c:#8A8378;
  --line:#2B251D;
  --chip:#221C14;
  --chip-line:#41392B;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Noto Sans TC',sans-serif;
  font-size:14px;
  line-height:1.6;
}
::selection{background:var(--gold);color:var(--bg);}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px 80px;}

/* ---------- header ---------- */
header{padding:38px 0 14px;position:relative;}
.eyebrow{
  font-family:'Shippori Mincho',serif;
  letter-spacing:.5em;
  font-size:12px;
  color:var(--gold);
  margin-bottom:12px;
}
h1{
  font-family:'Shippori Mincho',serif;
  font-weight:800;
  font-size:clamp(28px,5.5vw,44px);
  letter-spacing:.08em;
  line-height:1.2;
}
h1 .h1-num{color:var(--gold);}
#search{
  position:absolute;top:46px;right:0;
  width:250px;
  border:1px solid var(--chip-line);border-radius:8px;
  padding:9px 14px;font-size:13px;background:var(--card);color:var(--ink);
  font-family:'Noto Sans TC',sans-serif;
}
#search::placeholder{color:var(--ink-faint);}
#search:focus{outline:2px solid var(--gold);border-color:var(--gold);}
.legend{margin-top:14px;font-size:12px;color:var(--ink-soft);}
.legend .p{color:var(--gold);font-weight:700;letter-spacing:.04em;}

/* ---------- controls ---------- */
.controls{
  position:sticky;top:0;z-index:20;
  background:rgba(11,9,7,.93);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:12px 16px;
  margin:0 -16px;
}
.ctrl-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:9px;}
.ctrl-row:last-child{margin-bottom:0;}
.tabbar{display:flex;gap:26px;border-bottom:1px solid var(--line);width:100%;}
.tabbar button{
  background:none;border:0;padding:8px 2px 10px;font-size:13px;letter-spacing:.2em;
  color:var(--ink-soft);cursor:pointer;position:relative;font-weight:300;
  font-family:'Noto Sans TC',sans-serif;transition:color .2s;
}
.tabbar button:hover{color:var(--ink);}
.tabbar button.on{color:var(--gold);font-weight:400;}
.tabbar button.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--gold);}
.tabbar button:focus-visible{outline:2px solid var(--shu);outline-offset:-2px;}
.pills{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.pills button{
  border:1px solid var(--chip-line);background:transparent;border-radius:20px;
  padding:4px 14px;font-size:12.5px;color:var(--ink-soft);cursor:pointer;font-weight:300;
  font-family:'Noto Sans TC',sans-serif;transition:background .2s,color .2s,border-color .2s;
}
.pills button:hover{border-color:var(--gold-deep);color:var(--ink);}
.pills button.on{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:400;}
.pills button:focus-visible{outline:2px solid var(--shu);}
.pill-sep{width:1px;height:18px;background:var(--chip-line);margin:0 4px;}
.dd{position:relative;}
.dd-btn{
  border:1px solid var(--chip-line);background:var(--card);border-radius:8px;
  padding:4px 12px;font-size:12.5px;color:var(--ink-soft);cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;gap:6px;
  transition:border-color .2s,color .2s;
}
.dd-btn:hover{border-color:var(--gold-deep);color:var(--ink);}
.dd-btn.on{border-color:var(--gold);color:var(--gold);}
.dd-btn .car{font-size:9px;opacity:.7;}
.dd-panel{
  position:absolute;top:calc(100% + 6px);left:0;
  background:var(--card-hi);border:1px solid var(--chip-line);border-radius:10px;
  padding:6px;min-width:172px;max-height:580px;overflow:auto;z-index:40;
  box-shadow:0 10px 28px rgba(0,0,0,.55);
}
.dd-opt{
  display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;
  font-size:12.5px;color:var(--ink-soft);cursor:pointer;white-space:nowrap;
}
.dd-opt:hover{background:var(--chip);color:var(--ink);}
.dd-opt .bx{
  width:14px;height:14px;border:1px solid var(--chip-line);border-radius:4px;
  flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--bg);
}
.dd-opt.sel{color:var(--gold);}
.dd-opt.sel .bx{background:var(--gold);border-color:var(--gold);}
.dd-opt .cnt{margin-left:auto;font-size:11px;opacity:.55;padding-left:10px;}
.ftags{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:9px;}
.ftags:empty{margin-top:0;}
.ftag{
  border:1px solid var(--gold-deep);color:var(--gold);background:transparent;
  border-radius:20px;padding:3px 12px;font-size:12px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;display:flex;gap:6px;align-items:center;
  transition:background .2s,color .2s;
}
.ftag:hover{background:var(--gold);color:var(--bg);}
.ftag .x{font-size:13px;line-height:1;}
#clearBtn{
  border:1px solid var(--shu);background:transparent;color:var(--shu);
  border-radius:20px;padding:3px 12px;font-size:12px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:background .2s,color .2s;
}
#clearBtn:hover{background:var(--shu);color:var(--bg);}
.count{font-size:12px;color:var(--ink-faint);margin-left:auto;white-space:nowrap;}

/* ---------- rows ---------- */
.band-head,.region-head{
  font-family:'Shippori Mincho',serif;
  font-weight:600;font-size:16px;letter-spacing:.12em;
  margin:28px 0 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  color:var(--ink);
}
.band-head::after,.region-head::after{
  content:"";flex:1;height:1px;background:var(--line);min-width:40px;
}
.band-head .tag,.region-head .tag{
  color:var(--bg);font-size:12px;letter-spacing:.15em;
  padding:4px 13px;border-radius:4px;font-family:'Noto Sans TC',sans-serif;font-weight:700;
}
.band-head .desc,.region-head .desc{font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--ink-faint);letter-spacing:0;}
.region-head .pin{width:15px;height:15px;flex:0 0 auto;color:var(--gold);}
.sec-head{
  font-size:12.5px;color:var(--ink-faint);letter-spacing:.2em;
  margin:16px 0 8px;display:flex;align-items:center;gap:8px;
}
.sec-head b{color:var(--gold);font-weight:600;letter-spacing:.25em;}
.row{
  position:relative;
  display:grid;
  grid-template-columns:58px 1fr;
  gap:0 14px;
  background:var(--card);
  border:1px solid var(--line);
  border-left:4px solid var(--band-color,var(--band-c));
  border-radius:8px;
  padding:13px 15px;
  margin-bottom:8px;
  transition:background .2s,border-color .2s;
}
.row:hover{background:var(--card-hi);}
.rank{
  font-family:'Shippori Mincho',serif;
  font-weight:800;font-size:24px;color:var(--band-color,var(--ink));
  line-height:1;padding-top:3px;text-align:right;
}
.rank small{display:block;font-size:10px;color:var(--ink-faint);font-family:'Noto Sans TC',sans-serif;font-weight:400;letter-spacing:.1em;margin-top:4px;}
.rank.stay{font-size:16px;letter-spacing:.02em;padding-top:8px;}
.rmain{min-width:0;}
.rtitle{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 10px;padding-right:66px;}
.rname{font-weight:700;font-size:15px;color:var(--ink);text-decoration:none;transition:color .2s;}
a.rname:hover{color:var(--gold);}
.rchips{display:flex;gap:6px;margin-top:6px;}
.stayed{
  font-size:11px;padding:1px 9px;border-radius:4px;
  background:transparent;color:var(--ink-faint);border:1px solid var(--chip-line);
  white-space:nowrap;
}
.rloc{font-size:12px;color:var(--ink-faint);}
.lev{
  font-size:11px;padding:1px 9px;border-radius:4px;
  background:var(--chip);color:var(--ink-soft);border:1px solid var(--chip-line);
  white-space:nowrap;
}
.lev.elite{color:var(--gold);border-color:var(--gold-deep);}
.xref{
  font-size:11px;padding:1px 8px;border-radius:4px;
  background:transparent;color:var(--ink-faint);border:1px dashed var(--chip-line);
  white-space:nowrap;
}
.fmark{
  font-size:11px;padding:1px 9px;border-radius:4px;white-space:nowrap;
  background:var(--gold);color:var(--bg);font-weight:700;
}
.fmark.plan{background:transparent;color:var(--gold);border:1px solid var(--gold);}
.rnote{margin-top:7px;font-size:13px;color:var(--ink-soft);line-height:1.7;}
.acts{position:absolute;top:10px;right:10px;display:flex;gap:5px;}
.bmk,.mag{
  width:27px;height:27px;display:flex;align-items:center;justify-content:center;
  color:var(--ink-faint);cursor:pointer;
  border:1px solid var(--chip-line);border-radius:7px;background:var(--chip);
  transition:background .2s,color .2s,border-color .2s;
  font-family:inherit;
}
.bmk svg,.mag svg{width:13px;height:13px;}
.bmk:hover,.mag:hover{border-color:var(--gold);color:var(--gold);}
.bmk.in,.mag.in{background:var(--gold);border-color:var(--gold);color:var(--bg);}
.bmk:focus-visible,.mag:focus-visible{outline:2px solid var(--shu);}
.price{
  font-size:12px;font-weight:700;letter-spacing:.06em;
  color:var(--gold);white-space:nowrap;position:relative;cursor:help;
}
.price:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);
  background:var(--card-hi);border:1px solid var(--chip-line);color:var(--ink-soft);
  padding:4px 11px;border-radius:6px;font-size:11px;font-weight:400;letter-spacing:0;
  white-space:nowrap;z-index:50;box-shadow:0 6px 18px rgba(0,0,0,.4);
}

/* ---------- 定番 ---------- */
.slot-section{margin-top:34px;}
.slot-title{
  font-family:'Shippori Mincho',serif;font-weight:800;
  font-size:20px;letter-spacing:.08em;color:var(--gold);
  display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
  margin-bottom:12px;
}
.slot-title .num{
  font-size:13px;color:var(--shu);letter-spacing:.3em;font-weight:600;
}
.slot-title .slot-count{font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--ink-faint);letter-spacing:0;font-weight:400;}
.slot-row{
  position:relative;
  display:grid;grid-template-columns:36px 1fr;gap:0 12px;
  background:var(--card);border:1px solid var(--line);border-radius:8px;
  padding:11px 15px;margin-bottom:7px;
  transition:background .2s;
}
.slot-row:hover{background:var(--card-hi);}
.slot-rank{
  font-family:'Shippori Mincho',serif;font-weight:800;font-size:18px;
  color:var(--gold);text-align:right;padding-top:2px;
}
.hidden{display:none!important;}
.empty{
  text-align:center;color:var(--ink-faint);padding:48px 0;font-size:13px;
}
footer{margin-top:40px;font-size:11.5px;color:var(--ink-faint);line-height:1.8;border-top:1px solid var(--line);padding-top:18px;}
@media (max-width:640px){
  .row{grid-template-columns:44px 1fr;padding:12px 12px;}
  .rank{font-size:20px;}
  .count{width:100%;margin-left:0;}
  select.flt{max-width:120px;}
  .controls{position:static;}
  #search{position:static;width:100%;margin-top:14px;}
  .rtitle{padding-right:0;margin-right:66px;}
}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto;}
  *{transition:none!important;}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="eyebrow">日本旅宿</div>
  <h1>日本飯店<span class="h1-num">250</span>選</h1>

</div>

<main id="content"></main>

<footer>

</footer>
</div>

const inSet=(s,v)=>!s.size||s.has(v);
const $=id=>document.getElementById(id);
const norm=n=>n.replace(/^[★◎⏳]\s*/,"").trim();
let fut=new Set(JSON.parse(localStorage.getItem("hj250future")||"[]"));
let wat=new Set(JSON.parse(localStorage.getItem("hj250watch")||"[]"));
JSON.parse(localStorage.getItem("hj250plan")||"[]").forEach(n=>fut.add(n));

const BUILT_FUT=new Set(),BUILT_WAT=new Set();
GROUPED.concat(INDIE).forEach(h=>{if(h[8]==="◎")BUILT_FUT.add(norm(h[1]));else if(h[8]==="⏳")BUILT_WAT.add(norm(h[1]));});
SLOTS.forEach(s=>s.rows.forEach(r=>{if(r[0].startsWith("◎"))BUILT_FUT.add(norm(r[0]));else if(r[0].startsWith("⏳"))BUILT_WAT.add(norm(r[0]));}));

function gmap(name,loc){
  const clean=norm(name).replace(/（.*?）/g," ").replace(/\(.*?\)/g," ").trim();
  const city=(loc.split("・")[0]||"").replace(/\s*他$/,"");
  return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(clean+" "+city);
}
function bandOf(rank,bands){return bands.find(b=>rank>=b.from&&rank<=b.to);}
function actsHTML(name){
  const n=norm(name);
  const inF=fut.has(n)||BUILT_FUT.has(n);
  const inW=wat.has(n)||BUILT_WAT.has(n);
  return `<div class="acts">
    <button class="bmk${inF?" in":""}" data-n="${n}" aria-label="加入將來" title="${inF?"移出將來":"加入將來"}">${BM_ICON}</button>
    <button class="mag${inW?" in":""}" data-n="${n}" aria-label="加入觀察" title="${inW?"移出觀察":"加入觀察"}">${MAG_ICON}</button>
  </div>`;
}
function rowHTML(h,bands,indie,trip){
  const [rank,name,loc,region,group,series,price,note,mark]=h;
  const b=bandOf(rank,bands);
  const tag=indie?(trip?`<span class="lev">獨立</span>`:""):`<span class="lev${STATUS[group]?" elite":""}">${STATUS[group]||group}</span>`;
  return `<div class="row" style="--band-color:${b.color}">
    <div class="rank">${rank}<small>${b.key}帶</small></div>
    <div class="rmain">
      <div class="rtitle">
        <a class="rname" href="${gmap(name,loc)}" target="_blank" rel="noopener">${norm(name)}</a>
        <span class="rloc">${loc}${series&&series!==group&&!indie?"｜"+series:indie?"｜"+series:""}</span>
        ${tag}
        <span class="price" data-tip="${PRICE_TIP[price]}">${PRICE_MARK[price]}</span>
      </div>
      ${mark==="★"?`<div class="rchips"><span class="stayed">住過</span></div>`:""}
      <div class="rnote">${note}</div>
    </div>
    ${actsHTML(name)}
  </div>`;
}
function filterRows(list){
  const q=state.q.trim().toLowerCase();
  return list.filter(h=>{
    if(!inSet(state.regions,h[3]))return false;
    if(!inSet(state.groups,h[4]))return false;
    if(!inSet(state.seriesSel,h[5]))return false;
    if(!inSet(state.prices,h[6]))return false;
    if(q&&!(h[1]+h[2]+h[4]+h[5]+h[7]).toLowerCase().includes(q))return false;
    return true;
  });
}
function renderRank(list,bands,total,label){
  $("count").textContent=`顯示 ${list.length} ／ ${total} 間`;
  if(!list.length)return `<div class="empty">沒有符合的飯店——換個條件試試。</div>`;
  let html="";
  bands.forEach(b=>{
    const seg=list.filter(h=>h[0]>=b.from&&h[0]<=b.to);
    if(!seg.length)return;
    html+=`<div class="band-head"><span class="tag" style="background:${b.color}">${b.label}</span><span class="desc">${b.desc}・${seg.length} 間</span></div>`;
    seg.forEach(h=>html+=rowHTML(h,bands,label==="ind"));
  });
  return html;
}
function slotRowHTML(r,idx){
  const stay=r[0].startsWith("★");
  return `<div class="slot-row">
    <div class="slot-rank">${idx}</div>
    <div class="rmain">
      <div class="rtitle"><a class="rname" href="${gmap(r[0],r[1])}" target="_blank" rel="noopener">${norm(r[0])}</a><span class="rloc">${r[1]}</span><span class="price" data-tip="${PRICE_TIP[r[3]]}">${PRICE_MARK[r[3]]}</span></div>
      ${stay?`<div class="rchips"><span class="stayed">住過</span></div>`:""}
      <div class="rnote">${r[4]}</div>
    </div>
    ${actsHTML(r[0])}
  </div>`;
}
function slotTripHTML(r){
  const stay=r[0].startsWith("★");
  return `<div class="row" style="--band-color:var(--band-c)">
    <div class="rank stay" style="color:var(--ink-faint);font-size:13px;">定番</div>
    <div class="rmain">
      <div class="rtitle"><a class="rname" href="${gmap(r[0],r[1])}" target="_blank" rel="noopener">${norm(r[0])}</a><span class="rloc">${r[1]}</span><span class="lev">定番</span><span class="price" data-tip="${PRICE_TIP[r[3]]}">${PRICE_MARK[r[3]]}</span></div>
      ${stay?`<div class="rchips"><span class="stayed">住過</span></div>`:""}
      <div class="rnote">${r[4]}</div>
    </div>
    ${actsHTML(r[0])}
  </div>`;
}
function renderSlots(){
  const q=state.q.trim().toLowerCase();
  let html="";let total=0;
  SLOTS.forEach(s=>{
    const rows=s.rows.filter(r=>{
      if(!inSet(state.regions,r[2]))return false;
      if(!inSet(state.prices,r[3]))return false;
      if(q&&!(r[0]+r[1]+r[4]).toLowerCase().includes(q))return false;
      return true;
    });
    if(!rows.length)return;
    total+=rows.length;
    html+=`<section class="slot-section">
      <div class="slot-title"><span class="num">${s.num}</span>${s.title}<span class="slot-count">${rows.length} 間</span></div>
      ${rows.map(r=>slotRowHTML(r,s.rows.indexOf(r)+1)).join("")}
    </section>`;
  });
  $("count").textContent=`定番：${SLOTS.length} 組・${total} 間`;
  return html||`<div class="empty">沒有符合的定番。</div>`;
}
function tripList(kind){
  const seen=new Map();
  const addRow=n=>{
    if(seen.has(n))return;
    const g=GROUPED.find(h=>norm(h[1])===n);
    if(g){seen.set(n,{type:"g",row:g});return;}
    const i=INDIE.find(h=>norm(h[1])===n);
    if(i){seen.set(n,{type:"i",row:i});return;}
    let srow=null;SLOTS.forEach(s=>s.rows.forEach(r=>{if(norm(r[0])===n)srow=r;}));
    if(srow)seen.set(n,{type:"s",row:srow});
    else seen.set(n,{type:"x",n});
  };
  (kind==="future"?BUILT_FUT:BUILT_WAT).forEach(addRow);
  (kind==="future"?fut:wat).forEach(addRow);
  return [...seen.values()];
}
function renderTrip(){
  const q=state.q.trim().toLowerCase();
  if(state.trip!=="past"){
    const kind=state.trip;
    const label=kind==="future"?"將來":"觀察";
    const items=tripList(kind).filter(it=>{
      const reg=it.type==="g"||it.type==="i"?it.row[3]:it.type==="s"?it.row[2]:"";
      if(!inSet(state.regions,reg))return false;
      const hay=it.type==="x"?it.n:(it.type==="s"?it.row[0]+it.row[1]+it.row[4]:it.row[1]+it.row[2]+it.row[7]);
      if(q&&!hay.toLowerCase().includes(q))return false;
      return true;
    });
    $("count").textContent=`${label}：${items.length} 間`;
    if(!items.length)return `<div class="empty">${kind==="future"?"還沒有將來行程——按卡片右上的書籤鈕加入。":"還沒有觀察名單——按卡片右上的放大鏡鈕加入。"}</div>`;
    let html="";
    items.forEach(it=>{
      if(it.type==="g")html+=rowHTML(it.row,BANDS_G,false,true);
      else if(it.type==="i")html+=rowHTML(it.row,BANDS_I,true,true);
      else if(it.type==="s")html+=slotTripHTML(it.row);
      else html+=`<div class="row"><div class="rank stay"></div><div class="rmain"><div class="rtitle"><span class="rname">${it.n}</span></div></div>${actsHTML(it.n)}</div>`;
    });
    return html;
  }
  /* past */
  const list=STAYS.filter(s=>{
    if(!inSet(state.regions,s[2]))return false;
    if(q&&!(s[0]+s[1]+s[4]).toLowerCase().includes(q))return false;
    return true;
  }).slice().sort((a,b)=>(SCORE_VAL[b[3]]||0)-(SCORE_VAL[a[3]]||0));
  $("count").textContent=`過去：${list.length} ／ ${STAYS.length} 間`;
  if(!list.length)return `<div class="empty">沒有符合的住宿。</div>`;
  const scoreColor=s=>{const v=SCORE_VAL[s]||0;return v>=5?"var(--band-s)":v>=4?"var(--band-a)":v>=3.5?"var(--band-b)":"var(--band-c)";};
  const xref=name=>{
    const n=ALIAS[name]||name;
    const g=GROUPED.find(h=>norm(h[1])===norm(n));
    if(g)return `<span class="xref">集團 #${g[0]}</span>`;
    const i=INDIE.find(h=>norm(h[1])===norm(n));
    if(i)return `<span class="xref">獨立 #${i[0]}</span>`;
    let hit=false;SLOTS.forEach(s=>s.rows.forEach(r=>{if(norm(r[0])===norm(n))hit=true;}));
    return hit?`<span class="xref">定番</span>`:"";
  };
  let html=`<div class="band-head"><span class="tag" style="background:var(--gold)">過去</span><span class="desc">已驗證的日本住宿・評分 1–5，5+++ 為個人最高——陸續補完中</span></div>`;
  list.forEach(s=>{
    const [name,loc,region,score,comment]=s;
    html+=`<div class="row" style="--band-color:${scoreColor(score)}">
      <div class="rank stay" style="color:${scoreColor(score)}">${score}</div>
      <div class="rmain">
        <div class="rtitle"><a class="rname" href="${gmap(name,loc)}" target="_blank" rel="noopener">${name}</a><span class="rloc">${loc}</span>${xref(name)}</div>
        <div class="rnote">${comment}</div>
      </div>
      ${actsHTML(name)}
    </div>`;
  });
  return html;
}
function renderRegion(){
  let total=0,html="";
  const regs=REGIONS.slice(1).filter(r=>inSet(state.regions,r));
  regs.forEach(r=>{
    const g=filterRows(GROUPED).filter(h=>h[3]===r).sort((a,b)=>a[0]-b[0]);
    const i=filterRows(INDIE).filter(h=>h[3]===r).sort((a,b)=>a[0]-b[0]);
    const q=state.q.trim().toLowerCase();
    const sl=[];
    SLOTS.forEach(s=>s.rows.forEach(row=>{
      if(row[2]!==r)return;
      if(!inSet(state.prices,row[3]))return;
      if(q&&!(row[0]+row[1]+row[4]).toLowerCase().includes(q))return;
      sl.push(row);
    }));
    const n=g.length+i.length+sl.length;
    if(!n)return;
    total+=n;
    html+=`<div class="region-head">${PIN}<span>${r}</span><span class="desc">${n} 間</span></div>`;
    if(g.length){html+=`<div class="sec-head"><b>集 團</b>${g.length} 間</div>`;g.forEach(h=>html+=rowHTML(h,BANDS_G,false));}
    if(i.length){html+=`<div class="sec-head"><b>獨 立</b>${i.length} 間</div>`;i.forEach(h=>html+=rowHTML(h,BANDS_I,true));}
    if(sl.length){html+=`<div class="sec-head"><b>定 番</b>${sl.length} 間</div>`;sl.forEach(row=>html+=slotRowHTML(row,"・"));}
  });
  $("count").textContent=`顯示 ${total} 間`;
  return html||`<div class="empty">沒有符合的飯店。</div>`;
}
function anyFilter(){return state.regions.size>0||state.groups.size>0||state.seriesSel.size>0||state.prices.size>0||!!state.q;}

/* ---------- 多選 dropdown 濾網 ---------- */
let openDD=null;
function regionOpts(){
  const counts={};
  const sel=state.view==="sel";
  const src=state.view==="region"?GROUPED.concat(INDIE):
    state.sub==="grp"?GROUPED:state.sub==="ind"?INDIE:null;
  if(src)src.forEach(h=>counts[h[3]]=(counts[h[3]]||0)+1);
  else if(sel&&state.sub==="slot")SLOTS.forEach(s=>s.rows.forEach(r=>counts[r[2]]=(counts[r[2]]||0)+1));
  else STAYS.forEach(s=>counts[s[2]]=(counts[s[2]]||0)+1);
  return REGIONS.slice(1).map(r=>({v:r,t:r,c:counts[r]||0}));
}
function ddDefs(){
  const sel=state.view==="sel";
  const defs=[{id:"region",label:"地區",set:state.regions,opts:regionOpts()}];
  const showGrp=(state.view==="region")||(sel&&state.sub==="grp");
  const showSer=(state.view==="region")||(sel&&(state.sub==="grp"||state.sub==="ind"));
  const showPrice=(state.view==="region")||(sel&&state.sub!=="trip");
  if(showGrp)defs.push({id:"group",label:"集團",set:state.groups,opts:[...new Set(GROUPED.map(h=>h[4]))].map(g=>({v:g,t:g}))});
  if(showSer){
    const base=sel&&state.sub==="ind"?INDIE:state.view==="region"?GROUPED.concat(INDIE):GROUPED;
    const pool=state.groups.size?base.filter(h=>state.groups.has(h[4])):base;
    defs.push({id:"series",label:"系列",set:state.seriesSel,opts:[...new Set(pool.map(h=>h[5]))].sort((a,b)=>a.localeCompare(b,"ja")).map(s=>({v:s,t:s}))});
  }
  if(showPrice)defs.push({id:"price",label:"價格",set:state.prices,opts:[1,2,3,4,5].map(p=>({v:p,t:PRICE_MARK[p]}))});
  return defs;
}
function renderDD(){
  const defs=ddDefs();
  $("ddRow").innerHTML=defs.map(d=>`<div class="dd">
    <button class="dd-btn${d.set.size?" on":""}" data-t="${d.id}" aria-haspopup="listbox">${d.label}${d.set.size?`・${d.set.size}`:""}<span class="car">▼</span></button>
    <div class="dd-panel${openDD===d.id?"":" hidden"}">${d.opts.map(o=>
      `<div class="dd-opt${d.set.has(o.v)?" sel":""}" data-dd="${d.id}" data-v="${o.v}"><span class="bx">${d.set.has(o.v)?"✓":""}</span>${o.t}${o.c!==undefined?`<span class="cnt">${o.c}</span>`:""}</div>`).join("")}</div>
  </div>`).join("");
  document.querySelectorAll(".dd-btn").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    openDD=openDD===b.dataset.t?null:b.dataset.t;
    renderDD();
  }));
  document.querySelectorAll(".dd-panel").forEach(p=>p.addEventListener("click",e=>e.stopPropagation()));
  document.querySelectorAll(".dd-opt").forEach(o=>o.addEventListener("click",e=>{
    e.stopPropagation();
    const id=o.dataset.dd;
    const v=id==="price"?+o.dataset.v:o.dataset.v;
    const set=id==="region"?state.regions:id==="group"?state.groups:id==="series"?state.seriesSel:state.prices;
    set.has(v)?set.delete(v):set.add(v);
    if(id==="group")state.seriesSel.clear();
    render();
  }));
}
function renderTags(){
  const tags=[];
  state.regions.forEach(v=>tags.push({set:state.regions,v,t:v}));
  state.groups.forEach(v=>tags.push({set:state.groups,v,t:STATUS[v]||v}));
  state.seriesSel.forEach(v=>tags.push({set:state.seriesSel,v,t:v}));
  state.prices.forEach(v=>tags.push({set:state.prices,v,t:PRICE_MARK[v]}));
  let html=tags.map((tg,i)=>`<button class="ftag" data-i="${i}" aria-label="移除條件 ${tg.t}">${tg.t}<span class="x">×</span></button>`).join("");
  if(anyFilter())html+=`<button id="clearBtn">Clear</button>`;
  $("ftags").innerHTML=html;
  document.querySelectorAll(".ftag").forEach(b=>b.addEventListener("click",()=>{
    const tg=tags[+b.dataset.i];tg.set.delete(tg.v);render();
  }));
  const cb=$("clearBtn");
  if(cb)cb.addEventListener("click",()=>{
    state.regions.clear();state.groups.clear();state.seriesSel.clear();state.prices.clear();state.q="";
    $("search").value="";render();
  });
}
document.addEventListener("click",()=>{if(openDD){openDD=null;renderDD();}});

function render(){
  const sel=state.view==="sel";
  ["s-grp","s-ind","s-slot","s-trip"].forEach(id=>$(id).classList.toggle("hidden",!sel));
  const tripOn=sel&&state.sub==="trip";
  $("tripSep").classList.toggle("hidden",!tripOn);
  $("t-future").classList.toggle("hidden",!tripOn);
  $("t-past").classList.toggle("hidden",!tripOn);
  $("t-watch").classList.toggle("hidden",!tripOn);
  renderDD();
  renderTags();
  let html;
  if(!sel)html=renderRegion();
  else if(state.sub==="grp")html=renderRank(filterRows(GROUPED),BANDS_G,GROUPED.length,"grp");
  else if(state.sub==="ind")html=renderRank(filterRows(INDIE),BANDS_I,INDIE.length,"ind");
  else if(state.sub==="slot")html=renderSlots();
  else html=renderTrip();
  $("content").innerHTML=html;
  bindActs();
}
function bindActs(){
  document.querySelectorAll(".bmk").forEach(b=>{
    b.addEventListener("click",()=>{
      const n=b.dataset.n;
      fut.has(n)?fut.delete(n):fut.add(n);
      saveSets();render();
    });
  });
  document.querySelectorAll(".mag").forEach(b=>{
    b.addEventListener("click",()=>{
      const n=b.dataset.n;
      wat.has(n)?wat.delete(n):wat.add(n);
      saveSets();render();
    });
  });
}
function setView(v){state.view=v;$("v-sel").classList.toggle("on",v==="sel");$("v-region").classList.toggle("on",v==="region");openDD=null;render();}
function setSub(s){state.sub=s;["grp","ind","slot","trip"].forEach(x=>$("s-"+x).classList.toggle("on",x===s));state.groups.clear();state.seriesSel.clear();openDD=null;render();}
function setTrip(t){state.trip=t;["future","past","watch"].forEach(x=>$("t-"+x).classList.toggle("on",x===t));render();}
$("v-sel").addEventListener("click",()=>setView("sel"));
$("v-region").addEventListener("click",()=>setView("region"));
$("s-grp").addEventListener("click",()=>setSub("grp"));
$("s-ind").addEventListener("click",()=>setSub("ind"));
$("s-slot").addEventListener("click",()=>setSub("slot"));
$("s-trip").addEventListener("click",()=>setSub("trip"));
$("t-future").addEventListener("click",()=>setTrip("future"));
$("t-past").addEventListener("click",()=>setTrip("past"));
$("t-watch").addEventListener("click",()=>setTrip("watch"));
$("search").addEventListener("input",e=>{state.q=e.target.value;render();});

render();
</script>
</body>
</html>
