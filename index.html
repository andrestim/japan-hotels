<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Japan 250</title>
<meta name="theme-color" content="#F4F1E9">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='13' fill='%23F4F1E9'/%3E%3Crect x='11' y='11' width='42' height='42' rx='9' fill='none' stroke='%23BF4A31' stroke-width='3'/%3E%3Ctext x='32' y='45' font-size='27' text-anchor='middle' fill='%23BF4A31' font-family='serif'%3E宿%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F1E9;
  --card:#FCFBF7;
  --card-hi:#FFFFFF;
  --ink:#23201B;
  --ink-soft:#6A6355;
  --ink-faint:#9A9282;
  --gold:#9A7124;
  --gold-deep:#7C591A;
  --shu:#BF4A31;
  --band-s:#A87C2B;
  --band-a:#5A7B58;
  --band-b:#46688F;
  --band-c:#7A7160;
  --line:#E7E1D4;
  --chip:#EFEAE0;
  --chip-line:#DBD3C3;
  --on-gold:#FCFAF4;
  --shadow:56 46 26;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:
    radial-gradient(115% 55% at 88% -8%, rgba(154,113,36,.05), transparent 60%),
    radial-gradient(90% 45% at 8% 0%, rgba(191,74,49,.028), transparent 58%),
    var(--bg);
  background-attachment:fixed;
  color:var(--ink);
  font-family:'Noto Sans TC',sans-serif;
  font-size:14px;
  line-height:1.68;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--gold);color:var(--on-gold);}
.wrap{max-width:1140px;margin:0 auto;padding:0 16px 100px;}

/* ---------- header ---------- */
header{padding:60px 0 24px;position:relative;}
.mast{position:relative;padding-right:84px;}
.eyebrow{
  font-family:'Shippori Mincho',serif;
  letter-spacing:.58em;
  font-size:12px;
  color:var(--gold-deep);
  margin-bottom:20px;
  padding-left:2px;
}
h1{
  font-family:'Shippori Mincho',serif;
  font-weight:800;
  font-size:clamp(30px,5.8vw,48px);
  letter-spacing:.12em;
  line-height:1.2;
}
h1 .h1-num{color:var(--gold);font-weight:700;padding:0 .04em;}
.tagline{
  font-family:'Shippori Mincho',serif;font-weight:400;
  margin-top:16px;font-size:14px;letter-spacing:.18em;
  color:var(--ink-soft);
}
/* 朱印 — the one bold mark */
.seal{
  position:absolute;top:2px;right:0;
  width:62px;height:62px;border-radius:13px;
  background:transparent;color:var(--shu);
  border:2px solid var(--shu);
  font-family:'Shippori Mincho',serif;font-weight:700;font-size:30px;
  display:flex;align-items:center;justify-content:center;
  transform:rotate(-2.5deg);
  user-select:none;
}
.seal::after{
  content:"";position:absolute;inset:4px;
  border:1px solid rgba(191,74,49,.45);border-radius:9px;
}
#search{
  display:block;margin-top:26px;
  width:340px;max-width:100%;
  border:1px solid var(--chip-line);border-radius:9px;
  padding:11px 15px;font-size:13px;background:var(--card);color:var(--ink);
  font-family:'Noto Sans TC',sans-serif;letter-spacing:.02em;
  transition:border-color .2s,box-shadow .2s;
}
#search::placeholder{color:var(--ink-faint);}
#search:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(154,113,36,.14);}
.legend{margin-top:14px;font-size:12px;color:var(--ink-soft);}
.legend .p{color:var(--gold);font-weight:700;letter-spacing:.04em;}

/* ---------- controls ---------- */
.controls{
  position:sticky;top:0;z-index:20;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  padding:14px 16px;
  margin:0 -16px;
}
.ctrl-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:9px;}
.ctrl-row:last-child{margin-bottom:0;}
.tabbar{display:flex;gap:26px;border-bottom:1px solid var(--line);width:100%;}
.tabbar button{
  background:none;border:0;padding:8px 2px 10px;font-size:13px;letter-spacing:.2em;
  color:var(--ink-soft);cursor:pointer;position:relative;font-weight:300;
  font-family:'Noto Sans TC',sans-serif;transition:color .2s;
}
.tabbar button:hover{color:var(--ink);}
.tabbar button.on{color:var(--gold);font-weight:400;}
.tabbar button.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--gold);}
.tabbar button:focus-visible{outline:2px solid var(--shu);outline-offset:-2px;}
.pills{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.pills button{
  border:1px solid var(--chip-line);background:transparent;border-radius:20px;
  padding:4px 14px;font-size:12.5px;color:var(--ink-soft);cursor:pointer;font-weight:300;
  font-family:'Noto Sans TC',sans-serif;transition:background .2s,color .2s,border-color .2s;
}
.pills button:hover{border-color:var(--gold-deep);color:var(--ink);}
.pills button.on{background:var(--gold);border-color:var(--gold);color:var(--on-gold);font-weight:500;}
.pills button:focus-visible{outline:2px solid var(--shu);}
.pill-sep{width:1px;height:18px;background:var(--chip-line);margin:0 4px;}
.dd{position:relative;}
.dd-btn{
  border:1px solid var(--chip-line);background:var(--card);border-radius:8px;
  padding:4px 12px;font-size:12.5px;color:var(--ink-soft);cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;gap:6px;
  transition:border-color .2s,color .2s;
}
.dd-btn:hover{border-color:var(--gold-deep);color:var(--ink);}
.dd-btn.on{border-color:var(--gold);color:var(--gold);}
.dd-btn .car{display:inline-flex;align-items:center;opacity:.6;transition:transform .2s,opacity .2s;}
.dd-btn .car svg{width:12px;height:12px;}
.dd-btn:hover .car,.dd-btn.on .car{opacity:.85;}
.dd-btn.open .car{transform:rotate(180deg);opacity:.9;}
.dd-panel{
  position:absolute;top:calc(100% + 6px);left:0;
  background:var(--card-hi);border:1px solid var(--chip-line);border-radius:10px;
  padding:6px;min-width:172px;max-height:580px;overflow:auto;z-index:40;
  box-shadow:0 14px 34px rgba(var(--shadow),.16);
}
.dd-opt{
  display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;
  font-size:12.5px;color:var(--ink-soft);cursor:pointer;white-space:nowrap;
}
.dd-opt:hover{background:var(--chip);color:var(--ink);}
.dd-opt .bx{
  width:14px;height:14px;border:1px solid var(--chip-line);border-radius:4px;
  flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--on-gold);
}
.dd-opt.sel{color:var(--gold);}
.dd-opt.sel .bx{background:var(--gold);border-color:var(--gold);}
.dd-opt .cnt{margin-left:auto;font-size:11px;opacity:.55;padding-left:10px;}
.ftags{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:9px;}
.ftags:empty{margin-top:0;}
.ftag{
  border:1px solid var(--gold-deep);color:var(--gold);background:transparent;
  border-radius:20px;padding:3px 12px;font-size:12px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;display:flex;gap:6px;align-items:center;
  transition:background .2s,color .2s;
}
.ftag:hover{background:var(--gold);color:var(--on-gold);}
.ftag .x{font-size:13px;line-height:1;}
#clearBtn{
  border:1px solid var(--shu);background:transparent;color:var(--shu);
  border-radius:20px;padding:3px 12px;font-size:12px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:background .2s,color .2s;
}
#clearBtn:hover{background:var(--shu);color:var(--on-gold);}
.count{font-size:12px;color:var(--ink-faint);margin-left:auto;white-space:nowrap;}

/* ---------- rows ---------- */
.band-head,.region-head{
  font-family:'Shippori Mincho',serif;
  font-weight:600;font-size:16px;letter-spacing:.12em;
  margin:40px 0 16px;display:flex;align-items:center;gap:11px;flex-wrap:wrap;
  color:var(--ink);
}
.band-head::after,.region-head::after{
  content:"";flex:1;height:1px;background:var(--line);min-width:40px;
}
.band-head .tag,.region-head .tag{
  color:var(--on-gold);font-size:12px;letter-spacing:.05em;
  padding:4px 13px;border-radius:3px;font-family:'Shippori Mincho',serif;font-weight:600;
}
.band-head .desc,.region-head .desc{font-family:'Shippori Mincho',serif;font-size:12.5px;color:var(--ink-soft);letter-spacing:.08em;}
.region-head .pin{width:15px;height:15px;flex:0 0 auto;color:var(--gold);}
.sec-head{
  font-size:12.5px;color:var(--ink-faint);letter-spacing:.2em;
  margin:16px 0 8px;display:flex;align-items:center;gap:8px;
}
.sec-head b{color:var(--gold);font-weight:600;letter-spacing:.25em;}
.row{
  position:relative;
  display:grid;
  grid-template-columns:60px 1fr;
  gap:0 16px;
  background:var(--card);
  border:1px solid var(--line);
  border-left:3px solid var(--band-color,var(--band-c));
  border-radius:9px;
  padding:16px 18px;
  margin-bottom:10px;
  box-shadow:0 1px 2px rgba(var(--shadow),.04);
  transition:background .2s,border-color .2s,box-shadow .2s,transform .2s;
}
.row:hover{background:var(--card-hi);box-shadow:0 6px 18px rgba(var(--shadow),.09);border-color:var(--chip-line);}
.rank{
  font-family:'Shippori Mincho',serif;
  font-weight:800;font-size:24px;color:var(--band-color,var(--ink));
  line-height:1;padding-top:3px;text-align:right;
}
.rank small{display:block;font-size:10px;color:var(--ink-faint);font-family:'Noto Sans TC',sans-serif;font-weight:400;letter-spacing:.1em;margin-top:4px;}
.rank.stay{font-size:16px;letter-spacing:.02em;padding-top:8px;}
.rmain{min-width:0;}
.rtitle{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 10px;padding-right:66px;}
.rname{font-weight:500;font-size:15px;color:var(--ink);text-decoration:none;transition:color .2s;}
a.rname:hover{color:var(--gold);}
.rchips{display:flex;gap:6px;margin-top:6px;}
.stayed{
  font-size:11px;padding:1px 9px;border-radius:4px;
  background:transparent;color:var(--band-a);border:1px solid var(--band-a);
  white-space:nowrap;
}
.rloc{display:block;margin-top:5px;font-size:12px;color:var(--ink-faint);letter-spacing:.03em;}
.lev{
  font-size:11px;padding:1px 9px;border-radius:4px;
  background:var(--chip);color:var(--ink-soft);border:1px solid var(--chip-line);
  white-space:nowrap;
}
.lev.elite{color:var(--gold);border-color:var(--gold-deep);}
.xref{
  font-size:11px;padding:1px 8px;border-radius:4px;
  background:transparent;color:var(--ink-faint);border:1px dashed var(--chip-line);
  white-space:nowrap;
}
.fmark{
  font-size:11px;padding:1px 9px;border-radius:4px;white-space:nowrap;
  background:var(--gold);color:var(--on-gold);font-weight:700;
}
.fmark.plan{background:transparent;color:var(--gold);border:1px solid var(--gold);}
.rnote{margin-top:9px;font-size:13px;color:var(--ink-soft);line-height:1.78;letter-spacing:.01em;}
.acts{position:absolute;top:10px;right:10px;display:flex;gap:5px;}
.bmk,.mag{
  width:27px;height:27px;display:flex;align-items:center;justify-content:center;
  color:var(--ink-faint);cursor:pointer;
  border:1px solid var(--chip-line);border-radius:7px;background:var(--chip);
  transition:background .2s,color .2s,border-color .2s;
  font-family:inherit;
}
.bmk svg,.mag svg{width:13px;height:13px;}
.bmk:hover,.mag:hover{border-color:var(--gold);color:var(--gold);}
.bmk.in,.mag.in{background:var(--gold);border-color:var(--gold);color:var(--on-gold);}
.bmk:focus-visible,.mag:focus-visible{outline:2px solid var(--shu);}
.price{
  font-size:12px;font-weight:700;letter-spacing:.06em;
  color:var(--gold);white-space:nowrap;position:relative;cursor:help;
}
.price:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);
  background:var(--card-hi);border:1px solid var(--chip-line);color:var(--ink-soft);
  padding:4px 11px;border-radius:6px;font-size:11px;font-weight:400;letter-spacing:0;
  white-space:nowrap;z-index:50;box-shadow:0 8px 20px rgba(var(--shadow),.18);
}

/* ---------- 定番 ---------- */
.slot-section{margin-top:34px;}
.slot-title{
  font-family:'Shippori Mincho',serif;font-weight:800;
  font-size:20px;letter-spacing:.08em;color:var(--gold);
  display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
  margin-bottom:12px;
}
.slot-title .num{
  font-size:13px;color:var(--shu);letter-spacing:.3em;font-weight:600;
}
.slot-title .slot-count{font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--ink-faint);letter-spacing:0;font-weight:400;}
.slot-row{
  position:relative;
  display:grid;grid-template-columns:38px 1fr;gap:0 14px;
  background:var(--card);border:1px solid var(--line);border-radius:9px;
  padding:14px 18px;margin-bottom:9px;
  box-shadow:0 1px 2px rgba(var(--shadow),.04);
  transition:background .2s,box-shadow .2s;
}
.slot-row:hover{background:var(--card-hi);box-shadow:0 6px 18px rgba(var(--shadow),.09);}
.slot-rank{
  font-family:'Shippori Mincho',serif;font-weight:800;font-size:18px;
  color:var(--gold);text-align:right;padding-top:2px;
}
.hidden{display:none!important;}
.empty{
  text-align:center;color:var(--ink-faint);padding:48px 0;font-size:13px;
}
footer{margin-top:40px;font-size:11.5px;color:var(--ink-faint);line-height:1.8;border-top:1px solid var(--line);padding-top:18px;}
@media (max-width:640px){
  .row{grid-template-columns:44px 1fr;padding:12px 12px;}
  .rank{font-size:20px;}
  .count{width:100%;margin-left:0;}
  select.flt{max-width:120px;}
  .controls{position:static;}
  #search{position:static;width:100%;margin-top:14px;}
  .rtitle{padding-right:0;margin-right:66px;}
}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto;}
  *{transition:none!important;}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="mast">
    <div class="eyebrow">日本の宿 ・ 私撰二五〇</div>
    <h1>日本飯店<span class="h1-num">250</span>選</h1>
    <div class="tagline">值得為那一泊，編一趟旅。</div>
    <div class="seal" aria-hidden="true">宿</div>
  </div>
  <input id="search" type="search" placeholder="搜尋" aria-label="搜尋">
</header>

<div class="controls">
  <div class="ctrl-row" style="margin-bottom:0">
    <div class="tabbar" role="tablist" aria-label="主檢視">
      <button id="v-sel" class="on">精選</button>
      <button id="v-region">地區</button>
    </div>
  </div>
  <div class="ctrl-row" style="margin-top:10px">
    <div class="pills" id="pillsSel" role="tablist" aria-label="精選分類">
      <button id="s-grp" class="on">集團 200</button>
      <button id="s-ind">獨立 50</button>
      <button id="s-slot">定番</button>
      <button id="s-trip">旅程</button>
      <span class="pill-sep hidden" id="tripSep"></span>
      <button id="t-future" class="hidden on">將來</button>
      <button id="t-past" class="hidden">過去</button>
      <button id="t-watch" class="hidden">觀察</button>
    </div>
    <div id="ddRow" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;"></div>
    <span class="count" id="count"></span>
  </div>
  <div class="ftags" id="ftags"></div>
</div>

<main id="content"></main>

<footer>
  會籍現況：IHG 鑽（2027 預計至少白金、可能保鑽，屆時仍有 1–3 張 CSU）・萬豪白金至 2027/2（之後可能軟降金）・雅高白金至 2026/12/31・GHA 鈦。無高等會籍時以渠道備援（雙早＋US$100＋延退＋視房態升等；頂奢線與多數集團線適用）。排名為綜合判斷，同帶內名次差距意義不大。資料基準：2026 年 7 月，訂房前請再查證。
</footer>

<script>
/* [rank, name, loc, region, group, series, price, note, mark] */
const GROUPED=[
[1,"Ritz-Carlton 日光","日光・栃木","關東","Marriott","Ritz-Carlton",4,"2020 年開業，中禪寺湖北岸，94 室，主力房型 57 ㎡ 起，引日光湯元溫泉的大浴場是麗思卡爾頓體系首例。館外幾乎沒有餐飲選擇，晚餐綁在館內，而這正是它成立的方式：溫泉旅館的湯配上都市頂奢的服務規格。2024 年首屆米其林金鑰匙評選獲二鑰匙。東京出發約兩小時，紅葉期房價與訂房難度同時跳級，需提前半年。",""],
[2,"Waldorf Astoria 大阪","大阪・大阪","關西","Hilton","Waldorf Astoria",4,"日本第一間華爾道夫，2025 年 4 月開業，梅北 Grand Green 大阪南館 28 至 38 樓，252 室，入門房 46 ㎡ 起。JR 大阪站就在旁邊，車站與餐飲全在步行數分內，代價是這一帶入夜依然熱鬧。館內設壽司與鐵板燒的日本料理餐廳。大阪頂級層長年缺一間能與東京對位的旗艦，這間補上。",""],
[3,"Ritz-Carlton 福岡","福岡・福岡","九州","Marriott","Ritz-Carlton",4,"2023 年 6 月開業於福岡大名花園城市，167 室，天神站步行約五分鐘，大濠公園與玄界灘是窗景而非門口。四間餐廳、兩間酒吧，服務細膩度在日本麗思體系裡評價居前。它沒有溫泉度假性格，適合放在九州行程的頭尾；周邊餐飲選擇多，入夜街區仍有人聲，圖安靜的話要挑高樓層。","★"],
[4,"ハレクラニ沖繩","恩納・沖繩","沖繩","ハレクラニ","ハレクラニ",5,"2019 年開業，恩納村名嘉真的海岸線，360 室全室 50 ㎡ 以上，其中 47 間為套房，館內水療引天然溫泉。米其林金鑰匙二鑰，連續兩年。沖繩本島同規格的濱海度假旅館不多，這是它的位置來源。館外沒什麼選擇，晚餐基本綁在館內，出門吃飯得開車。價格是全榜最高一級，海灘、泳池與客室尺寸撐得住。",""],
[5,"星のや竹富島","竹富島・沖繩","沖繩","星野リゾート","星のや",4,"2012 年開業，48 棟獨棟客室依島上傳統建築規範建成聚落形態，石垣港搭船約十五分鐘，島上入夜幾乎沒有店家。訂房原則上兩晚起，三十天內才開放單泊，排行程得先算進去。星野系定價偏高、餐飲評價浮動，訂前先查當期食評。它的理由在於竹富島這個場所沒有替代品，而非規格本身。","◎"],
[6,"InterContinental 札幌","札幌・北海道","北海道","IHG","InterContinental",2,"2025 年 10 月開業，中島公園旁 Lilac Square 九至十四樓，149 室含 13 間套房，客室 42 ㎡ 起，館內是室內溫水泳池而非溫泉。位置退開站前主動線，周邊是公園與辦公街廓，本身安靜，到狸小路得搭兩站地鐵。體量小，尺度接近精品旅館。札幌長年沒有國際頂級品牌，這間到位就構成走一趟的理由。",""],
[7,"帝國ホテル 京都","京都・京都","關西","帝国ホテル","帝国ホテル",5,"2026 年開業，祇園甲部歌舞練場腹地內的弥栄會館改建，1936 年竣工的劇場建築，2001 年登錄有形文化財，外壁與結構體保存。客室僅 55 間，是帝國體系三十年來首度新開業。周邊是花見小路一帶的觀光街區，白天人潮密集，入夜商家收得早。房量太少，開放即滿，京都的日期得配合訂房來排。",""],
[8,"Ritz-Carlton 京都","京都・京都","關西","Marriott","Ritz-Carlton",5,"2014 年開業，鴨川畔的低層建築，134 室，借東山稜線入景。2024 年米其林金鑰匙一鑰。館內 72 個車位並附代客泊車。京都頂級旅館多半藏在坡道或石階之後，這間位在平地、進出不必爬坡，河畔一帶入夜安靜。雨天有水療與室內泳池接手，是京都頂級裡最好安排的一間。",""],
[9,"JW Marriott 東京","港區・東京","關東","Marriott","JW Marriott",4,"日本首間 JW Marriott，2025 年 10 月開業，高輪 Gateway 站前大樓的二十三至三十樓，約 200 室，入門房 43 ㎡。羽田進來約二十分鐘，樓下就是新開發區的商業設施與車站，入夜這一帶偏安靜。開業首年設施全新，房價通常比之後理性。東京頭幾晚要壓低移動量，它的條件很直接。",""],
[10,"Rosewood 宮古島","宮古島・沖繩","沖繩","Rosewood","Rosewood",5,"2025 年 3 月開業，日本唯一的瑰麗，55 棟獨棟客室散在九萬多平方公尺的海岸腹地，全數海景並配私人泳池，最小房型室內 60 ㎡ 加 70 ㎡ 泳池露台。開業不到一年即獲 2025 年米其林金鑰匙二鑰。門檻是得轉機專程飛一趟，回程彈性差，館外幾乎沒有選擇，用餐與採買都仰賴館內。場所特別性高到能單獨撐起整趟行程。",""],
[11,"Conrad 名古屋","名古屋・愛知","中部","Hilton","Conrad",3,"2026 年 7 月 31 日開業，地鐵榮站直結的 The Landmark 名古屋榮，客室在三十一至四十一樓，170 室含 29 間套房，標準房約 50 ㎡。名古屋長年沒有真正的頂級旅館，這是第一間到位的。車站與商圈都在腳下，換來的是市中心的人聲。走高山、犬山或伊勢時可當進出據點，開幕首年房價最好談。",""],
[12,"Park Hyatt 京都","京都・京都","關西","Hyatt","Park Hyatt",5,"2019 年開業，蓋在創業一百四十年的料亭京大和腹地內，二寧坂旁的低層町家尺度，70 室，窗外是東山的石階與屋瓦。周邊是清水寺參道，白天人潮多、入夜商家收得早，館內反而安靜。石板坡道不好拖行李，宜搭車到門口輕裝上山，且連住兩晚才攤得平。",""],
[13,"InterContinental 別府","別府・大分","九州","IHG","InterContinental",3,"2019 年 8 月開業，別府灣高台上的溫泉度假旅館，89 室，Club 房型 68 ㎡ 配陽台專用露天風呂，源泉掛流；另有無邊際泳池與水療。2024 年首屆米其林金鑰匙一鑰。灣景、溫泉、餐飲三項同時做到的國際連鎖在日本並不多。開車或搭車才到得了，周邊是安靜的高台住宅區，館外選擇有限，晚餐多半在館內解決。","★"],
[14,"ANA InterContinental 石垣","石垣・沖繩","沖繩","IHG","ANA InterContinental",3,"石垣島南岸，31 公頃腹地上五棟建築、258 室，前方直接是真榮里海灘，機場約 20 分、市區約 10 分，停車免費。度假規格與市街便利同時具備，離島並不常見，這也讓它成為前往竹富島、西表島的母港。八間餐飲、四座泳池與高爾夫球場。房量大、旺季園區人多是代價。","◎"],
[15,"HOTEL THE MITSUI KYOTO","京都・京都","關西","三井","三井",4,"2020 年開業，二條城正對面的三井家舊地，161 室，2024 年首屆日本米其林鑰匙即獲最高三鑰、2025 年連續第二年。館內水療引基地內自有源泉，有大浴場也有包廂湯屋。溫泉、庭園、餐飲全在館內，雨天不受影響。位置退開觀光主動線，入夜安靜，但走得到二條城與地鐵站，低移動量的京都行程走它最順。",""],
[16,"Fairmont 東京","港區・東京","關東","Accor","Fairmont",3,"2025 年 7 月開業，芝浦 Blue Front 塔樓 35 至 43 樓，217 室，房型 52 至 278 ㎡，同年首度獲米其林一鑰匙。館內有室內無邊際泳池與 SPA，東望彩虹大橋、西望東京鐵塔，景觀即主商品。位在退開鬧區的水岸再開發區，浜松町站步行可達、往羽田順，入夜安靜但館外餐飲選擇有限。備 340 席停車場，一晚 3,500 日圓。",""],
[17,"Four Seasons 京都","京都・京都","關西","Four Seasons","Four Seasons",5,"一座八百年池庭「積翠園」為核心的低層建築，客房 123 室另加 57 間 Residence，標準房 49 至 53 ㎡，2024 年獲米其林一鑰匙。位在東山七条，退開主要觀光動線，步行可達三十三間堂一帶，周邊入夜安靜。庭園與 SPA 讓雨天行程仍完整，服務評價長年穩定。價位在頂級最上緣，停車一晚 5,000 日圓，旺季提前兩三個月仍訂得到。",""],
[18,"翠嵐 Luxury Collection","嵐山・京都","關西","Marriott","Luxury Collection",5,"保津川畔的嵐山隱居，39 室，其中 17 室附嵐山溫泉露天風呂，獲米其林一鑰匙。嵐山白天人潮極密，住在區內等於把清晨與入夜的無人時段收進行程，這是它最實際的價值。溫泉街性格明顯，館外店家入夜就收，晚餐時段選擇有限，白天則吵。房價高、房數少，紅葉盛期幾乎訂不到，想去建議挑十月下旬這類前哨檔期。",""],
[19,"Aman 京都","京都・京都","關西","Aman","Aman",5,"鷹峯山林裡的 26 室，2019 年 11 月開業，標準房 60 ㎡，SPA 引天然溫泉，獲米其林二鑰匙。整座山林即是庭園，這種尺度的私有林地在京都市內沒有第二處，也是它能單獨成立的理由。周邊只有住宅與寺院，入夜沒有店家，館外餐飲幾乎沒有選擇，進市區得開車。價格是全榜最高一級，適合紀念日等級的單晚。停車 12 席，代客服務免費。",""],
[20,"ANA InterContinental 安比高原","八幡平・岩手","東北","IHG","ANA InterContinental",3,"2022 年 2 月開業，僅 38 室，2024 年首屆日本米其林鑰匙獲一鑰匙，東北唯一入選。冬季可直接滑進滑出雪道，安比溫泉大浴場分岩風呂與檜風呂兩種。客房寬敞、大浴場不擁擠是高頻正評。前提也很明確：不滑雪的話價值折半。位在孤立的高原度假區，館外沒有街可逛，晚餐綁在館內，東北雪季走安比線時與雪見旅館性格互補。",""],
[21,"Ritz-Carlton 沖繩","名護・沖繩","沖繩","Marriott","Ritz-Carlton",4,"名護灣高台上的 97 室，前身喜瀨別邸，客室已於 2024 年底全數翻新；2026 年 4 月起全館休館，7 月 17 日重新開門，三間餐廳與大廳酒吧全部重做。SPA 內設溫泉浴場。硬傷是有海景卻沒有私人海灘，位在高台上需開車進出，館外沒有街區，晚餐多半留在館內。想整趟待在館內的沖繩行程可以交給它，玩水為主請看恩納線。",""],
[22,"Iraph Sui Luxury Collection","伊良部島・沖繩","沖繩","Marriott","Luxury Collection",4,"2018 年 12 月開業，伊良部島南岸的 58 室，部分客室附私人泳池，另有無邊際泳池、SPA 與海灘俱樂部。走伊良部大橋自駕直達，這在離島頂級物件裡不常見。夕陽時段的香檳服務常被住客提及，款待評價正面。館外只有海岸與農地，幾乎沒有餐飲，晚餐要預期在館內解決，離島那幾晚可以交給它。",""],
[23,"The Okura Tokyo（Heritage）","港區・東京","關東","オークラ","オークラ",3,"大倉本館的 Heritage 翼，140 室，2019 年 9 月重建開幕時重現舊本館的和風大廳語彙，館內有室內泳池與 SPA。真正的差別在房間：標準房就是 60 ㎡，東京同級少見，住客可用免費代客泊車。虎之門退開主要人流，周邊入夜安靜，走幾分鐘才進得了熱鬧。同級規格下房價比外資頂奢低一截，這是它排進行程的主因，餐飲則走穩定路線。",""],
[24,"InterContinental 大阪","大阪・大阪","關西","IHG","InterContinental",3,"梅田グランフロント內的 272 室，與大阪站之間有連通天橋，獲米其林一鑰匙，館內法式 Pierre 連續三年米其林一星。另有 20 公尺室內泳池與和風浴場，但不是溫泉。套房面積在大阪同級偏大，公開評論常說同價位裡服務較細。地區性格不突出，靠位置與穩定度立足。周邊餐飲密集，代價是入夜人聲不斷，停車須付費。",""],
[25,"Conrad 東京","汐留・東京","關東","Hilton","Conrad",3,"汐留的 290 室，客房在 28 樓以上，標準房 48 ㎡、天花板高 3 公尺，在東京算寬敞，主景是濱離宮庭園與東京灣。館內有 SPA、室內泳池與廣東料理 China Blue。設備世代偏舊但維護到位，服務評價長年穩定。汐留站直結，周邊是辦公街區，入夜安靜，走到銀座約十五分。它不是話題物件，強項是發揮穩定，作為銀座、豐洲一帶的據點很難踩雷。",""],
[26,"Conrad 大阪","中之島・大阪","關西","Hilton","Conrad",3,"2017 年 6 月開業，佔中之島 Festival Tower West 的 33 至 40 樓，164 室、50 ㎡ 起。國立國際美術館步行可達，梅田與難波各約 15 分車程。同級對手房價普遍更高，它的定價明顯理性，空間與景觀卻不打折，這是該優先考慮它的主因。中之島是市區裡退開主動線的一塊，周邊入夜安靜，晚餐得往外走。停車一晚 3,700 日圓。",""],
[27,"St. Regis 大阪","本町・大阪","關西","Marriott","St. Regis",3,"全日本唯一的 St. Regis，2010 年 10 月開業，160 室配置在 17 樓以上，43 ㎡ 起，管家服務為全房型標配。同等服務密度在大阪只此一家，價位卻停在兩萬台幣內。要接受的是設備已有年份，公開評論常提客房顯舊、館內設施薄，健身房小且沒有泳池。御堂筋沿線的本町，餐飲密度高、夜裡不算安靜，停車一晚 3,500 日圓。",""],
[28,"東京ステーションホテル","丸之內・東京","關東","JR","クラシック",3,"飯店本身就是重要文化財：東京車站丸之內站舍本體，1915 年創業，2012 年復原後重開，150 室，2024、2025 連續兩年獲米其林一鑰匙。紅磚建築的挑高廊道與圓頂空間別處沒有，走到新幹線剪票口約兩分鐘，代價是白天人流不停，房間隔音成為住客關注點。房型格局受古蹟結構限制，房數又少，旺季得提前兩三個月。停車 36 席，一晚 2,100 日圓。",""],
[29,"The Peninsula 東京","有樂町・東京","關東","Peninsula","Peninsula",4,"皇居外苑正對面，銀座與日比谷都在步行範圍，314 室含 47 間套房。標準房 54 ㎡ 起，屬東京老牌頂奢裡房間最寬的一批，館內有泳池、SPA 與廣東料理ヘイフンテラス。服務評價長年穩定，位置與空間的組合難以替換。面皇居一側入夜安靜。2007 年的設備世代已非最新，房價也不低。停車免預約，一晚 6,000 日圓，自駕進東京少見的方便。",""],
[30,"Park Hyatt 東京","新宿・東京","關東","Hyatt","Park Hyatt",5,"全館改修歷時 19 個月，2025 年 12 月 9 日重新開門，客房縮編為 171 室，新增 85 ㎡ 的 Park Suite，餐飲多了 Alain Ducasse 監修的 Girandole。圖書館與 47 樓泳池維持原樣，設備老舊的長年短板已解。西新宿高層區入夜安靜，走到車站要幾分鐘，館外用餐得往東走。代價是重開後房價明顯上調，重整成果還需時間觀察。",""],
[31,"Mandarin Oriental 東京","日本橋・東京","關東","Mandarin Oriental","Mandarin Oriental",4,"日本橋三井塔 30 至 36 樓，179 室，最小房型 50 ㎡，2005 年開業，設備年份偏舊是公開評論的常見保留意見。館內廣東料理 Sense 摘米其林一星。三越前站地下直結，東京站也走得到，日本橋白天是商辦氣氛、入夜安靜，逛街得往銀座移動。房間不難訂，餐廳位子比房間難搶。",""],
[32,"星のや京都","嵐山・京都","關西","星野リゾート","星のや",5,"嵐山大堰川上游，25 室，2009 年開業，客人自渡月橋南側乘船場搭專屬船約十五分鐘進出，沒有陸路車道。列 2025 米其林一鑰。全室臨水，隔絕感在京都同級旅館中最徹底，代價是行李與抵離時間全綁在船班，館內階梯多，長輩同行要先評估。紅葉期最難訂。星野系餐飲評價浮動，訂前查當期。",""],
[33,"Four Seasons 東京大手町","大手町・東京","關東","Four Seasons","Four Seasons",5,"皇居綠地旁的 190 室高樓，2020 年開業，客房 50 ㎡ 起，39 樓 SPA 與泳池正對綠海。館內法餐 est 連續五年摘米其林一星，飯店本身連續兩年列米其林最高的三把鑰匙。大手町站地下直結，雨天不必撐傘。單晚已站上三萬台幣以上，價格是唯一需要說服自己的地方。",""],
[34,"大阪 Marriott 都","阿倍野・大阪","關西","Marriott","Marriott",2,"阿倍野 HARUKAS 的 38 至 55 樓，360 室，近鐵大阪阿部野橋站直結、JR 與地下鐵天王寺站就在旁邊。高樓層看得到大阪平原與生駒山，餐飲與服務評價長年穩定。景觀溢價確實存在，但兩萬台幣內在大阪找不到同級高度與規模。自駕過夜停車一晚 3,000 日圓，往關西機場的動線也順。","★"],
[35,"Amanemu","志摩・三重","中部","Aman","Aman",5,"伊勢志摩國立公園英虞灣高台，2016 年 3 月開業，24 間套房與 4 棟別墅全部配私人溫泉風呂，另有大型溫泉 SPA，泉源為鈉鹽化物泉。連續兩年拿到米其林最高的三把鑰匙，又以溫泉為主軸，這是它排在此處的理由。館外幾乎沒有選擇，晚餐綁在館內；自駕才順，料理偏清淡。",""],
[36,"RC Reserve 東山 Niseko","新雪谷・北海道","北海道","Marriott","RC Reserve",5,"日本唯一的 RC Reserve，2020 年底啟用，僅 50 室，客房面向羊蹄山。天然溫泉大浴場、露天與貸切風呂都有，同級外資度假村少見，並列 2025 米其林一鑰。位置在二世谷山側，館外沒有街區，吃飯採買都得開車或靠接駁。冬季配滑雪管家，房價可逼近 20 萬日圓；不滑雪體驗少掉一半，綠季價格腰斬、人也少。",""],
[37,"Bulgari 東京","八重洲・東京","關東","Marriott","Bulgari",5,"東京 Midtown 八重洲 40 至 45 樓，98 室，2023 年 4 月開業，最小房型 50 ㎡，義式設計語彙貫穿全館。館內 Il Ristorante Niko Romito 摘米其林一星，飯店本身連續兩年列米其林最高的三把鑰匙。東京站步行可達，這種規格配上零移動的組合極少。單晚 25 萬日圓起，特殊場合才出手。",""],
[38,"ふふ 日光","日光・栃木","關東","ふふ","ふふ",4,"2020 年 10 月開在日光田母澤御用邸旁，24 室全附溫泉風呂，另有含露天的大浴場，房型從 70 ㎡到 130 ㎡以上都有。重心放在房內湯與晚餐，停車就在館旁，周邊是御用邸與大谷川的靜態散步圈，入夜沒有店家可逛。日光的高單價和式選項極少，與 RC 日光形成和洋對照，2025 年米其林二鑰匙，價格進 30K 帶，挑季節下手才划算。",""],
[39,"奥入瀬渓流ホテル","十和田・青森","東北","星野リゾート","星野リゾート",3,"奧入瀨溪流沿岸唯一的大型旅館，187 室，大廳立著岡本太郎的巨型暖爐。館內有溫泉大浴場，溪流露天風呂在溪畔另一處、需接駁且僅暖季開放，冬天泡不到。停車 200 台免費，自駕最順。散步溪流後回館泡湯這條路線青森沒有第二處，十月紅葉期最強也最難訂，該檔期常要求連泊兩晚。",""],
[40,"ANA InterContinental 東京","赤坂・東京","關東","IHG","ANA InterContinental",2,"1980 年開業的赤坂大箱，經 15 個月大規模改裝於 2025 年初完工，759 間客房翻新，房數由 844 調整為 801，新增 52 ㎡ 的水套房，館內 Club lounge 也擴到 36 樓。溜池山王站步行五分，六本木與虎之門都在走路範圍。體驗談不上驚豔，勝在規模與營運穩定，行程主軸放這裡幾乎不會出錯。",""],
[41,"Shangri-La 東京","丸之內・東京","關東","Shangri-La","Shangri-La",4,"丸之內 Trust Tower 27 至 37 樓，200 室，客房 50 ㎡ 起、最大到 269 ㎡。館內有 20 公尺室內泳池、義式 Piacere 與日本料理なだ万，列 2025 米其林一鑰。東京站八重洲北口步行兩分，室內停車約 60 席。設計走厚重織品的古典路線，偏保守，想要新鮮感的人會覺得悶。",""],
[42,"Ritz-Carlton 東京","六本木・東京","關東","Marriott","Ritz-Carlton",5,"六本木 Midtown 45 至 53 樓，245 室，最小房型 52 ㎡，在東京高樓頂奢裡算大房。2024 年把原本的 Azure 45 換成小林圭監修的 Héritage，隨後摘下米其林一星，2026 年續留。塔內與商場、美術館相連，六本木入夜熱鬧。2007 年的設備已非新世代，房價卻站上 25 萬日圓帶，挑對價格窗口才划算。",""],
[43,"Hyatt Regency 瀬良垣島","恩納・沖繩","沖繩","Hyatt","Hyatt Regency",2,"2018 年 8 月開業，主樓建在瀨良垣島上以橋接回本島，344 室，標準房 38 ㎡，另有 24 間 Beach House。海水潟湖、多座泳池與海上活動齊備，設施撐得住整天不出門，房價在沖繩本島同級度假村裡偏低。沒有溫泉大浴場，玩法就是海與泳池。旺淡季價差極大，月份挑錯，同樣的錢有更好去處。",""],
[44,"星のや輕井澤","輕井澤・長野","中部","星野リゾート","星のや",4,"輕井澤谷地的集落型旅館，2005 年開業，77 間客室沿水流分散配置，水波、山路地、庭路地三型，面積 44 至 81 ㎡。館內有溫泉與冥想浴池，戶外停車免費且不必預約，輕井澤站有接駁。森林、湯與野鳥的靜養組合是星のや系的原型，完成度高，但夏秋以外季節體驗會縮水，餐飲與價格是否相符，公開評價至今仍分歧。",""],
[45,"Patina 大阪","大阪・大阪","關西","GHA","Patina",3,"Capella 集團在日本的第一間 Patina，2025 年開業並獲 2025 年米其林一鑰，走到大阪城公園只要一分鐘，室內恆溫泳池正對天守閣。市區裡貼著公園綠地又保有安靜的位置，大阪少見，這是它排在此處的理由。營運仍在磨合，周邊入夜的餐飲選擇偏薄，想熱鬧得往本町或難波移動。現階段房價相對低。",""],
[46,"Andaz 東京","虎之門・東京","關東","Hyatt","Andaz",4,"虎之門之丘森大樓 47 至 52 樓，164 室，2014 年開業，最小房型 50 ㎡。37 樓 AO Spa & Club 有泳池與碳酸泉浴池，屋頂酒吧與 52 樓餐廳是招牌，飯店連續第二年獲 2025 米其林一鑰。虎之門之丘站經地下通道約三分鐘。設計與服務調性比同區老牌頂奢年輕一個世代，但虎之門本身不是觀光目的地。",""],
[47,"Bellustar 東京","新宿・東京","關東","GHA","Bellustar",3,"東急歌舞伎町塔 39 至 47 樓，97 室，2023 年開業，客房 41 ㎡ 起，頂層五間套房最大到 277 ㎡，2025 年米其林一鑰。新宿方向的高空視野在都內少有對手，停車場直通客房電梯，帶行李進出順。問題在地面層：出入口就在歌舞伎町中心，餐飲選擇多但入夜人聲雜亂，與樓上完全兩回事。衝著那片夜景才該出手。",""],
[48,"Aman 東京","大手町・東京","關東","Aman","Aman",5,"84 室、最小房型 71 ㎡，是東京標準房面積最大的一批，位於大手町塔 33 至 38 樓，2025 年米其林二鑰。30 公尺挑高的和紙大堂與大型 SPA 是招牌，館內 80 個車位可代客泊車。大手町站地下直結，商辦區入夜安靜卻無街可逛。設備服務與報價同在頂點，缺乏為它專程排一趟行程的理由。SPA 日票是不過夜的替代解。",""],
[49,"Janu 東京","麻布台・東京","關東","Aman","Janu",5,"Aman 姊妹品牌的全球首店，2024 年 3 月落腳麻布台之丘，122 室、客房 55 ㎡ 起，2025 年米其林二鑰。約 4000 ㎡ 的健身與 SPA 樓層是核心賣點，定價比本家低約三成。神谷町站步行六分，樓下商場餐飲齊全，位置退開了主幹道，入夜不吵。走社交型路線，館內人流大，隱居感不必期待。",""],
[50,"W 大阪","心齋橋・大阪","關西","Marriott","W",2,"安藤忠雄的全黑量體外觀，內部反而高彩度，是 W 在日本唯一據點。2021 年 3 月開業、337 室，全室 40 ㎡ 以上，就在御堂筋沿線，心齋橋站步行三分，入夜周邊仍然熱鬧。館內泳池與酒吧的營運熱度高，停車一泊五千日圓。設計語彙極度分眾，不對味的人會嫌吵，想換個節奏時再挑它。",""],
[51,"Prince Gallery 紀尾井町","千代田・東京","關東","Marriott","Luxury Collection",2,"2016 年開業，紀尾井町 Tower 30 至 36 樓，250 室，標準房 42 ㎡，永田町站地下直結。30 樓水療層有室內泳池、大浴場與三溫暖，泡湯時可俯瞰市區，同價位東京物件裡少見。房型面積與高度都在兩萬台幣以下的上段，代客泊車一泊三千日圓。周邊官廳區退開鬧區，入夜安靜但覓食選擇少。",""],
[52,"ROKU KYOTO（LXR）","鷹峯・京都","關西","Hilton","LXR",3,"LXR 在亞洲的第一間，2021 年 9 月開於鷹峯山麓，114 室，最小房型 50 ㎡ 另附 17 ㎡ 坪庭，房內設引天然溫泉的半露天風呂，戶外溫水泳池同樣用溫泉水，連續第二年獲 2025 年米其林一鑰。四十四個停車位對房客免費。賣的是京都市區沒有的腹地，代價是京都站車程三十分，跑景點會卡住，靜養或楓期以外不必勉強。",""],
[53,"The Tokyo EDITION 虎ノ門","虎之門・東京","關東","Marriott","EDITION",3,"Ian Schrager 與隈研吾合作，2020 年 9 月開業、206 室，客房 42 ㎡ 起，大堂鋪成室內綠地。31 樓餐酒空間與屋頂酒吧的東京塔視角是招牌，設計完成度在東京前段。神谷町站直結，虎之門一帶是商辦區，入夜安靜、可逛的店不多。觀光展開性不強，住它本身就是目的，不適合塞在跑景點的行程中間。",""],
[54,"星のや東京","大手町・東京","關東","星野リゾート","星のや",4,"大手町金融街裡的塔型日式旅館，2016 年開業，84 室分佈在 3 至 16 樓、每層僅六間，最小房型約 50 ㎡，全館脫鞋。17 樓引地下 1500 公尺的強鹽泉，內湯與露天風呂都在頂樓，都心能泡天然溫泉露天湯的幾乎只此一家，這就是它的全部理由。大手町站步行兩分，商辦區夜裡無街可逛，餐飲水準各期不一。",""],
[55,"InterContinental 橫濱 Pier 8","橫濱・神奈川","關東","IHG","InterContinental",2,"新港埠頭前端的小型 IC，173 室，2019 年 10 月開業，多數房型帶海景露臺，2025 年拿下米其林一鑰匙、連續第二年。體量小，照應比市區大箱細緻，走到紅磚倉庫約十分鐘。所在的 Hammerhead 複合設施備有三百五十個車位，自駕好處理。馬車道站步行十分、櫻木町十五分，離橫濱站要轉乘，周邊入夜安靜，理由只有那片港灣風景。",""],
[56,"Mesm 東京","竹芝・東京","關東","Marriott","Autograph",2,"竹芝的 Autograph，2020 年開業、265 室，全室朝濱離宮與東京灣，房內配電子鋼琴的音樂主題貫穿全館。海灣景觀在東京中價位帶少見，往羽田也快。位置夾在濱松町與竹芝兩站之間，周邊是新開發的辦公與碼頭區，夜裡幾乎沒有可逛的店。擺在行程頭尾當進出點剛好，特地繞來就沒意思。",""],
[57,"ザ・キャピトルホテル東急","永田町・東京","關東","東急","キャピトル",3,"隈研吾操刀、2010 年落成的東急旗艦，251 室，全室 44.8 ㎡ 以上，客房借日枝神社的樹景。2025 年米其林二鑰匙、連續第二年，全國僅二十間。日本料理水簾與全日餐廳 ORIGAMI 長年評價穩定。地下直結溜池山王與國會議事堂前兩站，赤坂一帶入夜安靜、餐飲圈就在坡下，是為服務品質而選的一晚。",""],
[58,"Westin 仙台","仙台・宮城","東北","Marriott","Westin",1,"設在仙台 Trust Tower 26 樓以上，292 室，是東北最高的飯店客房。仙台站步行十一分，牛舌與海鮮的外食圈就在旁邊，市區走動方便，房價長年停在 $ 級。2010 年 8 月開業，硬體已不算新，公共設施也普通，但東北找不到同規格的第二間。冬季當城市據點最順，其他季節必要性下降。","◎"],
[59,"Okura 京都岡崎別邸","岡崎・京都","關西","オークラ","オークラ",3,"平安神宮旁的小型 Okura，2019 年開業、60 室。京都市美術館、南禪寺與疏水道都在步行範圍，卻避開了四条河原町的人潮，白天有街可逛、入夜周邊收得早，這個位置差別是它的主要價值。體量小、館內餐飲選擇少，當觀光基地偏被動。把京都住成慢節奏的行程，它才發揮得出來。",""],
[60,"Sheraton 鹿兒島","鹿兒島・鹿兒島","九州","Marriott","Sheraton",1,"城市型喜來登裡少見地引了天然溫泉大浴場，2021 年開業，230 室。走到天文館商圈、搭船去櫻島都不遠，市中心生活機能完整、夜間有店可逛，主幹道旁但客房層安靜。鹿兒島市內 2020 年後開業的物件不多，房價卻停在 $ 級。餐飲與公共空間規格普通，缺乏記憶點，但把鹿兒島當基地的那幾晚，市內找不到更穩的選擇。",""],
[61,"帝國ホテル 東京","日比谷・東京","關東","帝国ホテル","帝国ホテル",3,"日比谷的日系代表，現本館 1970 年落成、772 室，服務規格是它現在的全部。塔館已於 2024 年 6 月關閉，本館規劃 2031 年度起改建、2036 年度完成新樓。硬體年代明顯落後同價位的新開業物件，房價也因此相對理性。想試帝國式服務就趁這十年窗口，日比谷入夜熱鬧、覓食不成問題，過了就只剩傳說可聽。",""],
[62,"New Otani「禅」","紀尾井町・東京","關東","ニューオータニ","ニューオータニ",3,"New Otani 本館 The Main 十一、十二樓的館中館，2025 年米其林一鑰匙。客房 45 與 50 ㎡兩種，專屬 lounge 每日六個餐飲時段，八點到二十二點。赤坂見附站步行三分，約一萬坪日本庭園就在樓下，760 席停車場住客不另計費。房間規格不算新世代，買的是小旅館尺度的照應密度與庭園腹地。",""],
[63,"Hyatt Regency 箱根","強羅・神奈川","關東","Hyatt","Hyatt Regency",3,"強羅的西式溫泉度假村，80 室，最小客房 56 ㎡、平均 68 ㎡，在箱根屬寬敞的一端。大浴場男女各 105 與 134 ㎡，源泉引自大涌谷的酸性硫酸鹽泉，49 席平面停車免費且免預約。強羅一帶是安靜的溫泉坡地，入夜幾乎沒有店家可逛。空間與停車是強項，湯質與餐飲相對日式老舖並不突出，單獨撐起整趟箱根吃力。",""],
[64,"Hyatt Regency 京都","東山・京都","關西","Hyatt","Hyatt Regency",3,"七條東山的中型國際連鎖，189 室，2006 年由舊京都公園飯店改裝掛牌，就在三十三間堂對面。服務口碑在京都連鎖裡長年前段，房價多落在 20K 內。兩個前提要先知道：客房只有 28 至 33 ㎡，而且已宣布 2027 年 5 月 9 日結束營業後拆除改建。想體驗得抓在期限前，位置偏南，去祇園嵐山都要移動。",""],
[65,"InterContinental 東京Bay","竹芝・東京","關東","IHG","InterContinental",2,"1995 年開業的灣景老店，330 室，客房與 Club lounge 於 2026 年 3 月完成翻新、4 月 1 日重啟，是這座 lounge 多年來第一次大改。ゆりかもめ竹芝站直結，浜松町站步行八分，窗景正對東京灣與彩虹大橋。離觀光區有段距離，靠單軌與水上巴士進出。翻新後規格拉高而房價尚未補漲，適合當東京行程的頭尾。",""],
[66,"Swissôtel 南海","難波・大阪","關西","Accor","Swissôtel",1,"蓋在南海難波站正上方，36 層、高 147 公尺、546 室，從關西機場搭特急下車不必走出戶外，這個位置在大阪沒有對手。停車場 357 席，住客一晚 3,300 圓。房間與餐飲都只是中規中矩，近年分批翻新，買的是零移動而非體驗。難波熱鬧也吵。放在關西行程的第一晚或最後一晚剛好，中間幾晚別耗在這裡。",""],
[67,"Kimpton 新宿","新宿・東京","關東","IHG","Kimpton",2,"2020 年 10 月開業，地上 17 層、151 室，是這條精品線在日本唯一一間。房型以 30 至 40 ㎡為主，另有約 70 ㎡套房，館內配餐廳、三處酒吧與健身房。位置在西新宿三丁目，走到新宿站南口要十分鐘，這段路是明確短板。設計語彙鮮明但規格未達頂級，想在東京換個調子住一晚時它才成立。",""],
[68,"JRタワーホテル日航札幌","札幌・北海道","北海道","JR","日航",1,"與 JR 札幌站直接連通，330 室，客房落在 23 至 34 樓。22 樓的展望浴場引自地下千公尺的札幌站溫泉，住客仍需另付 2,150 圓，這點事先要有心理準備。早餐可選和定食、和洋自助或法式套餐，評價在札幌長年前段。位置、湯、餐同時成立而房價常停在 $ 級，房間本身普通，定位是北海道行程的進出據點。","★"],
[69,"Hilton 廣島","廣島・廣島","中國","Hilton","Hilton",1,"2022 年 9 月開業、420 室，基本房型 35 ㎡起，是廣島市內世代最新的國際連鎖。一個常見誤解要更正：館內沒有大浴場，溫浴設施是 20 公尺室內泳池、按摩池與兩間桑拿，桑拿需著泳衣。停車為立體式。原爆巨蛋與平和記念公園步行可達，也可從廣島站搭路面電車。新硬體停在 $ 級價格，把廣島那一晚處理得乾淨俐落。",""],
[70,"Westin 都 京都","蹴上・京都","關西","Marriott","Westin",2,"蹴上高台的老牌都飯店，265 室，2018 年起大規模改裝、2021 年 4 月完工，同時新設天然溫泉 SPA「華頂」。地鐵蹴上站步行兩分，南禪寺與平安神宮走得到，停車住客一晚 1,500 圓。位置在市中心外圍，晚上要進四条得移動，換來的是安靜與大片庭園綠意。把京都住成靜態行程時最合用，愛逛夜街的人會嫌遠。",""],
[71,"星のや沖繩","讀谷・沖繩","沖繩","星野リゾート","星のや",5,"2020 年 7 月開在讀谷儀間，100 室全部面海，單室 93 至 94 ㎡，約是沖繩一般度假客房的兩倍以上，房內配土間起居空間，建物只做兩層以貼近海面。泳池全年開放。星のや系列唯一的海濱店，本島頂價帶多是西式度假村，和風路線僅此一條。餐飲評價浮動，訂前先查當期菜單。那霸機場開車約一小時，晚餐幾乎綁在館內。",""],
[72,"星のや富士","河口湖・山梨","中部","星野リゾート","星のや",3,"2015 年 10 月開業、40 室，架在河口湖上方約六公頃的森林斜坡，日本第一間豪華露營型旅館，每間艙房都有面富士山的露台。自駕客把車停在山下接待中心後換乘專用接駁車，館外沒有別的選擇。晚餐與活動都以戶外為軸，館內沒有大浴場。天氣決定成敗，山看不到就少掉一半內容，季節與天候都得挑。",""],
[73,"ザ・ブセナテラス","名護・沖繩","沖繩","テラスホテルズ","テラスホテルズ",3,"1997 年開業，408 室佔滿整個部瀨名岬，開放式大廳直通白沙海灘，停車一晚 2,000 圓。服務水準在沖繩本島長年前段，回頭客比例高，這是它的核心資產。硬體世代明顯舊，靠維護撐住，房間設備不能拿新開業物件的標準衡量。經典派度假的代表，付的錢買到的是人的水準而不是規格表。",""],
[74,"ホテル日航アリビラ","讀谷・沖繩","沖繩","日航","日航",2,"1994 年 6 月開業、396 室，讀谷的西班牙殖民風老牌，中庭迴廊與教堂讓完成度高於同齡物件，前方是透明度出名的天然ニライビーチ，全室陽台面海。曾在じゃらん OF THE YEAR 泊まって良かった宿大賞拿下沖繩區 301 室以上晚餐部門第二。硬體年紀是硬傷，不過以這個價格帶取得的度假密度，本島難找第二組。",""],
[75,"志摩観光ホテル","志摩・三重","中部","近鉄","クラシック",2,"1951 年開業、村野藤吾設計的ザ クラシック與全室套房的ザ ベイスイート合組，英虞灣高台上的經典度假旅館，2016 年 G7 伊勢志摩峰會主會場，角落套房含陽台 110 ㎡。主商品是以黑鮑魚牛排為代表的法式海鮮。客房仍有年代感，位置孤立，需自駕或近鐵轉車，晚餐幾乎綁在館內。為那道菜訂一泊二食才對得起價格。",""],
[76,"上高地帝國ホテル","上高地・長野","中部","帝国ホテル","帝国ホテル",3,"1933 年落成的日本首座正統山岳度假旅館，現建築為 1977 年重建，紅三角屋頂沿用初代外觀，74 室。2026 年度營業期 4/26 至 11/14，冬季全館關閉，上高地管制自用車，須在沢渡或平湯換乘接駁進場。訂房每年二月統一開放整季，旺季檔期常在開放當日消化完畢，整趟行程得先遷就這個季節窗口。",""],
[77,"界 ポロト","白老・北海道","北海道","星野リゾート","界",3,"2022 年 1 月開業，ポロト湖畔 42 室全部面湖，標準房 42 ㎡。泉質是含腐植質的茶褐色モール溫泉，鹼性單純泉 pH 8.82，三角湯小屋與圓頂浴場取自愛努建築語彙，鄰接愛努民族博物館ウポポイ。建築完成度在界系列裡屬前段，星野系餐飲評價起伏大，訂前先查當期。湖與建築是它的理由，料理得另尋一晚補。",""],
[78,"星野リゾート リゾナーレトマム","占冠・北海道","北海道","星野リゾート","リゾナーレ",2,"占冠山區的度假園區主館，200 室且全室 100 ㎡以上、附按摩浴缸，一層只配四間，這個房間尺度在日本大型度假設施裡少見。露天風呂木林の湯與造浪泳池同區，戶外停車 300 台免費。雲海平台撐起夏季，粉雪撐起冬季，家庭客比例高。腹地大、行程整段綁在園區內，得挑對季節才划算。",""],
[79,"望楼NOGUCHI函館","函館湯之川・北海道","北海道","野口観光","料理旅館",3,"2010 年開業的野口觀光旗艦，78 室分 60 ㎡與 120 ㎡兩級，其中 38 間為 120 ㎡套房，多數客室帶溫泉展望風呂，客室風呂於 2022 年 12 月整批翻新。頂樓大浴場是湯之川最高的視角，走大人限定路線，免費平面停車約 80 台。函館朝市與元町車程 30 分內。賣點壓在夜景與湯，天候不佳便折損一截。",""],
[80,"ふふ 河口湖","河口湖・山梨","中部","ふふ","ふふ",4,"2018 年 10 月開幕，河口湖高台 32 室，含陽台面積 59.7 ㎡起，全室配源泉掛流露天風呂，另有大浴場麗峰の湯，用的是河口湖第四號源泉，獲二把米其林鑰匙。停車免費，高台上安靜，出門吃飯得開車下坡。富士五湖少有這種房間尺度加獨立湯的組合，東京圈自駕約兩小時。房價站在 30K 級，富士山露不露臉直接決定划不划算。",""],
[81,"Dusit Thani 京都","京都・京都","關西","Dusit","Dusit",3,"2023 年 9 月開業，西本願寺門前町的低層木格柵建築，147 室，其中 131 間是 40 ㎡標準房，京都站步行約 10 分。連續兩年獲一把米其林鑰匙。主餐廳アヤタナ由曼谷泰菜名店前主廚監修，泰國菜與早餐是評價集中處。門前町一帶入夜安靜。停車 32 台、每晚 4,000 日圓且先到先停，想走純和風的行程別選它。",""],
[82,"Banyan Tree 東山 京都","東山・京都","關西","GHA","Banyan Tree",4,"2024 年 8 月開業，隈研吾設計，清水寺上方高台 52 室，2025 年獲一把米其林鑰匙。竹林邊設能舞台，具備東山區少見的天然溫泉，內湯與露天大浴場俱全。館內日本料理由京都名店主廚監修，SPA 是品牌本業。位置在坡道上，進出得靠車，周邊入夜安靜但下山吃飯不便。房價與東山頂級旅館同一水平，淡季才談得上合理。",""],
[83,"Hilton 京都","河原町・京都","關西","Hilton","Hilton",2,"2024 年 9 月 12 日開業，河原町三條路口，313 室，標準房約 40 ㎡，規模在京都的外資高級飯店裡算大。館內配屋頂酒吧、室內泳池、SPA 與健身中心，四間餐飲設施。祇園、錦市場、鴨川都在步行範圍，晚上出門吃飯不必安排交通，代價是路口整晚都熱鬧。沒有溫泉大浴場，房價落在 15K 級，買的是位置與新房。",""],
[84,"フェニックス・シーガイア・オーシャン・タワー","宮崎・宮崎","九州","フェニックスリゾート","シーガイア",2,"1994 年以喜凱亞海洋 45 之名開業的 154 公尺海濱塔，734 室全部海景，標準房就有 50 ㎡。2025 年 6 月終止喜來登加盟，改回シーガイア 名號自營。館內有溫泉與泳池，青島與鵜戶神宮自駕由此出發最順。園區在松林裡，晚餐幾乎綁在館內。",""],
[85,"界 長門","長門湯本・山口","中國","星野リゾート","界",3,"2020 年 3 月開業，長門湯本溫泉街再生計畫的核心，本館 30 室加別館 10 室共 40 間，別館全室附溫泉露天風呂，另有男女別大浴場含露天。沿音信川而建，建築與街並的整合在界系列裡最徹底。同一條街的大谷山莊是老牌大型旅館，格局與餐食更厚，兩者擇一。溫泉街入夜安靜，新山口站開車 60 分，不順路。",""],
[86,"TIAD, Autograph Collection","名古屋・愛知","中部","Marriott","Autograph",2,"2023 年 7 月 1 日開業，榮地區的設計系飯店，獲一把米其林鑰匙，全部客室 50 ㎡起，這個房間尺度名古屋沒有對手。館內有室內泳池、桑拿與溫浴區，健身設施完整，代客泊車每晚 4,500 日圓。榮的商圈與地鐵就在腳下，入夜仍熱鬧。問題出在名古屋多半只是出差或轉運順路的城市，Conrad 開出後就會變成二選一。",""],
[87,"ザ・プリンスさくらタワー東京","高輪・東京","關東","Marriott","Autograph",2,"1998 年開業、2013 年整修的高輪塔樓，288 室，腳下是兩萬坪日本庭園，走到品川站約三分鐘。都心裡同時握有轉運速度與整片綠地的物件不多，停車 1,000 台、每晚 1,500 日圓，自駕進出東京很省事。房間仍是王子系既有規格，沒有大浴場，餐飲平常。適合出差前後或櫻花季順勢住一晚。",""],
[88,"The Kahala 橫濱","港未來・神奈川","關東","Kahala","Kahala",3,"2020 年 9 月開業，地上 14 層 146 室，全室 47 ㎡起，這個下限在橫濱是頂標，連續兩年獲一把米其林鑰匙。館內有室內溫水泳池與住客專用 SPA，接客評價高，服務密度是它與橫濱商務塔樓的分野。みなとみらい站與新高島站步行約 8 分，地下停車 76 台採代客制、每日 4,000 日圓。橫濱本身撐不起專程，配東京行程多留一晚剛好。",""],
[89,"Hilton 長崎","長崎・長崎","九州","Hilton","Hilton",1,"2021 年 11 月開業，200 室，標準房 30 至 34 ㎡，以行人專用通道與長崎站西口直結，隔壁就是會展設施出島メッセ。六樓的溫浴設施附桑拿，住客免費使用，這在同價位的都市連鎖裡不常見。出島、新地中華街與路面電車都在步行或一站內。房價壓在 10K 級，靠位置、新房與這個價格三項疊加站住位置。",""],
[90,"Hilton 橫濱","橫濱・神奈川","關東","Hilton","Hilton",1,"2023 年 9 月 24 日開業，地上 26 層約 100 公尺、339 室，以裝飾藝術為母題，緊鄰 K Arena 橫濱，連續兩年獲一把米其林鑰匙。館內三間餐飲設施。卡在橫濱站與港未來兩個生活圈之間，周邊入夜偏空，出門吃飯得走一段。房價常落 10K 級，看演唱會或東京房價太高時往南退一站最合用。",""],
[91,"JW Marriott 奈良","奈良・奈良","關西","Marriott","JW Marriott",3,"2020 年 7 月開業，158 室，連續兩年獲一把米其林鑰匙，奈良縣會議中心旁，館內有室內泳池與水療，餐飲為日本料理校倉與絲路餐廳兩處。近鐵新大宮站步行約八分鐘，退開觀光主街，入夜安靜。硬傷是奈良公園與東大寺得靠車程十分鐘，走不到。館內停車一日兩千日圓，自駕可解。奈良多半只排一天，要留一晚給它得先把行程拉長。",""],
[92,"Hotel Indigo 箱根強羅","強羅・神奈川","關東","IHG","Indigo",2,"2020 年 1 月開業，98 室全數附客室溫泉風呂，這是它與同價位箱根飯店最大的差別。大浴場採泳裝著用、男女共用且全室內無洗身區，習慣傳統湯屋的人要先有心理準備。位在早雲山腰的溫泉街範圍，周邊有街可逛但入夜收得早。預算不想全押在一泊二食的箱根初訪，它排得進去。",""],
[93,"ふふ 奈良","奈良・奈良","關西","ふふ","ふふ",4,"2020 年 6 月開業，奈良公園內 30 室，全室 70 ㎡ 以上並附天然溫泉露天風呂，隈研吾設計，獲米其林一鑰匙。晚餐走大和蔬菜懷石，一泊二食兩人七萬七千日圓起。基地在公園東側坡地，白天有鹿與遊客走動，入夜整區靜下來，往近鐵奈良站要靠接送。鹿群範圍內的和風密度沒有第二家，只是奈良撐得起一晚，撐不起三晚。",""],
[94,"紫翠 Luxury Collection 奈良","奈良・奈良","關西","Marriott","Luxury Collection",4,"2023 年 8 月開業，43 室中有 23 室附專用溫泉風呂。主樓沿用一九二二年落成的舊奈良縣知事公舍，屬奈良縣指定有形文化財。位在奈良公園西端、名勝庭園吉城園旁，東大寺與興福寺步行可達，觀光動線比同區的ふふ奈良直接。同價位二選一：這裡是歷史建築配西式服務，另一邊是純和風私湯。",""],
[95,"Park Hyatt Niseko","新雪谷・北海道","北海道","Hyatt","Park Hyatt",4,"2020 年開業，約百室，正對花園滑雪場，館內備溫泉浴場與水療，多數客室看得到羊蹄山，獲米其林一鑰匙。定位單一，不滑雪的話價格與內容立刻失衡；綠季房價回落，健行與騎車行程反而是隱藏窗口。周邊是雪場腹地，館外幾乎沒有餐飲與商店，晚餐綁在館內，換來的是夜裡絕對安靜。",""],
[96,"Grand Hyatt 東京","六本木・東京","關東","Hyatt","Grand Hyatt",3,"2003 年 4 月隨六本木之丘開業，387 室，館內八處餐飲加泳池與水療。客房世代偏舊，維護與服務評價沒有跟著掉，是不會出錯也不會驚喜的城市住宿。日比谷線六本木站直結，森美術館與國立新美術館步行可達，代價是週末夜間周邊人聲不小。東京選項太多，輪到它多半是為了館內那幾家餐廳。",""],
[97,"Hilton 沖繩瀬底","本部・沖繩","沖繩","Hilton","Hilton",2,"2020 年 7 月開業，298 室，蓋在瀨底島上，多數房型面海，泳池與海灘設施完整。館內沒有溫泉也沒有大浴場，全靠海景與泳池撐場。停車兩百台，一晚一千五百日圓。經瀨底大橋自駕直達，美麗海水族館車程十五分。離那霸約兩小時，沒有車不用考慮，三天兩夜的短行程也吃不下它。","★"],
[98,"Grand Hyatt 福岡","福岡・福岡","九州","Hyatt","Grand Hyatt",2,"1996 年開業，370 室，與 Canal City 博多共構，2017 年完成全客室改裝，體感房齡比開業年份輕。中洲屋台區與天神都在步行範圍，晚上吃什麼都不必安排交通。停車一千三百台，自駕進市區也不卡。福岡真正的頂級是 Ritz-Carlton，這裡是把預算留給食物時該選的那間。",""],
[99,"Westin 大阪","梅田・大阪","關西","Marriott","Westin",1,"1993 年開業，304 室，標準房 41 ㎡ 起，這個尺度在大阪同價位罕見。2023 年起分樓層陸續改裝，訂房前值得先確認該樓層狀態，這是現階段最大的變數。新梅田城旁，走到大阪站約十分鐘，位置略偏但計程車與接駁成熟。設施與餐飲沒有亮點，衝著房間空間下手才划算。",""],
[100,"Hilton 東京","新宿・東京","關東","Hilton","Hilton",1,"1984 年開業的新宿西口大箱，806 室，館內有泳池與多家餐廳。2026 年六月至十月進行客室升級與地下管線工程，這段期間訂房得先問清楚施工影響。都廳與歌舞伎町分踞步行兩端，走到新宿站要穿地下道約十分鐘，帶行李不輕鬆。房價常落在同地段偏低區間，作用是新宿的保底。",""],
[101,"Hilton 大阪","梅田・大阪","關西","Hilton","Hilton",1,"1986 年開業，562 室，JR 大阪站步行兩分、阪神梅田站一分，與地下街連通，雨天不必撐傘就能進站。館內有室內泳池、健身房與三溫暖，但沒有大浴場。客房與餐飲都屬穩健而非亮點，房齡也擺在那裡。位置是它最大的本錢，其餘部分撐不起專程前來的理由。",""],
[102,"ANA InterContinental 萬座","恩納・沖繩","沖繩","IHG","ANA InterContinental",2,"恩納海岸岬角上的度假村，397 室，2009 年做過大規模改裝，館內設有大浴場，海景與夕陽視野在沖繩少有對手。位置獨立，館外步行範圍幾乎沒有餐飲，晚餐與夜間動靜都由館內決定。公開評論兩極：自然環境與員工應對評價高，設備老舊的反饋同樣密集。停車一晚一千日圓，景色一流、設備打折的落差要先接受。",""],
[103,"Sheraton 廣島","廣島・廣島","中國","Marriott","Sheraton",1,"2011 年開業，238 室，緊鄰廣島站新幹線口，行李不落地就能進房。飯店本身沒有停車場，得停隔壁的收費立體停車場，二十四小時一千五百日圓，自駕日這筆要先算進去。沒有大浴場，三溫暖另計費。評論常提早餐會場相對客室數偏小，旺季得排隊。移動日住它最省力，新意則不如新開的 Hilton 廣島。",""],
[104,"Westin 橫濱","橫濱・神奈川","關東","Marriott","Westin",1,"2022 年 6 月開業，373 室，橫濱少見的新世代大型飯店，大廳設在二十三樓。五樓的健康樓層有室內溫水泳池與水療，但沒有大浴場，這點容易被誤會。港未來站步行約六分鐘，位置落在區域外緣，走到主要景點還有一段路。停車兩百三十七台，有車的話位置扣分會小很多。",""],
[105,"Hyatt Regency 橫濱","橫濱・神奈川","關東","Hyatt","Hyatt Regency",1,"2020 年 5 月開業，315 室，位在山下町。日本大通站步行三分、元町中華街站五分，中華街與山下公園都納入步行範圍，觀光落腳點的位置挑不出毛病。自助早餐在公開評論裡評價偏高，客房設計清爽但規格中庸，館內設施不多。停車一百零八台，一日兩千日圓。橫濱行程以中華街為軸時，它的位置優勢最明顯。",""],
[106,"Westin Rusutsu","留壽都・北海道","北海道","Marriott","Westin",3,"全室樓中樓格局，最小 76 ㎡，館內有天然溫泉大浴場、露天風呂與乾式三溫暖，244 格平面停車位免費，緊鄰留壽都滑雪場，雪季帶板子就能直接上纜車。館外幾乎沒有別的選擇，晚餐等於綁在度假村裡，建築本身也有年份。季節落差極大，夏天價值明顯縮水，這是它排在此處的關鍵。",""],
[107,"ホテル青龍 京都清水","東山・京都","關西","プリンス","設計系",2,"1933 年落成的舊京都市立清水小學校舍改建，2020 年 3 月開業，全 48 室中有 34 室由原教室改成。頂樓酒吧 K36 望得到八坂塔。步行到清水寺與二年坂數分鐘，入夜後參道收得早，館內反而安靜。館方不設停車場，自駕日不要排它。",""],
[108,"エースホテル京都","烏丸・京都","關西","Ace","設計系",2,"1926 年舊京都中央電話局改成的新風館，隈研吾負責建築、美系 Ace 團隊做內裝，2020 年 6 月開業，是該品牌首度進亞洲。地鐵烏丸御池站南口直結，樓下就是餐飲與商店。館方無停車場，客房規格與服務不走頂奢路線，調性合不合是唯一變數。",""],
[109,"ダーワ・悠洛 京都","三條・京都","關西","GHA","Dhawa",2,"2019 年開業、138 室，2022 年 3 月由 MGallery 改掛 Banyan 集團的 Dhawa。三條大橋東側，京阪三條站步行 3 分，鴨川、先斗町與河原町的餐飲都在數分內，代價是夜間人聲不斷。館內設施薄、無停車場，適合本來就要落腳河原町的行程。",""],
[110,"オリエンタルホテル神戸","神戶・兵庫","關西","オリエンタル","オリエンタル",1,"舊居留地 25 番館原址的 116 室老字號，2010 年 3 月重新開業。商標授權到期，2026 年 1 月 31 日結束現名，休館整修後 2 月 12 日以 THE ORIENT 重啟，訂房時留意名稱。頂樓餐廳的早餐長年評價穩定，地下停車場約 140 台。退開三宮主動線一個街廓，本身安靜，走去南京町不到十分鐘。",""],
[111,"界 加賀","山代溫泉・石川","中部","星野リゾート","界",3,"承接創業約 380 年的老旅館白銀屋，2015 年以現貌開業，48 室中 18 室帶客室露天風呂。加賀友禪、水引與九谷燒的工藝語彙鋪得完整。同一條溫泉街上的べにや無何有在料理與庭園仍勝一籌，這間強在設計與較好入手的價格。溫泉街入夜收得早，加賀溫泉站開車 15 分，餐飲水準各期落差不小，訂前先確認。",""],
[112,"ふふ 熱海","熱海・靜岡","中部","ふふ","ふふ",4,"熱海高台上的 32 室小型旅館，全室配源泉放流的溫泉露天風呂，其中 26 室在 60 ㎡ 以上，服務密度是它的招牌。熱海站開車 10 分並提供免費接送，停車免費。周邊是住宅坡地，出了館幾乎沒有店家，晚餐落在館內。新幹線從東京約 50 分，臨時起意的一泊二食好安排，但地區獨特性不足以撐起整趟行程。",""],
[113,"伊豆マリオットホテル修善寺","伊豆市・靜岡","中部","Marriott","Marriott",2,"由舊ラフォーレ修善寺改品牌，2017 年 7 月開業，127 室，標準房 29.5 ㎡ 起，另有 49.4 ㎡ 的溫泉露天風呂客房。引修善寺溫泉做大浴場，159 台停車位免費。修善寺站開車約 15 分，館外是山間住宅與林地，沒什麼可逛。餐飲是西式度假水準，不與伊豆的料理旅館爭鋒，讓它負責泡湯與睡好的那一晚剛剛好。",""],
[114,"軽井沢マリオット","輕井澤・長野","中部","Marriott","Marriott",2,"全 142 室分三棟，本館 2016 年、北棟 2017 年落成，另有可攜犬的木屋。本館設小瀨溫泉的大浴場與露天風呂，部分北棟客房自帶溫泉，停車免費。中輕井澤站開車 5 分，周邊是林間別墅區，走不到店家，出門吃飯得再開一趟。輕井澤的西式度假選項不多，它勝在房型齊全，餐飲與服務只是連鎖水準。",""],
[115,"富士マリオットホテル山中湖","山中湖・山梨","中部","Marriott","Marriott",2,"同樣是舊ラフォーレ改掛的品牌，105 室全數 41 ㎡ 以上，房間寬敞是最實在的優點。館內有山中湖溫泉的大浴場、露天風呂與三溫暖，露天與三溫暖每日男女交換，停車免費。位置在湖畔林間，館外生活機能有限。建物有年份、餐飲平淡，富士山還得看天氣，扣分項明確，但富士五湖自駕時它夠可靠。",""],
[116,"リゾナーレ八ヶ岳","北杜・山梨","中部","星野リゾート","リゾナーレ",2,"八岳南麓的 172 室度假村，核心是一條 160 公尺長的室外回廊商店街，館內另設露天溫浴設施もくもく湯，走葡萄酒主題。停車 400 台免費，小淵澤站有接駁車約 5 分。館外沒有餐飲選擇，晚餐落在館內，客層以親子為主，兩人同行得自己挑時段。清里與八岳自駕拿它當基地很順，房價在星野系裡屬理性的一批。",""],
[117,"星野リゾート リゾナーレ熱海","熱海・靜岡","中部","星野リゾート","リゾナーレ",2,"熱海高台上的 81 室度假村，客房全數面相模灣，浴場是可看海景的半露天明星之湯，停車 50 台免費，熱海站有免費接送約 10 分。館外是坡地住宅，走不到餐飲店。設施重心明顯放在兒童，兩人旅行得主動避開熱鬧樓層與時段，平日房價則低得多。景觀與位置本身沒有短板，客層錯位才是它擺在這個位置的原因。",""],
[118,"界 アルプス","大町・長野","中部","星野リゾート","界",2,"2017 年 12 月再開業的 48 室溫泉旅館，男女浴場各配內湯與露天，主題取雪國民家，圍爐裏與冬季的雪見湯是完成度最高的一段。信濃大町站開車約 15 分，位在大町溫泉鄉裡，入夜後街上收得早。適合當立山黑部或北阿爾卑斯行程的前一晚，淡季看點轉弱，季節依賴很重。",""],
[119,"界 鬼怒川","鬼怒川・栃木","關東","星野リゾート","界",3,"2015 年 11 月開業，界系列第一間全新建的物件，48 室裡有 20 室附客室露天風呂。益子燒與黑羽藍染構成栃木民藝的陳設語彙，免費停車 25 台。鬼怒川溫泉站開車約 5 分即達，沒有專用纜車，溫泉街入夜安靜。同縣有 RC 日光站在更高的價格帶，這間適合當日光行程的第二晚。",""],
[120,"界 箱根","箱根湯本・神奈川","關東","星野リゾート","界",3,"箱根舊街道旁、面須雲川的 32 室小旅館，望得到湯坂山，客房主題取自箱根寄木細工。2025 年 8 月 13 日剛完成全面翻新，全室改為當地主題房並新增兩間套房與茶屋空間，硬體是目前的加分項。館外溫泉街入夜安靜，可逛的不多。箱根本身高手密集，強羅花壇與吟遊在料理與服務上都在其上，這間是價格較好入手的一泊二食備案。",""],
[121,"界 日光","中禪寺湖畔・栃木","關東","星野リゾート","界",3,"2014 年由舊有旅館改建開業，中禪寺湖畔三千坪腹地只放 33 室，多數客房 60 ㎡ 以上，密度在界系列裡偏寬鬆。2024 年 3 月起長期休館改建，官方至今未公布重開日期，現階段排不進任何行程。同一片湖畔已有更高規格的選項站著，這裡的定位是和風替代方案，重開後的餐飲與客房水準得重新評估再談。",""],
[122,"界 伊東","伊東・靜岡","中部","星野リゾート","界",3,"四口自有源泉每分鐘湧出約 600 公升，大浴場內外湯與溫泉泳池全靠這份湯量撐著，泳池因此全年開放。30 室規模，三百坪日本庭園可散步，戶外停車場 27 車位免費且不需預約，自駕不必先安排。東京搭踊子號約 105 分直達。客房與餐飲維持界的常規水準，衝湯量而來才划算，其他訴求都有更適合的去處。",""],
[123,"界 松本","淺間溫泉・長野","中部","星野リゾート","界",3,"2026 年 8 月 4 日全館翻新重開，29 室全數改為音樂主題客房，室內配喇叭與黑膠唱盤，其中 19 間附露天風呂。館內有 8 種 13 樣泡法的溫泉與桑拿。餐飲從和食整個換成正統義式配信州葡萄酒，是界系列第一次這樣做。位在淺間溫泉，松本市區車程十餘分，溫泉街安靜、入夜沒什麼店。轉型幅度大，首年評價尚未累積，這份不確定得自己吞。",""],
[124,"富士スピードウェイホテル","小山・靜岡","中部","Hyatt","Unbound",2,"2022 年 10 月開業的 Hyatt Unbound 系列，120 室，蓋在富士賽道正面，部分客房直接對著主直線，館內附設賽車博物館與溫泉浴場。獲米其林指南一把金鑰，這個價位帶拿到金鑰並不常見，硬體與服務有客觀背書。反過來說，非車迷會覺得主題與自己無關，周邊入夜幾乎沒有別的去處。自駕途中插入的異色一晚，僅此而已。",""],
[125,"ラビスタ函館ベイ","函館・北海道","北海道","共立リゾート","ラビスタ",1,"頂樓天然溫泉浴場看得到函館港，自助早餐的海鮮丼是招牌，曾連兩年拿下じゃらん OF THE YEAR 朝食部門北海道大型飯店組第一名，口碑長年穩定。金森倉庫走得到，停車要另外付費。房間是商務規格，空間不大、設施簡單，別把期待放在客房本身。以這個價位帶來說，函館少有對手能整體打贏它。",""],
[126,"あかん遊久の里 鶴雅","阿寒湖・北海道","北海道","鶴雅","料理旅館",2,"阿寒湖畔的鶴雅旗艦館，269 室規模，庭園露天與湖景大浴場在道東找不到同級對手。入選プロが選ぶ日本のホテル・旅館100選料理部門第 20 位，自助晚餐的海鮮口碑有這份客觀背書。道東自駕圈裡它是最現成的湖畔基地，丹頂鶴與摩周湖都能當日往返。專程飛道東只為這一泊仍不成立，冬季冰上活動期最有看頭。",""],
[127,"しこつ湖鶴雅別荘 碧の座","支笏湖・北海道","北海道","鶴雅","料理旅館",4,"2019 年 5 月開業，鶴雅「座」系列的頂點，25 室全數配溫泉露天浴槽與按摩浴缸內湯，且全室湖景。提供免費代客泊車，新千歲機場車程約 40 分，落地當天就接得上高階溫泉。支笏湖水質長年名列全國前段，這是它的主商品。湖畔一帶安靜、館外沒有店家。規格夠高，單館體驗仍屬地區級，不構成專程飛北海道的理由；雪季湖霧最好看。",""],
[128,"新富良野プリンス","富良野・北海道","北海道","プリンス","プリンス",1,"1988 年開業的老牌大型度假基地，407 室，森林商店街ニングルテラス與纜車都在腹地內，2008 年增設的溫泉「紫彩の湯」有露天與桑拿。停車免費且車位充足。客房與公共區的年紀明顯，房間走到大浴場也遠，這兩點是常見抱怨。平日雙人常壓在一萬台幣以內，薰衣草季與雪季靠它撐房量，撐住它的是價格不是房間。",""],
[129,"星野リゾート 青森屋","三澤・青森","東北","星野リゾート","星野リゾート",2,"星野經營的青森文化主題度假村，236 室，腹地二十二萬坪，ねぶた燈籠與津輕三味線的演出密度高，池上露天浴池「浮湯」是招牌。入選プロが選ぶ日本のホテル・旅館100選企画部門第 57 位。館外沒有徒步可及的餐飲，夜晚全在腹地內度過，館內熱鬧也因此偏吵。娛樂性明顯強過料理，訂房前先查當期餐飲評價，想安靜的人直接跳過。",""],
[130,"グランドプリンスホテル広島","廣島・廣島","中國","プリンス","プリンス",1,"廣島半島前端的 510 室高層飯店，2023 年 G7 峰會主場地，客房面向瀨戶內海。館前碼頭有往宮島的高速船，約 26 分抵達，可省掉市區轉車。停車場 440 台但要收費。距市中心與原爆圓頂遠、周邊晚餐選項少，行程重心放市區的人別選它。海景規格與一萬台幣內價位之間的落差，是它最實在的長處。",""],
[131,"JRホテルクレメント高松","高松・香川","四國","JR","クレメント",1,"JR 高松站步行一分鐘，21 層樓、300 室，客房可俯瞰瀨戶內海。二樓有頂棚連絡通道直通渡輪與高速艇乘船處，直島與豐島的船班就在隔壁，跳島行程住這裡不必計算轉乘。早餐評價在四國城市飯店裡屬高分群，讚岐烏龍也供應。地下停車每晚 1,400 圓另計。房間本身普通，位置撐起整個評價，其餘只是及格。",""],
[132,"界 阿蘇","瀨の本・大分","九州","星野リゾート","界",4,"12 棟獨立別墅散在約八千坪原生林裡，每棟附露天浴槽，私密性在界系列裡最高，價格也接近三萬台幣一晚。標高近千公尺的瀨の本高原上，前身 2006 年就開業，不是新館。星野的餐飲落差大，訂前先查當期評價。位在やまなみハイウェイ沿線，阿蘇行程本來就要走這條路時，最貴的一晚放這裡才合理，否則沒有繞路的理由。",""],
[133,"界 雲仙","雲仙・長崎","九州","星野リゾート","界",3,"2022 年 11 月開業，51 室，其中 18 間帶露天浴槽。就在雲仙地獄步道旁，硫磺味整天飄，入夜溫泉街幾乎沒有店開著。大浴場內湯分熱湯與溫湯兩槽、皆為源泉放流，泉源條件好。內裝取長崎和華蘭文化的圖樣語彙，是界系列裡少見的主題方向。星野餐飲仍需查當期評價。傳統高階的半水盧門檻高，想住新館時它是現代替代方案，但不會為它單獨繞路。",""],
[134,"JR九州ホテルブラッサム大分","大分・大分","九州","JR","ブラッサム",1,"2015 年開業，190 室，JR 大分站直結。同棟併設 CITY SPA てんくう，地上八十公尺的屋頂溫浴設施引大深度地熱溫泉，規模在日本車站型飯店裡數一數二。房型不大、餐飲普通，屬純過夜用的城市飯店。別府與由布院進出多半經過大分站，把溫泉泡在車站樓上等於省掉一次移動，價值全在轉車那一晚。",""],
[135,"はいむるぶし","小濱島・沖繩","沖繩","南西楽園","南西楽園",2,"1979 年開業的老牌離島度假村，148 室分成 13 棟散落成村落狀。2025 年 7 月完成翻新，改裝 45 室並新增 SPA 與泳池，設備老舊的抱怨修正了一部分。石垣島搭船約 25 分。西表石垣國立公園是日本首座星空保護區，星空觀測是主打節目，水牛車與珊瑚礁行程完整。館外幾乎沒有用餐選擇，晚餐綁在館內，八重山行程裡它是配角。",""],
[136,"ジ・ウザテラス","讀谷・沖繩","沖繩","テラスホテルズ","テラスホテルズ",4,"讀谷宇座海岸的全別墅度假村，48棟客室全部88㎡起，每棟附私人泳池。2017年成為沖繩第一家加盟Relais & Châteaux的住宿，這是它與本島其他度假村最明確的差別。停車44台，一泊2000日圓。館外幾乎沒有餐飲選擇，晚餐綁在館內，距那霸與美麗海都要開一段車，價格也到三萬台幣級。",""],
[137,"オリエンタルホテル沖縄","名護・沖繩","沖繩","オリエンタル","オリエンタル",2,"名護灣的361室度假村，全室海景露臺，庭園泳池屬縣內最大級，館內另有含露天的大浴場與三溫暖。停車297台，本部半島自駕來回最省。價位落在一萬五台幣內，同區同級難有更便宜的。周邊生活機能有限，出門吃飯得開車，均衡是它的長處，也是它的上限。",""],
[138,"琵琶湖 Marriott","守山・滋賀","關西","Marriott","Marriott",1,"2017年7月由ラフォーレ琵琶湖全面改裝轉為萬豪，274室，館內有天然溫泉浴場，高樓層房間正對琵琶湖。湖景配溫泉的組合在關西不多見，平日房價常壓在一萬台幣內。距京都約一小時，京都房價過高時可把住宿外移到這裡。周邊沒有街可逛，晚餐幾乎只能在館內解決。",""],
[139,"ANA Crowne Plaza 富山","富山・富山","中部","IHG","ANA Crowne Plaza",1,"1999年開業的19層251室，正對富山城址公園，高樓層看得到城與立山連峰，富山站步行約五分鐘。城址公園一側入夜安靜，站前一帶吃飯不缺選擇。地下停車125台，一泊1500日圓，自駕不必外找車位。客房與餐飲都停在連鎖水準，北陸的中階供給有限才把它推到這個位置，換個地區就不會被想起。",""],
[140,"ANA Crowne Plaza 金澤","金澤・石川","中部","IHG","ANA Crowne Plaza",1,"金澤站兼六園口步行約一分鐘，249室，全程有遮蔽。內部年紀比市內設計系飯店明顯，房間不算寬，餐飲同樣是連鎖標準，最近一次可查的整修在2016年。站前商業設施與餐飲密度高，出門覓食不必移動。雨雪天不必拖行李這點很實際，站前位置就是它全部的理由。要質感得往市內走，自駕日先確認停車安排。",""],
[141,"ANA Crowne Plaza 米子","米子・鳥取","中國","IHG","ANA Crowne Plaza",1,"山陰唯一的國際連鎖，134室，米子站步行八分鐘，館旁120台平面停車場免費，開往皆生溫泉約20分。站前一帶入夜清冷，晚餐選擇不多，安靜倒是有保障。設備與餐飲都只是連鎖水準，換到別的城市不會進榜。山陰的住宿供給本來就薄，自駕穿越鳥取島根時它把可預期性補齊，靠的是地利。","◎"],
[142,"名古屋 Marriott Associa","名古屋・愛知","中部","Marriott","Marriott",2,"2000年開業，名古屋站正上方的中央雙塔內，774室、平均37㎡，館內八間餐飲，出站不必走到戶外。站區商場與地下街連著走，覓食與採買都在腳邊。Conrad與TIAD開幕後，同城的高階選擇變多，它的房型與設備已不是第一順位。停車170台，一泊2750日圓。趕新幹線那晚完全不必移動，是它現在最實在的長處。","★"],
[143,"Hyatt Centric 金沢","金澤・石川","中部","Hyatt","Hyatt Centric",2,"2020年開業，金澤站步行約兩分鐘，253室且全室32㎡起，在同城中階裡房間偏寬。設計與公共空間做得別緻，餐飲平常，沒有大浴場。站東口一帶熱鬧但客房未見噪音反饋。真正的硬傷是沒有自家停車場，得停周邊收費場，自駕日進出多一道手續。不開車的行程它相當順。","★"],
[144,"ホテル日航金沢","金澤・石川","中部","日航","日航",1,"北陸最高的30層地標，249室全部配在17樓以上，市街與白山方向的視野是賣點。兼六園口步行三分鐘，地下道直通，雨雪天不必淋，站前餐飲與商場都在步行圈內。地下停車一泊1500日圓。設施世代偏舊，2026年初排了20、21樓的衛浴改裝。要求穩定發揮時的一手，驚喜不必期待。",""],
[145,"横浜ベイシェラトン","橫濱・神奈川","關東","Marriott","Sheraton",1,"1998年開業的28層398室，橫濱站西口步行約一分鐘。標準房41㎡，在這個價位的車站型飯店裡屬寬敞，這點容易被低估。館內七間餐飲但沒有記憶點，公共區也顯出年紀。地下停車一泊1900日圓。西口鬧區就在門外，餐飲密度高，入夜人聲不算安靜。換車與購物都在腳邊，它是位置先行的一晚，本身不構成前往橫濱的理由。","★"],
[146,"The Park Front Hotel","USJ・大阪","關西","Marriott","Marriott",1,"環球影城正門步行約一分鐘，598室，全室30㎡以上，尺寸比一般園區飯店大。園區商店街就在門外，餐飲齊全但入夜人潮多。設施與餐飲只服務單一用途，館內沒有大浴場，房價在旺日跳得兇。玩USJ那天它把接駁與早晨排隊的時間全省下來，換個目的地就用不上這張牌。","★"],
[147,"Hotel Nikko Huis Ten Bosch","佐世保・長崎","九州","日航","日航",1,"與豪斯登堡共構，走出大門即入園，看完夜間煙火不必趕接駁船。377室，館內設有大浴場，這在園區飯店裡不常見。停車102台收費。外牆工程排到2026年3月底，訂房前要確認影響。園區以外周邊沒什麼可逛，入夜安靜，到佐世保市區還有一段路，排兩天園區時它省下的移動最多。","★"],
[148,"InterContinental 橫濱 Grand","橫濱・神奈川","關東","IHG","InterContinental",2,"1991年8月落成的帆型地標，594室、31層，港未來的天際線因它成形。客室尺度與設備仍停在開業世代，翻新幅度有限，象徵性大於住宿體驗。みなとみらい站步行五分鐘，周邊是規劃過的商業區，白天觀光客多，入夜安靜。一房附一台免費停車是實打實的優點。同集團Pier 8開幕後，橫濱的第一順位已經換人。",""],
[149,"Hyatt Centric 銀座","銀座・東京","關東","Hyatt","Hyatt Centric",2,"2018年1月開業，銀座並木通旁，164室，最小35㎡在銀座算寬。地下設機械式停車場且能容大型車，這在銀座少見，自駕進東京時是實際加分。館內設施薄，只有餐酒館與健身房，沒有大浴場。門外就是銀座精品街，白天熱鬧，入夜反而清靜。銀座徒步圈想住設計系時的合理一手。",""],
[150,"Westin 東京","惠比壽・東京","關東","Marriott","Westin",2,"1994年開業的歐風老牌，445室，客房與走廊尺度比同價位新館大得多。2023年底做過開業以來第一次大規模翻新，過去常被指的設備老舊已改善不少。館內設有中餐廳與多間餐飲。惠比壽站步行七分鐘要走一段，坡道與住宅區交錯，入夜安靜，停車一日5000日圓偏貴，晚餐則有整個惠比壽可挑。",""],
[151,"シェラトン都ホテル東京","白金台・東京","關東","Marriott","Sheraton",1,"1979 年開業，484 室，南北線與三田線的車站步行約五分。館內保有日式庭園，這在東京都心的都會飯店裡少見，另有室內泳池與健身設施，停車採館內收費制。周邊是使館與高級住宅混居的街廓，入夜安靜，代價是往任何主要商圈都得移動一段。房間與餐飲維持傳統規格，房價長年壓在同級之下。安靜與價格撐得住它的排位，其他方面沒有可說的。",""],
[152,"Hyatt Regency 東京","西新宿・東京","關東","Hyatt","Hyatt Regency",1,"1980 年開業的西新宿大箱，712 室，2025 年 9 月完成開業以來最大規模改裝，其中 601 室全面更新。新宿站西口步行約九分，經都廳前站地下通道則約一分，住客停車免費且 24 小時進出。位置在都廳一帶的辦公街廓，白天商務氣息重，入夜比歌舞伎町那側安靜得多。房間更新後不再吃虧，規格與定價仍停在中階，適合壓預算時的新宿一晚。",""],
[153,"小田急ホテルセンチュリーサザンタワー","新宿・東京","關東","小田急","小田急",1,"新宿南口步行三分，375 室，大堂設在 20 樓、客房在其上，避開了地面人潮。地下停車 73 席，限高 2.1 公尺。立地貼著新宿最熱鬧的一側，卻因樓層高而安靜。房間不大，館內設施精簡，餐飲得靠外面解決。真正的變數是翻新計畫：營業到 2026 年 10 月 1 日退房為止，之後長期停業至 2028 年。這段期間它是新宿條件最硬的過夜點。",""],
[154,"Hilton 東京お台場","台場・東京","關東","Hilton","Hilton",1,"453 室的台場海濱大箱，2015 年改掛現名，台場站直結。全室配露臺，正面對彩虹橋與都心天際線，館內大浴場庵 SPA TOKYO 附三溫暖，地下停車 187 席、限高 2.1 公尺。立地是填海造陸的觀光灣岸，館外入夜幾乎只剩商場，吃飯選項有限。有明展場與豐洲市場在同一條移動線上，行程對得上很好用，對不上就沒有過橋的必要。",""],
[155,"グランドニッコー東京台場","台場・東京","關東","日航","グランドニッコー",1,"884 室，1998 年以格蘭太平洋之名開業，2016 年轉為現名，台場站直結。高樓層正面對彩虹橋與東京鐵塔，宴會與餐飲一貫地穩，房間本身中規中矩，停車設在地下二層。與隔壁的希爾頓同屬灣岸填海的觀光腹地，夜裡街上沒什麼店。房量近九百，旺季比同區其他選項容易訂到，這才是它在灣岸行程裡真正的用處。",""],
[156,"京王プラザホテル札幌","札幌・北海道","北海道","京王","京王",1,"JR 札幌站西口步行約五分的 22 層老牌，開業約四十年，2025 年 5 月把最上層 21 樓改成 12 室的新房型。自助早餐用北海道食材，評價長年穩定。無大浴場，客房浴室多為一體式，房型偏小。隔鄰是五層自走式停車樓、約 300 席，一晚 2,000 圓，自駕好處理。位置在車站前的商辦密集帶。札幌一線滿房或跳價時，它是最不會出錯的第三順位。",""],
[157,"Courtyard 福井","福井・福井","中部","Marriott","Courtyard",1,"2024 年 3 月隨北陸新幹線延伸開業，福井站西口步行兩分，設在 28 層大樓的 17 至 28 層，客室全數 25 平方公尺以上。停車 300 席收費，福井交流道車程 15 分。館內以健身房為主，沒有大浴場，本身不具觀光價值。立地是縣廳所在的站前街區，白天有生活感，入夜安靜。福井的住宿選項本就稀薄，這是縣內最新也最好預測的一晚，只在行經時成立。",""],
[158,"Courtyard 名古屋","名古屋・愛知","中部","Marriott","Courtyard",1,"2022 年 3 月開業，360 室，地下鐵伏見站步行八分，往榮與名古屋站兩邊都好移動。房間與公共區都是新建規格，同價位的名古屋老店在房況上比不了，另設可容五百人的宴會廳。沒有大浴場，附帶設施僅止於基本。位置在辦公樓與老商街的交界，白天忙碌，晚上店家收得早。名古屋停留一兩晚時它可靠，卻不必為它安排行程。",""],
[159,"Courtyard 札幌","札幌・北海道","北海道","Marriott","Courtyard",1,"2024 年 7 月開業，321 室，地鐵中島公園站步行三分，館內設大浴場，這在札幌的國際連鎖裡不多見。房間是該系列的標準尺度，不寬敞但全新，停車一日 2,500 圓。門口正對中島公園，往北走幾分鐘就進薄野，綠地與鬧區各佔一邊，夜歸方便又不至於吵。用途明確：札幌一線滿房或跳價時的替代，新舊與位置都接得住。",""],
[160,"Courtyard 白馬","白馬・長野","中部","Marriott","Courtyard",2,"72 室的山岳度假館，前身 1996 年開業，2018 年 12 月轉為現名。引白馬姬川溫泉，大浴場與露天都有，停車免費。冬季當滑雪基地，但到八方尾根等主要雪場要開車或搭接駁，不算 ski-in。綠季房價明顯回落，適合北阿爾卑斯健行。立地是白馬村的度假散居帶，四周開闊，生活機能得靠開車。白馬少數的西式選項，站得穩，卻不會是出發的理由。",""],
[161,"ザ・レイクビューTOYA 乃の風","洞爺・北海道","北海道","野口観光","料理旅館",2,"164 室全數面湖，2022 年 10 月完成乃之風俱樂部館的改修。頂層的天空露天風呂與湖面連成一線，另有貸切風呂，自助餐完成度穩定，夏季湖上煙火在房內就看得到，停車免費。位置在洞爺湖溫泉街上，出門就有店家，是熱鬧的溫泉町而非孤立度假地。餐與服務都在同區價位的水準內，沒有超出之處。同一座湖的溫莎是另一個量級，這裡是預算收斂時的那一邊。",""],
[162,"ヒルトンニセコビレッジ","新雪谷・北海道","北海道","Hilton","Hilton",2,"506 室，纜車站就在館旁，搭約十分鐘上安努普利山頂，滑雪季可直接進出雪場。溫泉大浴場與露天完備，泉質為鈉碳酸氫鹽硫酸鹽泉，停車 500 席。建築世代舊，房間與公共區都看得出年紀。立地是村外的獨立度假腹地，四周沒有街，晚餐幾乎只能在館內解決。它的意義集中在雪季那幾個月的位置優勢，其餘時間順路睡一晚就夠。",""],
[163,"界 津軽","大鰐・青森","東北","星野リゾート","界",3,"40 室，位在大鰐溫泉，津輕三味線的現場演奏與こぎん刺繡的客室設計是它的記憶點。浴場引大鰐溫泉，露天做成雪屋般的拱形屋頂，冬季雪見完整。JR 大鰐溫泉站接送約五分，碇關交流道車程 20 分，停車免費。館外是規模不大的溫泉町，沒什麼可逛。星野系有餐飲與定價不對等的紀錄，訂前先查當期料理評價。青森行程順路的一泊二食，專程前往就過頭了。",""],
[164,"奈良ホテル","奈良・奈良","關西","JR","クラシック",2,"1909 年開業，本館為辰野金吾設計的桃山御殿風木造建築，本館 62 室、新館 65 室，合計 127 室。新館設男女分浴的大浴場並附三溫暖；本館房間與衛浴則是古典建築的常見侷限，不能用現代規格期待。位置在奈良公園南側的高台，四周是社寺與林地，安靜但入夜沒有店家，近鐵奈良站約 1.2 公里。時代感本身就是主商品，衝著建築與陳設而來才划算。",""],
[165,"Hotel Indigo 長崎グラバーストリート","長崎・長崎","九州","IHG","Indigo",2,"2024 年 12 月開業，66 室，由紅磚修道院改建，舊聖堂改成的餐廳是館內主角。長崎站車程約八分，停車一晚 2,200 圓，無大浴場。位置在哥拉巴園旁的南山手坡地，白天正在觀光動線核心，入夜店家幾乎全收，坡道也不好走。走長崎史蹟時它是最好的落腳處，建築本身有看頭，但撐不起一趟專程。",""],
[166,"川奈ホテル","伊東・靜岡","中部","プリンス","クラシック",2,"1936 年開業，2026 年迎來 90 週年的高爾夫度假館，富士見球場與昭和年代的賓客名冊是它的資產。館內溫泉設施 Brisa Marina 設有露天風呂與貸切浴，這點常被低估。伊東站有接駁車但需事先預約，自駕以外進出並不輕鬆。不打球的話能做的事有限，客房設備也停在翻新前的水準，古典飯店巡禮順路住合適，特地折返則否。",""],
[167,"Hilton 名古屋","伏見・愛知","中部","Hilton","Hilton",1,"卡在榮與名古屋站中間的老牌大箱，兩頭都要走一段，退開主幹道因此夜間安靜。館內有室內泳池與健身設施，房間尺寸在同區算寬，但整體是上一代規格。Conrad 進名古屋後它的定位往下移，如今就是壓預算時的那一晚。",""],
[168,"ホテルオークラ神戸","神戶・兵庫","關西","オークラ","オークラ",1,"神戶港邊的高層老牌，メリケンパーク 就在旁邊，三宮一帶步行可達而本身退開鬧區。客房依朝向分看港灣或市區夜景，眺望與待客是評價裡最常被提到的兩項。建築年紀不小，房內設備偏舊。神戶多半是行程中的一段而非目的地，這裡是港區停留時最不會出錯的選擇。",""],
[169,"都ホテル博多","博多・福岡","九州","近鉄","都",1,"博多站直結，地下鐵東 7 出口步行約一分鐘。全客室型 30 ㎡ 起，比一般商務尺度寬出一截；頂樓天然溫泉水療含泳池與露天池，站直結加溫泉的組合在博多幾乎沒有第二家。餐飲不是來這裡的理由。移動日在博多過夜它效率最高，周邊入夜熱鬧也代表吃飯不必移動。",""],
[170,"ホテル日航福岡","博多・福岡","九州","日航","日航",1,"博多站徒步三分，地下道可直接走到，360 室規模。2025 年 9 月完成客房翻新，讓它在博多的老牌群裡重新有了說服力，待客規格則是日航系一貫水準。車站正面的繁華段，餐飲選擇不缺但夜間人聲多。性質仍是純過夜的城市館，路過好用，停留無感。",""],
[171,"ホテルオークラ福岡","中洲・福岡","九州","オークラ","オークラ",1,"中洲川端站直結，位於博多 River Ain 內，屋台與川端商店街都在徒步範圍，吃完不必再移動。館內設有健康俱樂部，含泳池與健身房，餐飲設施九處算多。客房內裝世代偏舊是明顯短板。想在中洲吃喝、又要睡得安靜的夜，它是穩的那個，僅此而已。",""],
[172,"Hilton 福岡シーホーク","百道・福岡","九州","Hilton","Hilton",1,"有演唱會或球賽時這個位置無可取代：百道海濱的灣景大館與 PayPay ドーム相鄰，福岡塔就在旁邊，館內有泳池與海景餐廳。距天神、博多都要車程，館外餐飲選擇有限，沒有活動的日子就只是偏遠的海邊。平日房價低是唯一補償，有票在手它才成立。",""],
[173,"プレミアホテル門司港","門司港・福岡","九州","プレミア","プレミア",1,"門司港懷舊區的港畔飯店，客房看關門海峽與大橋，大正時期街區與燒咖哩店群都在徒步圈，渡輪五分鐘到下關唐戶市場。觀光街入夜收得早，晚餐要抓時間。館內設施簡單，餐飲不必期待，門司港本身也只是半天的量。關門海峽行程要過夜就選它，其他情況沒有理由。",""],
[174,"Hilton 沖繩北谷","北谷・沖繩","沖繩","Hilton","Hilton",1,"北谷美國村旁，出門就是餐廳與店家聚落，有海景泳池與日落海岸。它賣的是不排景點、晚上有地方吃飯的沖繩住法，代價是商圈邊緣的人聲。房間與設施都只算中上，海灘品質比不上恩納一線。本島中部移動或行程收尾時好用，別把它當目的地。",""],
[175,"シェラトン・グランデ・トーキョーベイ","舞濱・千葉","關東","Marriott","Sheraton",1,"接駁班次密集，館內有大浴場，公共設施在舞濱同區的度假飯店裡算齊全。位置在園區外圍的飯店群中，館外走不到什麼店，晚餐幾乎綁在館內。房間偏舊、旺季房價會失控，是常被提到的兩個問題。除了跑園區之外沒有停留理由；真要進園，它是這一區最順的一晚。",""],
[176,"ヒルトン東京ベイ","舞濱・千葉","關東","Hilton","Hilton",1,"同樣在舞濱園區旁，房型分級細、親子房比例高，接駁與位置條件跟喜來登幾乎一致，館外同樣沒有餐飲選擇。差別在館內沒有大浴場，設施陣容略薄一些，換來的是同期間常見的更低房價。園日兩者二選一，看的是預算與泡湯需求，服務的都是同一個場景。",""],
[177,"Sheraton 沖繩 SunMarina","恩納・沖繩","沖繩","Marriott","Sheraton",1,"恩納海岸的老牌度假箱，私人海灘與海上活動項目齊全，設施完整但體驗平均。館外沒有街可逛，晚餐基本在館內解決。價位落在瀨良垣與 Halekulani 之下一級，是沖繩西海岸的預算選擇。房間與餐飲都平實，適合把預算留給行程裡其他天。",""],
[178,"ルネッサンスリゾートオキナワ","恩納・沖繩","沖繩","Marriott","Renaissance",2,"館內養有海豚，開放付費共游，是恩納一帶的老字號家庭度假旅館。設施密度在恩納一線裡偏高，但客層熱鬧、房型偏舊，兩人安靜行程不會加分。位置需開車進出，館外幾乎沒有選擇。西海岸自駕排得進就排，排不進也沒有損失。",""],
[179,"グランドメルキュール沖縄残波岬","讀谷・沖繩","沖繩","Accor","グランドメルキュール",1,"殘波岬旁的大型度假設施，2024 年改掛 Grand Mercure 招牌，房價維持在一萬台幣內。讀谷陶藝村與殘波岬燈塔都在車程十分鐘內，自駕停車無虞，但館外走路能到的地方接近於零。品質屬團體度假等級而非精緻路線，讀谷周邊有安排時它撐得住，否則沒有選它的理由。",""],
[180,"オキナワ マリオット リゾート&スパ","名護・沖繩","沖繩","Marriott","Marriott",2,"名護高台上的大型度假旅館，客房面向東海，館內有溫泉浴場與大泳池。距美麗海水族館車程約四十分，是沖繩北部行程常見的落腳選擇。高台位置需開車，晚餐多半留在館內。規模大、服務標準化，體驗缺少記憶點，北部行程需要就近過夜時它最省事。",""],
[181,"Hilton 宮古島","宮古島・沖繩","沖繩","Hilton","Hilton",2,"宮古島南岸，2023 年落成的大型飯店，無邊際泳池朝伊良部大橋方向。房價比 Rosewood 與 Iraph Sui 低一大截，新箱加合理價是賣點。海灘不在腳下、館外覓食不便，周邊入夜幾乎沒有選擇，晚餐多半綁在館內。宮古行程要壓預算時的第一順位。",""],
[182,"シギラベイサイドスイート アラマンダ","宮古島・沖繩","沖繩","南西楽園","南西楽園",2,"シギラリゾート腹地內的全套房棟，園區同時有溫泉與高爾夫球場，規模為宮古島最大。附私人泳池的房型以同等級價位看相對便宜。園區自成一區，館外幾乎沒有覓食選擇，晚餐綁在腹地內。當成不出園區的度假，它是頂級雙雄之外的第三選項。",""],
[183,"南紀白浜マリオット","白濱・和歌山","關西","Marriott","Marriott",2,"白良濱就在樓下，海景房正對沙灘，館內有溫泉大浴場，停車位充足。南紀方向的自駕行程裡，它是設施最穩的一間。位置退開白濱溫泉街主要動線，本身安靜，走出去仍是海灘。料理與服務屬連鎖標準規格，缺少紀州在地感，適合承接白濱兩晚裡的其中一晚。",""],
[184,"浜千鳥の湯 海舟","白濱・和歌山","關西","共立リゾート","共立リゾート",2,"白濱崎の湯旁的海崖溫泉旅館，招牌是面海的混浴露天「浜千鳥の湯」，另有三處貸切風呂。共立集團旗下發揮較好的一間，湯的條件在白濱數一數二。周邊屬溫泉街，有街可逛但入夜收得早。客房與料理只算中上：以泡湯為主軸時選它，重設施則選インフィニート。",""],
[185,"ホテルニューアワジ","洲本・兵庫","關西","ニューアワジ","料理旅館",2,"洲本溫泉小路谷海岸的老牌大型旅館，館內有「淡路棚田の湯」與「くにうみの湯」兩處溫泉浴場，露天池望得到海峽，冬季供應淡路三年虎河豚會席。別墅棟「楽園」每間附客室露天風呂。館內分多棟，等級與價差明顯，訂房要看清楚棟別。館區離洲本市區有一段，入夜安靜、館外幾乎沒有覓食選擇，晚餐會留在館內。想要離島感又不想搭船時，關西開車兩小時內就到。",""],
[186,"Centara Grand 大阪","難波・大阪","關西","Centara","Centara",1,"泰國 Centara 進日本的第一間，2023 年於難波道頓堀一帶開幕。泰式 SPA 與泰菜餐廳是同區新飯店少有的差異點。位置在餐飲密集的鬧區，走幾分鐘就有便利商店與吃的，代價是入夜人聲不斷。客房規格中規中矩，房價通常壓在一萬台幣內。難波要新房又要控預算時的選擇，超出這個前提就別找它。",""],
[187,"ホテルニューオータニ大阪","大阪城・大阪","關西","ニューオータニ","ニューオータニ",1,"大阪城公園正對面的老牌大型飯店，城景房與繞護城河的晨跑路線是長處，房價長期偏低。位置退開心齋橋一帶的喧鬧，本身安靜，但也代表出門吃飯要多走一段。館齡明顯，客房裝修落後同價位新箱一截。適合把大阪城當行程重點的人，圖的就是省事與價格。",""],
[188,"都ホテル 岐阜長良川","岐阜・岐阜","中部","近鉄","都",1,"長良川畔的近鐵系大型飯店，距 JR 岐阜站與名鐵岐阜站開車各約十分鐘，走出去就是鵜飼觀覽船搭乘處，館內有可眺望金華山的展望浴場，另設健身房與泳池。位置離市區鬧區有一段，周邊入夜安靜，吃的選擇不多。岐阜市內中階連鎖以外幾乎沒有替代品，它是當地唯一像樣的大箱，圖的是岐阜過夜有著落。",""],
[189,"オークラアクトシティホテル浜松","濱松・靜岡","中部","オークラ","オークラ",1,"濱松站旁 Act City 高塔上的大倉系飯店，樓層高、視野開闊，是靜岡西部規模最大的一間。車站直結省去拖行李，鰻魚名店與濱名湖方向都好出發，周邊餐飲選擇多但入夜偏吵。館齡不新、餐飲評價普通，當城市基地稱職，不構成專程前往的理由。",""],
[190,"三井ガーデンホテル京都新町別邸","新町・京都","關西","三井ガーデン","三井ガーデン",1,"三井花園在京都的上位線，內裝走町家意匠，地下鐵四條站步行約七分，館內設炭酸泉大浴場。位在新町通巷內，退開四條烏丸的人流，本身安靜而徒步仍可達商圈。同系列品質穩定，房間乾淨但坪數不大，是進出方便的過夜點而非目的地。京都房價高漲的當下，壓在一萬內還有大浴場的選項不多。",""],
[191,"ザ・セレスティン京都祇園","祇園・京都","關西","三井ガーデン","セレスティン",2,"三井系上位品牌在祇園的據點，八坂通與建仁寺都在徒步範圍，館內有大浴場。位置退開四條通主動線，本身安靜，走出去又還在祇園。服務水準比一般商務系高一階。房間偏小、缺少京都傳統旅館的細節，價格已接近一萬五：想住祇園又不想花到旅館價時才划算。",""],
[192,"ホテルインディゴ東京渋谷","澀谷・東京","關東","IHG","Indigo",2,"道玄坂上的設計系精品旅館，66 室規模，2023 年開業。內裝把澀谷的次文化語彙做得直白，喜好分明。車站與餐飲都在步行數分內，代價是入夜周邊持續吵雜。房間偏小、附屬設施也薄，這兩點是明確短板。澀谷有事時住得舒服，但不構成專程來東京的理由。",""],
[193,"ひらまつ 賢島","志摩・三重","中部","ひらまつ","オーベルジュ",4,"法餐集團ひらまつ的旅館線，2016 年開業於英虞灣畔，僅 8 室（本館四室、別邸四室），定位是餐廳附客房。晚餐是主商品，伊勢志摩食材的法式做法評價方向穩定。館外幾乎沒有其他選擇，用餐綁在館內。客房與公共設施相對簡單，房價卻已進三萬區間；房數少，旺季要提早排。志摩想吃法餐就選它，要海幸與傳統則選志摩觀光。",""],
[194,"界 出雲","玉造溫泉・島根","中國","星野リゾート","界",3,"玉造溫泉的界，主題語彙圍繞出雲神話與美肌之湯，開車到出雲大社約三十分。溫泉街就在館外，有街可逛但入夜收得早。相對長樂園那類老牌大旅館，它提供的是現代設計版的一泊二食。星野系有溢價紀錄，訂前先查當期會席評價。山陰行程順路住一晚可以，不到專程的等級。",""],
[195,"アオアヲ ナルト リゾート","鳴門・德島","四國","オリエンタル","オリエンタル",1,"鳴門海峽邊的度假旅館，自助餐以鳴門鯛與阿波食材為主，評價穩定，館內另有溫泉。觀潮船碼頭與大塚國際美術館都在車程十分鐘內，常被排成進四國的第一晚。館外覓食選擇有限，晚餐實際上會留在館內。房價壓在一萬內，設施與服務中規中矩，睡得安穩就是全部。",""],
[196,"JRホテルクレメント徳島","德島・德島","四國","JR","クレメント",1,"德島站直結，出站步行一分鐘進館，是德島市內規模與穩定度最高的一間。往鳴門、祖谷方向的出發與回程都好接，車站周邊餐飲選擇多。客房與餐飲沒有記憶點，房價與體驗都停在中規中矩。四國東側可選的連鎖本來就少，路過德島時它是最不會出錯的一晚，但不構成造訪理由。",""],
[197,"グランドプリンス高輪 貴賓館","高輪・東京","關東","プリンス","プリンス",2,"高輪的舊竹田宮邸，1911 年竣工的洋館，坐落在集團日本庭園腹地內。需要注意的是貴賓館本身登記為婚宴與宴會設施，官網並不提供住宿，實際過夜在同腹地的グランドプリンスホテル高輪。庭園的安靜配上品川站的距離確實少見，但若以住宿論，這個名字指向的不是客房產品，資料需要重新確認。",""],
[198,"ACホテル東京銀座","銀座・東京","關東","Marriott","AC",1,"萬豪旗下歐系精簡品牌，位在銀座外圍，設計清爽、房間小而整齊，房價常壓在一萬內。沒有大浴場，公共空間有限，餐飲只做輕食。退開銀座主要動線，走幾分鐘回到商圈，安靜與便利勉強兼顧。它的作用是在銀座一帶取得可預期的一晚，用途明確，上限也同樣明確。",""],
[199,"アロフト大阪堂島","堂島・大阪","關西","Marriott","Aloft",1,"北新地一帶的設計系飯店，音樂主題貫穿公共空間，客層偏年輕，入夜大廳熱鬧。梅田與本町都在徒步或一站距離，餐飲與便利商店不缺，代價是周邊夜裡不安靜。房間不大、隔音一般，房價經常低於一萬。適合短住不適合久待，把它當落腳處用剛好。",""],
[200,"voco 大阪セントラル","本町・大阪","關西","IHG","voco",1,"IHG 中價位副牌設在本町，鄰近地鐵本町站，設計語彙偏年輕，商辦區的夜晚比難波梅田收斂。房型與服務屬中階水準，沒有大浴場，館內餐飲也無可著墨。它的位置是大阪同集團其他館滿房時的補位選項，房價通常在一萬內，補位大致就是它能提供的全部。",""],

[1,"藤屋","銀山溫泉・山形","東北","獨立","料理旅館",4,"銀山溫泉街中段的八室小宿，2005 年由隈研吾操刀改建、2006 年七月重新開業，木造立面配細格柵。館內不設大浴場，改以五處貸切湯二十四小時開放，不限時段。雪季煤氣燈河岸的景觀在日本沒有同類替代，房量又只有八間，這是它列獨立榜首位的理由。車停在銀山入口的停車場再聯絡旅館，日期得先遷就它。","◎"],
[2,"由布院 玉の湯","由布院・大分","九州","獨立","料理旅館",4,"由布院御三家之一，雜木林庭園中散置獨棟客室，全室配源泉掛流的木製內風呂。餐飲評價長年在由布院前列，泉質溫和，自駕停車不成問題。由布院有品牌溢價名不符實的前例，玉の湯屬於料理與湯都經得起檢驗的那一類，把九州行程繞著它排說得過去。溫泉街入夜收得早，晚上就留在館內。",""],
[3,"由布院 亀の井別荘","由布院・大分","九州","獨立","料理旅館",4,"御三家的另一極在金鱗湖畔，森林中的獨棟離れ，古典幽靜，文人旅館的氣質與餐飲水準長年穩定，最大的七番館達 140 ㎡。與玉の湯同級，差別在調性而非高下，亀の井沉靜，玉の湯明快。停車方便，自駕九州時足以撐起整趟行程的一泊二食。金鱗湖一帶白天觀光客多，入夜反而清靜。",""],
[4,"登別 滝乃家","登別・北海道","北海道","獨立","料理旅館",4,"登別的老舖料理旅館，白濁硫磺源泉配懷石，餐、湯、服務同時到位，在北海道料理旅館中屬最上層。本榜其餘料理旅館的評分刻度都以它為基準，至今沒有明顯超越者，為它安排一趟北海道成立。登別溫泉街觀光化，入夜商家收得早，出門的樂趣有限，適合整晚待在館內慢慢用餐。","★"],
[5,"坐忘林","新雪谷・北海道","北海道","獨立","料理旅館",5,"新雪谷原野中央的十五棟獨立客室，每棟都配源泉掛流的內風呂與露天，大面落地窗直接對著林地。現代建築語彙與湯宿格式接在一起，取得米其林二鑰匙，北海道唯一一間，餐飲走北懷石路線，評價長年偏高，夏冬兩季各有看頭。館外幾乎沒有選擇，晚餐綁在館內，距二世古市街有段距離，沒有車就出不去。",""],
[6,"Palace Hotel 東京","丸之內・東京","關東","獨立","獨立",4,"皇居護城河畔的日系獨立飯店，丸之內一帶少見的獨立經營者。半數以上客室帶露臺，這在東京城心不常見，但並非全館皆有，訂房時要挑房型。2025 年米其林三鑰匙，連續第二年，服務與餐飲長年列東京前段，走到東京車站在步行範圍，護城河側入夜安靜，離大站近卻不吵。頂級體驗與進出便利同時成立的城市飯店不多。",""],
[7,"天空の森","霧島・鹿兒島","九州","獨立","獨立",5,"霧島高原私有地上僅五棟溫泉付villa，以極低的密度換取整片山景。這種一組客人對著一整座山頭的形式在日本找不到對照組，光這一點就足以讓南九州為它成行。價格屬全榜最高一級，內容就是一泊二食與景觀，館外沒有任何選擇，餐與夜全綁在山上。適合鹿兒島行程的單次主菜，不宜連住。",""],
[8,"別邸朧月夜","道後・愛媛","四國","獨立","料理旅館",4,"七種房型全部附露天風呂並直引道後源泉，全館 19 室。道後溫泉街徒步可達卻退開主要動線，本身安靜，停車有位。餐飲評價長年偏高，是四國一泊二食裡條件最齊的一間，把行程對準它成立。房數不多，瀨戶內行程又集中在春秋兩季，旺季房況緊，時機要先卡好再談其他。","⏳"],
[9,"あさば","修善寺・靜岡","中部","獨立","料理旅館",5,"修善寺老舖，池上能舞台是招牌，Relais & Châteaux 成員，2025 年由二鑰匙升格米其林三鑰匙，餐、庭、湯的古典完成度在關東圈料理旅館裡公認居首。它代表傳統旅館的最高規格而非新意，衝著這一點排一趟伊豆說得過去。東京進出約兩小時，停車方便，溫泉街入夜安靜，適合伊豆自駕時排一晚。",""],
[10,"強羅花壇","箱根・神奈川","關東","獨立","料理旅館",5,"箱根最高階的老舖，建在閑院宮別邸舊址，迴廊建築與庭景是核心。2025 年米其林三鑰匙，連續第二年，餐飲、泉質、服務長年在箱根居首，東京圈內要找同規格的一泊二食沒有替代選項。價格頂級，房型落差大，低階房的空間感與價位不太相稱，訂前要看清楚圖面與坪數。強羅入夜安靜，這一晚不必再安排外出。",""],
[11,"忘れの里 雅叙苑","妙見溫泉・鹿兒島","九州","獨立","料理旅館",4,"移築各地古民家而成的茅葺聚落，僅 8 棟客室，全室配源泉掛流風呂，庭院放養地雞。餐飲以地雞爐端與自家菜園為軸，食材多半自給。天降川峽谷裡的小溫泉聚落，四周無街可逛，也無鐵道站，需自駕或事先安排接送，館前有免費平面停車。野趣做到精緻而不是將就，2025 年米其林金鑰匙由一鑰升為二鑰，鹿兒島首見。與天空之森同一主理人，鹿兒島行程可各排一晚。",""],
[12,"西村屋本館","城崎溫泉・兵庫","關西","獨立","料理旅館",4,"城崎的百年名門，34 室，數寄屋建築配庭園，列米其林二鑰匙，松葉蟹季的會席在關西屬最高一級。位置在溫泉街裡側，外湯巡禮走得到，夜晚有事可做，這點勝過多數封閉型的蟹宿。城崎溫泉車站步行約 15 分，另有旅館公會的免費巴士，車可直接開進玄關前，停車免費。淡季的料理與房價落差大，價值集中在冬天，離了蟹季就只是一家漂亮的老宿。",""],
[13,"瀬戸内リトリート青凪","松山・愛媛","四國","獨立","設計系",4,"安藤忠雄設計，前身是美術館，全 7 室皆為套房，面積都在 100 ㎡ 上下，部分房型配半露天的溫泉寢湯，列米其林一鑰匙。位置在松山近郊的山腰林間，屬孤立型度假地，四周沒有街可逛，松山車站開車約 35 分，必須自駕，館內備停車。以建築空間本身作為住宿主體，餐飲與服務只是稱職，不是賣點。房數極少、進出不便，這兩點壓住了它的名次。","⏳"],
[14,"Azumi Setoda","瀨戶田・廣島","中國","獨立","設計系",4,"2021 年 3 月開業，約 140 年的舊堀內宅邸改建，22 室，面積落在 50 至 70 ㎡，列米其林一鑰匙。對街共構的錢湯 yubune 對外開放，可當大浴場用。位置在瀨戶田港往鹽町商店街的入口，是島上唯一熱鬧的一段街，從港口步行數分鐘就到。完成度高，但體量小、館內設施單薄，住一晚剛好，順著島波海道排進去最合理。冬季島上店家多休。","⏳"],
[15,"雅叙園東京","目黑・東京","關東","獨立","獨立",3,"60 室，全部 80 ㎡ 起跳，這種尺度東京都心沒有第二間，客室配按摩浴缸與蒸氣室，館內另有文化財百段階段與庭園瀑布。位置在目黑車站步行 3 分的坡道下方，緊鄰目黑川，是都心裡相對安靜的一段，附設 400 車位停車場。房間大幾乎是它的全部論點，餐飲與周邊都只是中上，衝著坪數訂才划算，房型之間差價不小。",""],
[16,"華水亭","皆生溫泉・鳥取","中國","獨立","料理旅館",4,"皆生溫泉的最高階旅館，79 室，長年入選日本のホテル・旅館100選，另有全室露天風呂的湯賓館，大浴場配庭園露天，面日本海。立地是海岸線上的溫泉街，街區安靜、入夜幾乎無事可做，米子車站開車約 20 分，館旁 70 台平面停車免費。價值幾乎全押在活松葉蟹會席，11 月到 3 月以外料理落差明顯，訂它等於訂那段季節。山陰自駕的一泊二食，同區沒有更好的替代。","◎"],
[17,"ベラビスタ尾道","尾道・廣島","中國","獨立","獨立",3,"1973 年造船公司迎賓館改建，2007 年成為現名，45 室全面瀨戶內海，館內有展望大浴場與檜風呂，境內設葡萄園。位置在尾道市郊的丘陵高台，屬孤立型度假地，尾道車站開車約 40 分，免費平面停車。目前因改建工程停業，預定 2027 年以新樣貌重開，短期內排不進行程。整體條件好但沒有壓倒性的單項，海景與餐飲都屬同級水準。","⏳"],
[18,"萬平ホテル","輕井澤・長野","中部","獨立","クラシック",3,"1894 年創業的輕井澤古典飯店，經一年半改修後於 2024 年 10 月重新開業，86 室，面積 36 至 91 ㎡。愛宕館 30 室配溫泉內風呂，Alps 館 12 室維持舊貌。位置在舊輕井澤的別墅林間，離銀座通不遠，入夜安靜，輕井澤車站開車約 5 分，備停車場。歷史氛圍與翻新後的舒適同時成立者不多，代價是淡旺季房價落差極大。",""],
[19,"べにや無何有","山代溫泉・石川","中部","獨立","料理旅館",4,"僅 16 室，全室配面山庭的溫泉露天風呂，列米其林一鑰匙，留白的處理貫穿建築與料理，餐飲評價長年在北陸料理旅館前列。位置在山代溫泉邊緣的林地，與溫泉街隔開，安靜但夜裡無處可去，加賀溫泉車站開車約 20 分，15 台免費停車。問題不在品質而在地利，加賀溫泉鄉進出不順，得先有北陸的行程才談得上，冬季雪況先查再訂。",""],
[20,"加賀屋","和倉溫泉・石川","中部","獨立","料理旅館",4,"2024 年元旦能登半島地震受災後停業至今，原本 232 室的宿泊棟已拆除，集團計畫在和倉溫泉街中心地帶重建約 40 室的新館，預定 2027 年度末重新營業。曾拿下第 48 回プロが選ぶ日本のホテル・旅館100選総合第一，服務體系被當作日本旅館的教科書，但大館的人流與團體客讓安靜度不如小型宿。現況無法安排，重開後的規模與定價等同另一間旅館，先觀望再說。",""],
[21,"扉温泉 明神館","松本・長野","中部","獨立","料理旅館",4,"溪谷裡的一軒宿，39 室，招牌是站著泡的立湯「雪月花」，另有配露天的大浴場與寢湯，Relais & Châteaux 成員，餐飲走有機蔬菜懷石，評價長年穩定。扉溫泉的谷底方圓內只有這一家，是完全孤立的山中度假地，松本車站開車約 30 分，備 35 台停車。品質沒有短板，但山路進出讓行程彈性偏低，冬季路況要先確認。",""],
[22,"有馬溫泉 中の坊瑞苑","有馬・兵庫","關西","獨立","料理旅館",4,"50 室的大人限定旅館，13 歲以下不可入住，館內引天神泉源的金泉，月替懷石評價穩定。位置在有馬溫泉街的坡上，神戶電鐵有馬溫泉站步行約 5 分，街道狹窄但館內備 30 台免費停車，神戶市區開車約 40 分。長處在可及性，大阪或京都的行程能直接接一晚溫泉而不動整條路線。品質好卻沒有非它不可的單項，順路接得上才划算。",""],
[23,"ガーデンテラス長崎","長崎・長崎","九州","獨立","設計系",2,"2009 年開業，隈研吾設計，36 室全部面長崎港，稻佐山腰的角度直接對著夜景，另有 20 公尺的無邊際泳池。建築加夜景這個組合在長崎沒有第二家。立地是半山腰的孤立度假地，走不到任何市街，長崎車站開車約 10 分，有免費接駁巴士與免費停車。餐飲與設施屬一般度假飯店水準，賣的是那扇窗，要逛市區的日子不適合。",""],
[24,"山荘無量塔","由布院・大分","九州","獨立","料理旅館",4,"1992 年開業，12 棟離れ各自不同格局，其中包含從新潟移築的百年古民家，全室配內風呂，館內設 Tan's bar 與藝廊，餐飲評價長年偏高。位置在由布院盆地邊緣的山林，離金鱗湖商店街有段距離，安靜但出門得開車，由布院車站約 10 分，30 台免費停車。御三家品質同級而調性各異，無量塔的美學密度最高、湯的份量最輕，看重泡湯該選另外兩家。",""],
[25,"雲仙 半水盧","雲仙・長崎","九州","獨立","料理旅館",5,"五千坪的山谷庭園裡只有 14 棟數寄屋離れ，每棟超過 250 ㎡，列米其林一鑰匙，館內另有大浴場與露天，雲仙的白濁硫磺泉屬一級，長崎和牛與山海懷石評價穩定。位置在雲仙溫泉外圍，與地獄和街區隔開，安靜到近乎孤立，諫早車站開車約 60 分，備停車場。私密性是核心賣點，價格也在全榜最高一級，得靠行程配合才談得下去。冬季路況與淡季氛圍差異大。",""],
[26,"御船山楽園ホテル","武雄・佐賀","九州","獨立","設計系",3,"武雄溫泉站搭車五分，腹地是江戶大名的借景庭園，teamLab常設展與らかんの湯的溫泉桑拿共構，藝術與湯同時成立的案例日本不多。住客免收庭園入園費。客室與餐飲屬中上而非頂級，周邊入夜安靜、可逛的街有限。嬉野武雄溫泉圈的自駕行程順收剛好，不必為它單開一趟。",""],
[27,"和多屋別荘","嬉野・佐賀","九州","獨立","料理旅館",3,"兩萬坪腹地落在嬉野川中洲上，源自江戶期島津家的休憩所，鍋島家別邸移築而成的水明莊仍在使用。近年引入Pierre Hermé咖啡、東方spa與川邊三溫暖，是旅館再生的代表案例。嬉野交流道七分鐘，自駕好進出。腹地大但客室新舊混雜，訂房得先挑棟別。佐賀溫泉圈可靠的一晚，與御船山同趟收。",""],
[28,"妙見 石原荘","霧島・鹿兒島","九州","獨立","料理旅館",3,"妙見溪畔十八室，石藏四室附客室溫泉、本館十四室，其中四室在2023年由竹山聖改裝。館內有七處源泉，不加水不儲槽的掛け流し，石造露天臨溪是主商品。說服力集中在湯而非客室規格，房間不算寬敞。溪谷裡店家極少，入夜後館外沒有去處。鹿兒島的一泊二食選項本來就少，霧島自駕時它是穩的一張牌。",""],
[29,"宮島 岩惣","宮島・廣島","中國","獨立","料理旅館",3,"1854年創業，紅葉谷內，本館玄關保留1892年的構造，離れ是大正昭和期一棟一室的木造，另有新館。若宮溫泉含氡。渡船場步行十五分，島上日歸客散去後的夜只有住客能用。新舊棟差距明顯，訂房要指定棟別。宮島住一晚的最高階選擇，疊進瀨戶內行程正好，本身撐不起整趟。",""],
[30,"石亭","宮浜溫泉・廣島","中國","獨立","料理旅館",3,"宮濱溫泉高台上的十二室庭園旅館，庭與食是主商品。檜木內湯、露天與烏風呂三種浴場，停車二十席並設充電樁，大野浦站車程五分、宮島口十五分。所在是安靜的住宅高台，館外沒什麼可逛，位置也得繞一段。房數少、開放窗口窄，訂房難度高於同級。與岩惣二選一時，石亭取庭與食，岩惣取宮島島內的夜。",""],
[31,"大谷山荘","長門湯本・山口","中國","獨立","料理旅館",3,"音信川畔的大型老旅館，曾作為日俄領袖會談會場。2025年プロが選ぶ日本のホテル・旅館100選（第50回）總合第十位，規模大而水準穩定，這在山口一帶少見。せせらぎ與木もれ日兩處大浴場另加spa。溫泉街本身安靜，館內人流感明顯、客室風格保守，安穩有餘而驚喜不足。萩與元乃隅的自駕圈裡，它是最不會出錯的一晚。",""],
[32,"別邸仙壽庵","谷川溫泉・群馬","關東","獨立","料理旅館",4,"谷川岳山麓十八室、七種房型，2012年起加盟Relais & Châteaux。全客室附源泉掛け流し露天，另有五處湯殿與spa，玻璃迴廊正對雪景。水上站車程八分、水上交流道十分，館外幾乎沒有選擇，晚餐綁在館內。房價在30K級距，上牧水上一線找不到更完整的一泊二食，冬季去才發揮得完整。",""],
[33,"蔦温泉","十和田・青森","東北","獨立","料理旅館",2,"十和田樹海中的一軒宿，泉響の湯自浴槽底部湧出，這種足下湧出全日本只有少數幾處。本館為1918年木造建築，2022年11月增建附半露天風呂的離れ，新舊選擇因此分明。新青森站車程約90分，館外沒有可逛的街。老棟設備簡樸是前提。奧入瀨溪流入口就在近旁，可排成一洋一湯的兩晚。",""],
[34,"Sowaka 京都","祇園・京都","關西","獨立","設計系",3,"祇園百年數寄屋建築改修的小型旅館，本館與新館分屬和洋兩種語彙，館內餐廳為祇園ろか。位置在八坂與建仁寺之間，巷內安靜，步行可達的密度是京都最好的一級，出門就是觀光客最密的一段路。沒有自有停車位、房數又少，非自駕行程才用得上，賞櫻與紅葉期要提早很多訂。","★"],
[35,"丸福樓","河原町・京都","關西","獨立","設計系",3,"任天堂舊本社屋改建，安藤忠雄增築，昭和洋館與清水模並置的完成度高，含餐方案的餐飲評價穩定。位在鍵屋町巷內，退開河原町的主動線，安靜但步行仍可達商圈。房數少、房價不低，賣點高度集中在建築本身。對建築有興趣才划算，否則同價位的京都選項面面俱到得多。",""],
[36,"神戸北野ホテル","神戶・兵庫","關西","獨立","獨立",2,"異人館區北野坂上的小型オーベルジュ，主商品是法式早餐，晚餐加購為同一水準，餐飲評價明顯高於住宿本身。客室與公共空間中規中矩，坡道位置拖行李不輕鬆，周邊入夜安靜、店家不多。以一頓餐當住宿理由的少數案例，也僅止於此。神戶行程順路排一晚剛好，構不成專程的理由。",""],
[37,"有馬溫泉 陶泉 御所坊","有馬・兵庫","關西","獨立","料理旅館",3,"鎌倉期以湯口屋創業，有馬最古老的一脈，八百餘年下來每室間取與陳設皆不同。金泉浴場保留半露天半混浴的野趣設計，山椒魚鍋這類獨創會席有記憶點。館舍走陰翳路線，光線暗、客室偏舊，不是所有人吃得下這種美學。有馬溫泉站步行約五分，門前就是湯本坂商店街，白天人聲不斷。御所坊取歷史與趣味，中の坊瑞苑取安靜與新度。",""],
[38,"リバーリトリート雅樂倶","富山・富山","中部","獨立","設計系",3,"神通峽畔的美術館型旅館，建築、作品、茶室與聲響一體規劃，藝術密度在北陸沒有對手。館內有溫泉大浴場、貸切風呂、岩盤浴與圖書室。位在富山市春日，離市區有一段，周邊生活機能有限，非自駕不便是前提，也是它上不去的原因。北陸行程裡它負責質感那一晚，安排在移動日之後最合理。",""],
[39,"かよう亭","山中溫泉・石川","中部","獨立","料理旅館",4,"山中溫泉東町的小型隱宿，鶴仙溪畔，溫泉街末端，入夜安靜、館外沒什麼可逛。主打無添加懷石，冬季另有蟹與鴨鍋方案。房價站上30K級距，換到的是密度極低的住宿體驗而非華麗設施；館舍不新，期待現代規格的人會失望。價格與設施的落差擋住它往上走。定位是加賀溫泉鄉的深度玩法，初訪北陸的行程不必先排它。",""],
[40,"光風湯圃 べにや","蘆原溫泉・福井","中部","獨立","料理旅館",4,"蘆原溫泉的老旅館，2024年以數寄屋新築重新開業，全客室附源泉私湯，是北陸少見的全新和風設備。溫泉街入夜收得早，館外選擇有限。越前蟹季的會席是它的年度主場，其餘季節說服力下降不少。房價已在30K級距，不在蟹季就沒有安排行程的理由。",""],
[41,"望洋楼","三國・福井","中部","獨立","料理旅館",4,"三國港的越前蟹專門宿，自家漁船直送，蟹季一泊二食站上30K級距仍常滿房。位在漁港聚落，東尋坊車程5分，入夜周邊安靜無店家。價值高度綁在11月到3月的蟹，夏季轉成海水浴語境，同樣房價買到的東西完全不同。只在對的季節成立，其餘時候不必特地安排。",""],
[42,"里山十帖","南魚沼・新潟","中部","獨立","設計系",3,"由雜誌《自遊人》團隊經營的古民家再生旅館，位在南魚沼，以食為核心，魚沼米與發酵料理評價穩定。豪雪期的雪見露天是一年裡最好的時候。位置深入山間，周邊沒有商店街，交通得自理，客室走簡素路線。新潟行程需要一個有主張的落點時用它。",""],
[43,"赤倉観光ホテル","妙高・新潟","中部","獨立","クラシック",2,"1937年開業的山岳古典飯店，妙高高原的雲海露天是招牌，舊館的老氣質與新翼並存，可依預算挑棟。滑雪季雪道就在門口，非雪季山上幾乎無事可做，周邊沒有街區可逛。以這個歷史與景觀，房價停在15K級距算便宜。上信越自駕途中排一晚較合理。",""],
[44,"富士屋ホテル","宮之下・神奈川","關東","獨立","クラシック",2,"1878年創業，日本古典飯店的原點，2020年完成耐震改修。花御殿的唐破風配洋室是明治期想像力的實物，館內咖哩本身就是觀光內容。位在宮ノ下，車站步行可達，周邊是安靜的小店街。房價15K級距，以歷史含量算便宜。溫泉與客室規格不敵箱根新派，把它當建築見學，別期待泡湯規格。",""],
[45,"箱根吟遊","宮之下・神奈川","關東","獨立","料理旅館",4,"全客室附露天，蓋在早川溪谷懸崖上，山谷視野在箱根排第一，SPA與湯的組合完整。崖邊位置安靜，周邊沒有街區，進出靠車或接駁。相對地預約難度也是箱根前段，房價落在30K級距，餐飲屬穩定而非亮點。景觀之外的項目都只中上：以景為先時選它，要格局看強羅花壇。",""],
[46,"金乃竹 塔ノ澤","箱根・神奈川","關東","獨立","料理旅館",4,"要走過早川吊橋才能進去的竹林隱宿，23室、大人限定，全客室附露天，隔絕感在箱根最強。行李有專人接駁，進房後幾乎不用移動，周邊也沒有可逛的地方。房價30K級距，餐飲中規中矩，賣的是私密與氣氛，內容偏單薄，箱根想安靜獨處時才選。",""],
[47,"乳頭溫泉鄉 鶴の湯","仙北・秋田","東北","獨立","料理旅館",1,"乳頭溫泉鄉的本陣，江戶時代湯治場原樣保留，乳白色混浴露天與茅葺屋根是秘湯的代表形象。位在深山，周邊除溫泉外沒有其他設施，冬季進出需留意路況。房價僅10K級距，代價是暖房、隔音與衛浴都停在舊時代，預約難度也是全國前段。體驗獨特但舒適度極低，放鬆型的行程別排它。",""],
[48,"茶寮宗園","秋保・宮城","東北","獨立","料理旅館",4,"八千坪庭園只配26間客室，這是秋保溫泉的數寄屋旅館，懷石水準在東北屬頂段。距仙台約30分，溫泉街不大、夜裡安靜，可與市區飯店排成城市一晚加溫泉一晚。房價30K級距，設施偏傳統不走新潮，話題性不足以拉高名次。東北行程要安排一晚正式和之宿時，它是解。",""],
[49,"会津東山溫泉 向瀧","會津若松・福島","東北","獨立","料理旅館",2,"會津東山溫泉的木造旅館，屬國家登錄有形文化財。冬季庭園點上雪見蠟燭是它最好的時候，會津鄉土會席有地方感。溫泉街規模不大，入夜安靜，距鶴ヶ城車程短。木造建築的隔音與設備限制得先接受。南東北自駕途中安心落腳，不必為它調整路線。",""],
[50,"城山ホテル鹿児島","鹿兒島・鹿兒島","九州","獨立","獨立",1,"城山高台上的老牌飯店，展望露天正對櫻島，自助早餐的鄉土品項評價穩定，薩摩會席與燒酒吧的地方感濃。位置在山上，安靜但進出市區得靠車或接駁。房價10K級距，以景觀與餐飲密度來說便宜。餐與景之外的規格普通，經過鹿兒島時再排它。",""]

{num:"定番一",title:"IHG 機能線（ANA Crowne Plaza 為主）",rows:[
["ANA Crowne Plaza 富山","富山・富山","中部",1,"面向富山城址公園，離富山站步行約十分鐘，平面停車場就在館旁，位置在市中心但入夜不吵。在 ANA Crowne Plaza 各館裡評價相對突出，房間與餐飲的水準比多數分館穩。北陸自駕把車丟著、當天往返立山或五箇山時，這組裡它最省事。"],
["ANA Crowne Plaza 金澤","金澤・石川","中部",1,"就在金澤站兼六園口正面，出站過個廣場就到，自駕有配套停車，站前熱鬧但房內不受影響。同組裡它勝在位置與停車兩件事同時成立，市內另一間設計系選項要多走一段、停車也麻煩。金澤本身不缺住宿，這間的用途是把進出與搬行李的時間壓到最短。"],
["ANA Crowne Plaza 米子","米子・鳥取","中國",1,"山陰地區少數的國際連鎖，平面停車場直接停在館旁，開車到皆生溫泉約 20 分。位在米子市區，周邊生活機能夠用、入夜安靜。房間與餐飲都只是中規中矩，並不出色，但山陰的可選物件本來就有限，米子進出或自駕經過時，它是這組最不會出錯的一晚。"],
["ANA Crowne Plaza 神戶","新神戶・兵庫","關西",1,"與新幹線新神戶站直結，房間坪數在同價位裡偏大，走去北野異人館一段上坡即到，站區入夜安靜。神戶市區選項不少，它的用處是新幹線進出日省掉一次換車與拖行李。若行程重心在三宮或港區，反而會覺得這個位置偏高了一點。"],
["ANA Crowne Plaza 岡山","岡山・岡山","中國",1,"岡山站前徒步範圍，周邊餐飲密集、生活便利，進出岡山時的過夜用途。同站前還有 JR 系的 Granvia，二選一：要與車站共構、雨天不撐傘選 Granvia，要房間大一點、價格低一點選這裡。倉敷或瀨戶內行程的頭尾夜適用，本身不是停留的理由。"],
["ANA Crowne Plaza 廣島","廣島・廣島","中國",1,"位於平和大通旁，走到平和記念公園與原爆圓頂館都在步行範圍，白天人多，入夜後這一帶反而安靜。房間與服務屬中規中矩，餐飲沒有特別留下來吃的理由。廣島有更好的城市飯店，它的角色是備位：瀨戶內行程排到廣島一晚、又不想在住宿上花心思時用。自駕日的停車方式要先確認，市中心車位不一定在同一棟。"],
["ANA Crowne Plaza 千歲","千歲・北海道","北海道",1,"新千歲機場周邊的過夜點，用途很單一：晚班機抵達或清晨班機出發，把車程壓到十幾分鐘以內。周邊是機場外圍，入夜後幾乎沒有可逛的地方，晚餐得在館內或機場裡解決。房間與餐飲不必期待，它進這組靠的是位置與時間，不是內容。若當天還留有半日行程，住札幌市區其實更划算。"],
["ANA Crowne Plaza 京都","堀川・京都","關西",1,"二條城正對面，在京都少見地備有自家停車位，這是它留在這組的理由。市中心的國際連鎖多半沒車位或要外包，自駕上洛時停車會先決定住哪。這一帶入夜安靜，代價是晚餐選擇少，去四条或祇園得靠地鐵再走一段。房型偏一般，想散步吃晚餐的京都夜，這個位置不適合。"],
["★ ANA Crowne Plaza 熊本ニュースカイ","熊本・熊本","九州",1,"熊本市中心的老牌高樓館，房間與設施都偏舊，周邊便利商店不算近，晚上覓食得往下通那一側走。它在這組屬於後段，用途是九州自駕縱斷時的中繼一晚，把期待值設在乾淨可睡就好。熊本城步行可達，但行程重點若在阿蘇或人吉，這裡只是路過的落腳處。"],
["ANA Crowne Plaza 長崎グラバーヒル","長崎・長崎","九州",1,"位在大浦天主堂與哥拉巴園的坡道下方，南山手一帶的觀光走路就能解決，周邊是住宅與觀光混合的坡地，入夜安靜。同市另一個大型選項在車站側，兩者分工清楚：以觀光為主排這裡，以轉車與行李為主排車站側。坡道地形對長時間步行不友善，行李多或體力有限的日子，這個位置會扣分。"],
["ANA Crowne Plaza 新潟","新潟・新潟","中部",1,"落腳萬代橋一帶，走去古町與市場都在範圍內，晚餐與宵夜不缺選擇，是新潟市內最熱鬧的一側。它的用途是把新潟當轉運站：搭往佐渡的渡輪之前，或前往里山十帖那一線之前，在城市裡先睡一晚。飯店本身沒有特別出色的部分，選它是因為這一帶像樣的大型館不多。"],
["ANA Crowne Plaza 釧路","釧路・北海道","北海道",1,"道東自駕的東側落腳處，幣舞橋走路就到，和商市場也在步行圈內，早上能出門吃勝手丼。市區入夜後店家收得早，晚餐要抓時間。用途明確：釧路濕原、摩周湖、知床那一線的補給與睡覺點。館齡不新，房間普通，但道東的城市住宿本來就沒有更好的替代。"],
["ANA Crowne Plaza 成田","成田・千葉","關東",1,"接駁車制的成田前後泊點，沒有直結通道，夜間班次要先查。周邊是機場外圍道路，走出去沒有東西可吃，用餐只能靠館內。這組裡它勝在館內設施比多數機場旅館完整，房間也大一些。只在兩種情況該用：深夜落地不想再進東京，或隔天一早的班機。其他時候沒有理由住到成田。"],
["ANA Crowne Plaza 松山","松山・愛媛","四國",1,"松山市區，搭市內電車到道後溫泉約十餘分鐘，可以泡完外湯再回來睡。周邊是大街道商店街一帶，吃飯與採買都方便，夜裡不吵。四國的國際連鎖選項少，這是它進入這組的原因。飯店本身走商務規格，房間不大。瀨戶內行程排到愛媛一晚時，用它當城市側據點，溫泉交給道後的公共湯。"],
["ANA Crowne Plaza 宇部","宇部・山口","中國",1,"山口縣少數的大型連鎖館，宇部機場與山陽自動車道都在附近，市區入夜安靜，走出飯店幾乎沒有餐飲可選。它幾乎不是為了自己而住：長門湯本的大谷山莊、元乃隅神社那條自駕線需要一個城市睡點，這裡補上那個空缺。市區本身沒什麼可看，白天不要安排在宇部。"],
["ANA Crowne Plaza 福岡","博多・福岡","九州",1,"博多站步行圈的大型館，規模與房型都算中上，但在福岡這個競爭激烈的市場只能算平均值。周邊是車站商圈，吃飯與交通都方便，屋台與中洲都在計程車起跳距離內，夜裡人聲不算安靜。它的角色是保底：市內頂級館滿房或旺季漲到不合理時，用這裡把住宿問題結束掉。"],

["Hotel Indigo 輕井澤","輕井澤・長野","中部",2,"2022 年開業的設計系旅館，館內有溫泉浴場，位置在輕井澤一帶的林間，周邊安靜、沒有店家，進出與外食都得開車。它在這組的角色是預算對照組：想要森林與湯，又不打算把一晚花到星野系價位時選它。餐飲不是強項，晚餐建議外食。旺季房價會跳，淡季落差相當明顯。"],
["voco 大阪セントラル","本町・大阪","關西",1,"voco 的大阪店開在本町，地鐵御堂筋線與中央線都在步行範圍。這一帶是辦公商圈，晚上安靜，假日店家收得多，吃飯要往南走幾條街。設計感稍強，房間偏小，館內設施精簡。它的場景是同集團市內物件滿房、又想留在商務區時的替補；重心若在難波或梅田，這個位置每天都得多搭幾站。"]
