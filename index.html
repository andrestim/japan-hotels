["Hotel Granvia 京都","京都・京都","關西",2,"就在京都站建物內，下樓即是新幹線與近鐵月台，早餐評價在京都的大型館裡屬穩定的一群。京都住宿的樂趣多半在町家與東山一帶，這間反其道而行，賣的是雨天、大行李、清晨移動這幾種日子的省事。想散步吃晚餐的夜晚別排這裡。"],
["Hotel Granvia 大阪","大阪・大阪","關西",1,"直接蓋在大阪站上方，梅田地下街與百貨都連通，出門與回程不必走到戶外。梅田入夜人潮不散，但客房樓層高，街聲影響有限。房間與裝潢偏舊，翻新樓層與舊房落差明顯，訂房時要看清楚房型。它在這組的位置靠的是價格：同樣是站上的位置，房價常比關西同級低一截。"],
["◎ Hotel Granvia 岡山","岡山・岡山","中國",1,"與岡山站共構，往倉敷與瀨戶內各線都在樓下轉乘。站前商圈入夜後收得早，想吃晚餐要提前出門。房間中規中矩，真正該注意的是停車：收費且進出要繞路，自駕日建議先還車再入住。它適合當長途移動的前一夜或最後一夜，把隔天的班次與行李問題先解決掉。"],
["Hotel Granvia 廣島","廣島・廣島","中國",1,"廣島站新幹線口直結，JR 西日本直營的老牌車站館。客房與餐飲都只是中規中矩，長處是出閘門就到，瀨戶內環狀行程排移動日時最省事。同市的 Sheraton 廣島功能重疊，兩者擇一即可，差別是這間離新幹線閘口更近。"],
["Hotel Granvia 和歌山","和歌山・和歌山","關西",1,"和歌山站直結，與站前商業設施同棟。這一帶國際連鎖近乎空白，從高野山往白濱移動的南紀行程，中途要落腳時它是最不會出錯的一晚。房型是標準商務尺度，別期待寬敞，也沒有大浴場。當作進出用的中繼點就好，不要安排整天待在館內。"],
["Hotel Metropolitan 丸之內","東京・東京","關東",2,"位於 Sapia Tower 27 至 34 樓，東京站日本橋口直結。日本橋口這側人流比八重洲側單純，夜裡安靜。同價位少見這種高度，部分房型能看新幹線進出站。房間不大，但轉車與拖行李的效率在東京站周邊排前列。行程重心在移動的那一晚它最有效率，停留型的東京行則感受不到它的長處。"],
["Hotel Metropolitan 鎌倉","鎌倉・神奈川","關東",1,"2020 年開業，鎌倉站東口步行即達，是這一系較新的設計線。鎌倉市內可靠的住宿本來就少，多數人只能當日往返，要在鎌倉過夜又不想賭小旅館品質時，它是清楚的答案。規模小、館內餐飲選擇有限，晚餐請安排外食，這點先算進去。"],
["Hotel Metropolitan 仙台","仙台・宮城","東北",1,"與仙台站站體同棟。東北新幹線進出日拿它，行李與轉乘的成本壓到最低。設施是老牌規格，翻新程度不如同市的 Westin，但貼站程度更高。安排東北自駕或滑雪行程的頭尾泊時，這一晚不需要花時間比較，把力氣留給溫泉那幾晚。"],
["Hotel Metropolitan 山形","山形・山形","東北",1,"銀山溫泉與藏王都以山形站為進出口，這間就在站邊直結。雪季路況難預測，把前後泊放在站邊能保留改行程的彈性。館內規格普通，餐飲也不突出，但山形市內同級選項本來就少。它的角色是溫泉主菜前後的緩衝夜，這個定位它做得穩。"],
["Hotel Metropolitan 盛岡","盛岡・岩手","東北",1,"盛岡站前，與站直結的大樓內。安比高原、八幡平的自駕多在此換車，冷麵與碗子蕎麥麵的名店都在步行範圍，晚餐不必開車出門。市區規模小，入夜相當安靜。客房屬安穩的老派水準，沒有大浴場。岩手行程需要一個城市夜時拿它，理由是位置，不是館內內容。"],
["Hotel Metropolitan 長野","長野・長野","中部",1,"長野站善光寺口直結。往野澤溫泉、志賀高原的巴士都從站前發車，雪季清晨集合不必拖著行李走雪路。站前一帶生活機能齊全，夜間不吵。設施中規中矩，客房偏小，沒有特別亮點。用途很單一：滑雪或參拜行程的前夜與返程夜，把移動風險降到最低；不碰這兩件事的行程，長野市內另有更舒服的房間。"],
["Hotel Metropolitan 池袋","池袋・東京","關東",1,"池袋西口的老牌大型館，屋齡有感。優勢在規模帶來的房價彈性，平日常低於同區新開的物件，東武東上線與往埼玉方向的班次就在門口。西口鬧區入夜熱絡，圖清靜的話要挑高樓層。房間舊、隔音一般是實情。它成立的條件只有一個：那晚的重點在移動效率，不在房間本身。"],
["THE BLOSSOM 博多","博多・福岡","九州",1,"JR 九州的設計線，博多站步行 3 分，館內設大浴場。這一組多數車站旅館沒有浴場，它是少數兩件事都到位的；世代也比 Granvia 系新一輪，內裝與客房尺度更貼近現在的標準。九州行程的頭尾泊，同組裡優先拿它。"],
["THE BLOSSOM 日比谷","東京・東京","關東",1,"同系的東京店，高層客房外向開窗，設計密度在這個價位少見。與博多店的關鍵差別是沒有大浴場，泡湯需求得另外解決。日比谷、銀座、丸之內都在步行圈內，安排晚上要出門吃飯的東京夜，它比純站內型旅館順得多，這是它在這組裡的用途。"],
["Hotel Vischio 大阪","大阪・大阪","關西",1,"2018 年開業，JR 西日本旗下的年輕副牌，大阪站以北步行 5 分。與同集團的 Granvia 大阪相比位置略遜，屋況卻新得多，房價也低一階。梅田進出的純過夜一晚，它比多數同價位商務館舒服，缺點是離站口有段路。"],
["JRホテルクレメント高松","高松・香川","四國",1,"高松站與高松港雙向直結，往直島、豐島的渡輪碼頭步行可達。跳島行程最怕清晨趕船，住這裡出門時間能壓到十分鐘內。客房是老派商務規格，海側房視野較好。高松市內找不到位置更有利的選項，瀨戶內跳島時同組裡先看它。"],
["JR九州ホテル鹿兒島","鹿兒島・鹿兒島","九州",1,"從鹿兒島中央站閘口出來就是它，站前商業區與路面電車都在門口。館內規格樸素，沒有特別出色之處，但鹿兒島市內的住宿選擇集中在少數幾間，當大型館訂不到或價格失衡時，它是穩定的保底位。移動日單泊最合適，不要為它多留一天。"],
["Hotel Associa 靜岡","靜岡・靜岡","中部",1,"JR 東海系的站館，就在靜岡站上蓋。伊豆與富士周邊的自駕多從此站取車，新幹線接駁只要下樓；站前是靜岡市中心，吃飯採買都在步行範圍，入夜不吵。設施偏舊但維護穩定，客房尺度中等，沒有溫泉或大浴場。它的作用是把長距離移動日切成兩段，讓隔天行程從早上開始。"]
]},
{num:"定番七",title:"指名制料理旅館（一泊二食額度）",rows:[
["★ 登別 滝乃家","登別・北海道","北海道",4,"登別溫泉的老舖料理旅館，位在溫泉街坡上，地獄谷步行可達，館前有自用停車場。自家源泉的硫磺泉，會席與待客的完成度在北海道屬第一線。這一組其他物件的判斷幾乎都以它為對照組，因為餐、湯、服務三項同時到位的旅館並不多。房數少，旺季一房難求，訂房要提早半年起算。"],
["◎ 藤屋","銀山溫泉・山形","東北",4,"銀山溫泉街上的木造老屋，2006 年由隈研吾改建，僅 8 室，木格柵立面是整條溫泉街辨識度最高的一棟。浴場採貸切制，沒有大浴場規模。雪季的銀山是少數還維持舊街景的溫泉場，房量小到近乎搶不到，訂房開放日必須守著才有機會。"],
["◎ 華水亭","皆生溫泉・鳥取","中國",4,"皆生溫泉海岸線上，客室與露天浴池都面日本海。冬季主打活松葉蟹會席，山陰蟹季的餐食水準是它的主要賣點。平面停車就在館前，自駕友善，這在溫泉旅館裡並非常態。反面是淡季的餐食吸引力明顯下降，要吃蟹就得配合十一月到三月的季節窗。"],
["⏳ 別邸朧月夜","道後・愛媛","四國",4,"道後溫泉的高階小型宿，全室配露天風呂，以竹林造景區隔動線。道後的旅館多是大型團體型，這間走安靜路線，是當地少數撐得起主菜位的選擇。瀨戶內環狀行程若只安排一晚一泊二食，它是四國段最合理的落點，代價是房少價高，假日不好排。"],
["あさば","修善寺・靜岡","中部",5,"池畔設能舞台並定期上演能樂，這是修善寺あさば最鮮明的識別，長年被視為關東圈的頂級一列。館址在修善寺溫泉街中心，寺院與竹林小徑都在步行範圍，門前一帶入夜安靜。房數少，價格在這一組最高，一泊二食的預算要拉滿。伊豆只排一晚料理旅館時，它是不需要比較的那一間。"],
["坐忘林","新雪谷・北海道","北海道",5,"新雪谷羊蹄山麓，15 室全室附溫泉，2015 年開業。它不走老派路線，而是把湯宿的語彙翻成當代建築，冬季雪景與大面開窗的關係是整棟的設計核心。北海道雪季一泊二食的最高階選項，價格同樣在這組頂端，非雪季去會少掉一半理由。"],
["忘れの里 雅叙苑","妙見溫泉・鹿兒島","九州",4,"妙見溫泉的茅葺古民家旅館，客室由老屋移築而成，庭內放養地雞，晚餐以爐端燒為主。它不比精緻會席，賣的是野趣與生活感，這個方向做到這種完成度的旅館全日本不多。可與鹿兒島市區泊組成兩晚，缺點是位置深入山間，開車距離得算進去。"],
["強羅花壇","箱根・神奈川","關東",5,"前身是閑院宮家別邸，Relais & Châteaux 成員，館內仍留昭和初期的木造迴廊，位在箱根強羅，登山鐵道強羅站步行可達，周邊是坡地住宅與美術館，晚上很安靜。箱根高階旅館競爭激烈，它的定位是傳統派最上層。首次安排箱根時可拿它當主菜位，另一晚配現代系旅館，一趟看完兩條脈絡。"],
["別邸仙壽庵","谷川溫泉・群馬","關東",4,"全室附露天，客室大面落地窗正對谷川岳溪谷，位在群馬谷川溫泉。北關東的溫泉旅館多半屋況老舊，它是少數館況與餐食都維持在高位的。冬季雪見窗是主要看點，綠季的畫面吸引力則弱一截，非雪季去容易覺得價格偏高，排期得挑季節。"],
["由布院 玉の湯","由布院・大分","九州",4,"由布院御三家之一，林間散策路串起客室與本館，走的是簡素明快而非豪華堆疊。由布院近年觀光化嚴重，價格與體驗不成比例的旅館不少，這間是少數口碑長期穩定的。要在由布院住一晚又不想踩雷，從它開始比較安全，房價則不便宜。"],
["由布院 亀の井別荘","由布院・大分","九州",4,"金鱗湖畔的離れ型旅館，由布院御三家之一，館內有湯之岳庵、茶房天井棧敷與 BAR 山猫，部分特別室配源泉掛流的露天風呂。古典文人路線，庭園與木造老宅的完成度是它與玉の湯的分野。周邊就是湯布院觀光街，白天人多、入夜收得早。安排一晚時偏好老派日式庭園選這間，想要輕盈待客感則換玉の湯，兩間不必都住。"],
["山荘 無量塔","由布院・大分","九州",4,"客室 12 棟全為古民家移築的離れ，各棟附專用溫泉，但館內沒有大浴場也沒有公共露天，這點先確認再訂。Tan's bar、artegio 藝廊、不生庵蕎麥與巧克力工房自成一區，停車 25 台免費。位置在湯布院山側，走不到金鱗湖商店街，館方提供區內接駁。與亀の井別荘的差別在氣質而非等級。由布院一帶有品牌溢價紀錄，訂前查餐飲評價。"],
["石亭","宮浜溫泉・廣島","中國",3,"宮浜溫泉山坡上的數寄屋旅館，僅 12 室沿坡分立，內湯為檜風呂，另有露天與瞑想之湯，停車 20 台並設充電樁。庭園與各室分棟配置是它的識別點，長年走小規模高單價路線。宮島口車程約 15 分，館外除溫泉外沒什麼可逛，入夜相當安靜，晚餐綁在館內。當宮島行程的收尾一晚比廣島市區飯店合適。"],
["宮島 岩惣","宮島・廣島","中國",3,"1854 年創業，紅葉谷入口，宮島棧橋步行 15 分。離れ 4 棟為大正昭和期木造老屋，一棟一室；泉質為含氡的若宮溫泉，館內設大浴場。料理以瀨戶內海鮮與宮島食材為主，走老舖會席路線。住島上的差別，是渡輪停駛後大鳥居周邊幾乎沒有人，白天則整條參道都是遊客。房型新舊落差大，訂房要指定棟別，紅葉期價格與難度都跳一級。"],
["大谷山荘","長門湯本・山口","中國",3,"音信川沿岸的長門湯本大型老舖，23 種房型，せせらぎの湯與木もれ陽の湯兩座大浴場，部分客室附露天，另設 spa otozure。停車就在館前，萩與元乃隅神社自駕途中拿來當過夜點最合適。溫泉街近年整建過，河岸步道晚上還走得動，但入夜後店家收得早。館型大、團體客多，安靜度不如小旅館，山口的替代選項本來就有限。"],
["妙見 石原荘","霧島・鹿兒島","九州",3,"霧島天降川畔，七本自家源泉且不加水不加溫，河邊露天風呂是招牌。石倉 4 室附客室露天，本館 14 室其中 4 室 2023 年改裝，建築出自竹山聖。溪谷單棟立地，館外沒有餐飲選擇，晚餐固定在館內，館前有停車位，入夜只剩水聲。與同溪谷的忘れの里雅叙苑性格相反，一個現代數寄屋一個農家聚落，同趟擇一即可。"],
["雲仙 半水盧","雲仙・長崎","九州",5,"全離れ僅 14 棟，各棟附內湯，腹地大而客數少。雲仙住宿多為大型觀光旅館，這間是少數維持隱密尺度的，價位也因此站上 30K 級。位置退開溫泉街，周邊沒有店家，入夜後的活動範圍就是館內與庭園。長崎、島原一帶要安排一次一泊二食，這裡最沒有懸念；想逛地獄地帶與街區的人要另外算車程。"],
["茶寮宗園","秋保・宮城","東北",4,"秋保溫泉的數寄屋造旅館，庭園佔地廣，客室全為和室，走東北少見的正統懷石路線。仙台市區車程約 40 分，館外生活機能有限，四周是溪谷與林地，晚餐與早餐都在館內解決。適合與市區飯店組成兩晚，一晚吃住一晚活動。設施偏傳統，重視新設備的人會不習慣，來這裡是為料理與庭園。"],
["べにや無何有","山代溫泉・石川","中部",4,"山代溫泉藥師山側，建築由竹山聖操刀，空間留白與庭園是識別點，客室數少且多附半露天風呂，館內設 spa 円庭。Relais & Châteaux 加盟。北陸的料理旅館密度高，它站在設計取向這一側；想要老派會席，加賀還有更傳統的選擇。溫泉街就在坡下，館區自成一區、入夜安靜；金澤開車約一小時，自駕日順路。"],
["かよう亭","山中溫泉・石川","中部",4,"僅 10 室，客室分散、公共空間安靜，長年走高單價低房數路線，位置在山中溫泉的山側。與同區大型旅館相比，它賣的是密度低與待客距離，不是設施豐富。館外幾乎沒有店家，要走到鶴仙溪或外湯得靠車。加賀溫泉鄉排一晚又希望完全不被打擾時用它；想逛街泡外湯就不合適。房數太少，旺季得提早動作。"],
["扉溫泉 明神館","松本・長野","中部",4,"標高 1050 公尺、國立公園內的一軒宿，經營約 90 年，立ち湯「雪月花」與露天「白龍」是招牌，館內三間餐廳分走法式、信州料理與輕食。Relais & Châteaux 加盟，另有 Green Key 環境認證。松本市區開車約 30 分，館外沒有其他選擇，也沒有外部噪音。信州要安排一晚一泊二食，周邊沒有同級對手。山路冬季須注意路況，非自駕進出相當麻煩。"],
["西村屋本館","城崎溫泉・兵庫","關西",4,"1859 年創業，17 種房型，登錄有形文化財「平田館」由名匠平田雅哉所建，館內三處內湯，外湯巡禮的六湯穿浴衣就能走到。位置在城崎溫泉街上，夜裡街上還有人走動，熱鬧但不至於吵。冬季松葉蟹會席是主力，蟹季房價與訂房難度都跳一級，非蟹季則平實許多。2024 年 4 月起兒童同行限 10 歲以上。"],
["有馬 中の坊瑞苑","有馬・兵庫","關西",4,"有馬街區內，13 種客室，金泉銀泉都有，多數房型附露天風呂，另設貸切風呂，全館禁菸。未滿 13 歲不可入住，換來的安靜是它與有馬其他大型旅館的主要差別。大阪約 60 分、神戶三宮約 30 分，關西路程最短的一泊二食就是這裡。出門就是溫泉街，白天遊客多、入夜收得早。有馬街道狹窄，停車要事先確認，鎮內另有免費接駁可用。"],
["有馬 陶泉 御所坊","有馬・兵庫","關西",3,"鎌倉時代以「湯口屋」起家，號稱有馬現存最古的旅館，金泉引湯，浴場為半露天的半混浴形式。全館視覺由綿貫宏介統一，從標示到器皿一致，走野趣與文人趣味，不做華麗待客。位置在有馬老街的坡道上，出門就是商店街，白天人多、入夜安靜。價位比中の坊瑞苑低一級，要現代舒適選瑞苑，要老屋氣味選這裡。設備舊是事實，介意的人先看房型照片。"],
["光風湯圃 べにや","蘆原溫泉・福井","中部",4,"蘆原溫泉的老舖，火災後全面重建，客室與大浴場皆為新設施，這在北陸老舖裡不常見。冬季越前蟹會席是主菜；福井的蟹旅館選項不多，新設備與蟹料理同時成立的就是這間。位置在溫泉街上，出門有店家但散步範圍有限，入夜收得早、街上安靜。非蟹季內容明顯轉淡，安排要跟著蟹期走。"],
["望洋楼","三國・福井","中部",4,"三國海岸線上的料理旅館，明治年間創業，僅七間客室，全室附露天風呂並面向日本海。位置在東尋坊一帶的漁港聚落，四周沒有溫泉街的喧鬧，開車進去就不必再出來，館前有免費平面停車。主力是三國產越前蟹，冬季以外的菜色與價位落差大。自駕走越前海岸、要專程吃蟹的那一晚才排它，房數少，蟹季須提早數月訂。"],
["乳頭 鶴の湯","仙北・秋田","東北",1,"乳頭溫泉鄉最古老的一軒宿，本陣是茅葺屋頂的長屋，房間多為地爐式和室，暖房與衛浴條件明顯落後同價位旅館。強項是乳白色的混浴大露天與另外兩處露天風呂，泉質是它無可取代的地方。位置在山林深處，沒有溫泉街可逛，停車免費，冬季道路封閉須靠接駁進出。想看秘湯原型的那一晚才用它，不能接受共用衛浴就換妙乃湯。"],
["乳頭 妙乃湯","仙北・秋田","東北",2,"乳頭溫泉鄉裡規模最小的一間，約十六間客室，金之湯與銀之湯兩種源泉並用，先達川旁的露天風呂是招牌，浴槽多為檜木與青森羅漢柏。房內有暖房，公共空間整理成和風現代的樣子，舒適度明顯高過鶴の湯。免費停車僅十餘台。同樣位在無街可逛的山中，秋田行程想住乳頭又不想犧牲基本生活條件時選它，紅葉期一房難求。"],
["会津 向瀧","會津若松・福島","東北",2,"會津東山溫泉的木造旅館，二十四間客室沿中庭排列，是日本最早登錄為有形文化財的旅館，建物本身就是主要內容。館內用自家源泉，冬季中庭點蠟燭的雪見是固定節目。溫泉街沿山谷而建，離會津若松市區開車約十五分，免費平面停車約三十台。設備老、房型全是傳統和室，衝著建築與雪景才來，其他季節說服力明顯轉弱。"],
["黒川 山みず木","南小國・熊本","九州",2,"黑川溫泉外圍山林裡的旅館，二十一間客室，其中八間附半露天風呂。溪流旁的森林露天風呂是主力，男女各一處。館址離黑川街區有一段車程，四周只有樹林沒有商店，安靜是它的價值，代價是湯巡り或外食都得開車出去，免費停車約二十五台。一晚兩人一萬五千台幣上下，以黑川的水準算實在，配自駕行程最順。"]
]},
{num:"定番五",title:"OMO 街文化基地（星野副牌）",rows:[
["OMO7 大阪","新今宮・大阪","關西",1,"2022 年開業的 OMO 旗艦館，四百三十餘間客室並設大浴場，這在同系列少見。就在新今宮站北側，出門是新世界與通天閣的串炸店群，晚餐不必另外安排，館內有中庭草坪，停車另計費。周邊是大阪最複雜的一塊街區，入夜的路況與都心飯店完全不同。適合把整晚交給街邊小吃的大阪夜，想要安靜就別選。"],
["OMO5 京都三条","京都・京都","關西",1,"2021 年開業，十層樓、一百二十二間客室，走到三条大橋約三分鐘。所在的三条一帶是京都最熱鬧的商店街與飲食圈，出門即是人潮，安靜不是它的賣點。客室緊湊、沒有大浴場，設施只做到基本。京都不住高價旅館的那一晚，位置與房價的組合比同價位商務飯店合理，適合白天全在外面、回來只睡覺的行程。"],
["OMO5 京都祇園","祇園・京都","關西",1,"2021 年底開業，僅三十六間客室，位置貼著祇園商店街與八坂神社，往花見小路是散步距離。設施與同系列其他館沒有差別，客室緊湊、無大浴場，差的完全是立地：清晨人潮進來前就能站在祇園街上，這是別的價位買不到的。缺點來自同一件事，門外是觀光核心，白天整天有人。房數少，旺季難訂。"],
["OMO3 京都東寺","東寺・京都","關西",1,"2021 年開業，一百二十間客室，近鐵東寺站步行兩分，京都車站八条口步行約十三分。輕量館型，沒有餐廳也沒有大型公共設施，是純過夜配置，館內不設停車場，自駕要另找。周邊是東寺旁的住宅與小店混合區，入夜安靜、選擇也少。京都站南側房價比站北低一級，行程重心在南半邊或隔天搭新幹線時合用。"],
["OMO5 東京大塚","大塚・東京","關東",1,"2018 年開業，一百二十五間客室，山手線大塚站步行一分，都電荒川線就在門口。大塚是老派下町商店街的性格，入夜有居酒屋而無夜店等級的吵鬧，晚餐選項多又便宜，房價長期低於同線其他站的同級飯店。客室小、沒有大浴場，純粹是東京的過夜配置。行程集中在池袋、新宿一側時，這裡進出最省事。"],
["OMO3 東京赤坂","赤坂・東京","關東",1,"2022 年開業，一百四十間客室，千代田線赤坂站步行約三分。館內沒有餐廳、公共設施也少，房間不大，用途單純：都心有飯局或工作的夜晚，用最低成本守住位置。赤坂一帶白天是辦公商圈，入夜轉為餐飲街，安靜與熱鬧只隔一條巷。要景觀或大浴場請看同系列的淺草館，這間只負責讓人走得回來。"],
["OMO3 淺草","淺草・東京","關東",1,"2023 年開業，十三層、九十八間客室，東武淺草站北口步行三分。頂樓露台正對晴空塔，館內多處看得到淺草寺，位置與視野的組合在同系列裡最強。淺草是典型觀光地立地，白天門外全是人，清晨與入夜後才安靜下來。客室偏小、館內設施接近沒有，房價多在萬元台幣內。以街食與早晨寺廟散步為主的行程最合用。"],
["OMO7 旭川","旭川・北海道","北海道",1,"由既有飯店改成的 OMO 一號店，兩百三十餘間客室，附餐廳與公共空間，並設大浴場。旭川站步行約十三分、開車五分，停車場一百餘台，一晚約一千日圓。位置在市區買物公園一帶，屬於鬧中取靜的城市街廓，拉麵店群與家具工房都在半日圈內。它本身不是出發的理由，而是層雲峽、美瑛路線前後需要一晚城市住時最穩的一間。"],
["OMO5 小樽","小樽・北海道","北海道",1,"2022 年開業，九十二間客室，由小樽市指定歷史建造物「舊小樽商工會議所」改建的南館與新建的北館兩棟組成。小樽站步行約十分，運河與堺町通都在散步範圍，比落在站前的選項更貼近夜間路線。所在是港町舊市街，白天走觀光客動線、入夜迅速安靜。小樽住一晚就夠，這間的作用是把那一晚放在最好走的位置。"],
["OMO5 熊本","熊本・熊本","九州",1,"2023 年開業，一百六十間客室，位置在下通、上通商店街旁的熊本市中心，熊本城在步行範圍內。周邊是九州數一數二密的飲食街，馬肉料理與熊本拉麵的店家多，晚餐不必開車是它最實在的價值。館內以基本設施為主，沒有大浴場。九州自駕多半把熊本當中繼點，這間讓中繼的那一晚吃得好，路線之外沒有繞路的理由。"],
["OMO7 高知","高知・高知","四國",1,"133 室的完整型 OMO，館內大浴場「トサノユ」備露天風呂，市區旅館少見。路面電車菜園場町站步行四分，ひろめ市場的藁燒鰹魚攤要再走一段，晚餐與宵夜仍在走路範圍內解決。提携停車場 103 台先到先停、不接受預約，自駕日得早點進館。四國環線在高知的那一夜，它把泡湯與餐飲一次收齊，這點勝過站前商務旅館。"],
["OMO5 沖繩那霸","那霸・沖繩","沖繩",1,"牧志站與國際通旁，2021 年開業。沖繩行程重心多在本島北部或離島，那霸只佔頭尾各一晚，這間的位置正好對應那兩晚：晚餐、公設市場、單軌都不必租車。國際通一帶入夜人潮多、店家開得晚，安靜度是明顯代價，換來的是不必移動就有得吃。要海景或度假感，仍得往恩納、名護走。"],
["OMO 關西空港","泉佐野・大阪","關西",1,"泉佐野臨空城區，2022 年開業，往關西機場一站可達。紅眼班機或早班進出時，比住市區省下往返一小時以上。周邊是 outlet 與辦公樓，入夜安靜但也幾乎沒有像樣的晚餐選擇，吃飯得在機場或先在市區解決。房價低、房型簡單，除了轉機前後那一晚沒有別的用途，這也決定了它的位置。"]
]},
{num:"定番四",title:"野乃／Dormy・共立系（自駕溫泉泊）",rows:[
["御宿 野乃 松江","松江・島根","中國",1,"全館鋪榻榻米、進門脫鞋的和風商旅，天然溫泉大浴場與平面停車場都在館內。松江站走路約十分，宍道湖與松江城半日走得完，境港開車約 40 分。站前一帶入夜安靜、餐飲收得早，想喝一攤要先算好時間。山陰自駕若把主餐放在米子的旅館，隔天松江這一晚由它承接最省力。"],
["御宿 野乃 金澤","金澤・石川","中部",1,"賣點在早餐：海鮮丼的食材與近江町市場同源，而市場走路就到。客房為和室規格，館內有天然溫泉大浴場。市場一帶白天人多，入夜店家陸續打烊，睡眠不受影響。金澤市區停車位緊張，自駕得先確認車位；純走路的行程則位置無可挑剔，同組裡它排前面就靠這一點。"],
["御宿 野乃 京都七條","京都・京都","關西",1,"京都的住宿供給多，旺季房價卻常失控。這間的作用是在那種時候同時守住位置與泡湯：京都站走路可達，館內有天然溫泉大浴場，客房走和室規格。車站周邊以商辦與旅館為主，入夜安靜，但吃的選擇平庸，晚餐得往四条或錦市場移動。房間偏小、不適合久住，當成移動日的一晚最合適。"],
["御宿 野乃 奈良","奈良・奈良","關西",1,"猿澤池與奈良町邊上，東大寺、興福寺都在步行距離，全館榻榻米配溫泉大浴場。奈良町入夜安靜到近乎沒有店家開著，晚餐要在傍晚前先安排，這是留宿奈良的共同代價。奈良過夜選項本就稀少，多數人被推去京都或大阪，這間讓留在奈良一晚變成可行方案，清晨的鹿與寺院才拿得到。"],
["御宿 野乃 富山","富山・富山","中部",1,"和室型的溫泉商旅，富山站走路可達，早餐以富山灣白蝦與鱒魚壽司為主。站前一帶平整好走，入夜安靜，餐飲密度普通，宵夜不用期待。同城另有國際連鎖，取捨很單純：要泡湯與和室選這裡，要餐廳與客房規格選另一邊。北陸自駕的中繼夜用得上，白天的重點仍在立山與黑部。"],
["御宿 野乃 大阪淀屋橋","淀屋橋・大阪","關西",1,"淀屋橋位在御堂筋沿線，往梅田與本町都只一兩站。全館榻榻米、有溫泉大浴場，在大阪市中心是少見組合。周邊是辦公街廓，入夜安靜、餐廳收得早，宵夜要往北新地或難波走，換到的是好睡的一晚。想在大阪泡湯又不想住進鬧區，這一晚就交給它。"],
["御宿 野乃 淺草","淺草・東京","關東",1,"淺草，最上階露天浴池正對晴空塔，全館榻榻米。周邊白天觀光客密度極高，入夜商店街收攤後反而安靜，吃飯與便利商店都在幾步內。東京市區能泡到溫泉的旅館極少，這是它排在這組前段的原因。房間不大、電梯尖峰要等，觀光旺季週末房價也會拉高，平日進出的行程最划算。"],
["御宿 野乃 なんば","難波・大阪","關西",1,"近鐵日本橋站步行一分，道頓堀與黑門市場都在走路圈，全館榻榻米配溫泉大浴場。難波一帶入夜熱鬧，人聲與招牌燈到深夜不停，安靜度不如淀屋橋那間，但吃的密度高出一截。以街食為主軸、睡前又想泡湯的大阪夜，這裡的位置最順。"],
["ドーミーインPREMIUM 小樽","小樽・北海道","北海道",1,"小樽運河圈，與同區老牌旅館幾乎同一立地，屋上有溫泉大浴場，宵夜提供夜鳴きそば。運河周邊白天遊客多，入夜店家收得早、街上安靜，晚餐要趁早。它的定位是同立地的較新替代：房型規格中等，但設備狀態與清潔穩定。小樽住一晚就夠，這間把那一晚的變數降到最低。"],
["ラビスタ函館ベイ","函館・北海道","北海道",1,"函館灣邊，頂樓溫泉展望浴場可看港區夜景，早餐的海鮮丼自助長期評價偏高。函館朝市與金森倉庫都在步行距離，入夜港區人少、環境安靜，用餐得配合朝市與周邊店家偏早的營業時間。共立系裡規格最高的一批，房價仍落在平價帶，缺點是旺季一房難求，行程一確定就得下訂。"],
["ラビスタ東京ベイ","豐洲・東京","關東",1,"豐洲市場旁，2020 年開業，頂樓大浴場面向東京灣。早餐同走海鮮丼路線，清晨直接走去市場也可行。周邊是新開發區與辦公樓，入夜安靜、店家稀疏，晚餐幾乎得搭車出去。位置離都心主要景點有一段距離，適合以築地、豐洲、台場為主的一天，不適合當觀光基地。"],
["ラビスタ富士河口湖","河口湖・山梨","中部",1,"河口湖畔，客房與露天浴池朝富士山方向，館齡相對新。湖畔一帶入夜幾乎沒有店家與人聲，安靜是必然，晚餐與宵夜都得靠館內或事先備妥。河口湖高價旅館不少，這間以平價價格拿到湖與山的視野，代價是房間與餐飲都只是標準水準。看得到山的日子才划算，天候不穩就沒有選它的理由。"],
["ラビスタ大雪山","層雲峽・北海道","北海道",1,"位在東川町的旭岳溫泉，不是層雲峽。溫泉自原生林自然湧出，館內為天然溫泉大浴場。旭岳纜車就在附近，夏季高山植物、秋季初雪都比山下早一個月，這個季節落差是它在道北自駕線上的主要理由。旭川開車約 60 分、札幌約 2 小時 30 分，館外幾乎沒有餐飲選擇，晚餐綁在館內。行程若走層雲峽或網走方向，位置其實接不上，排線前要先確認。"],
["ラビスタ阿寒川","阿寒・北海道","北海道",1,"釧路市阿寒町，建在阿寒川畔，溫泉自川邊湧出，除大浴場的露天風呂外另有附客室露天風呂的房型。它不在阿寒湖溫泉街上，而是退開街區獨立成一區，安靜程度與街上的大型團體旅館不是同一件事。釧路機場開車約 1 小時，道東自駕由釧路往知床順路。館外沒有餐飲，晚餐必須訂館內，這是使用它的前提。"],
["お宿 月夜のうさぎ","出雲・島根","中國",1,"出雲大社門前的和風旅館，全館鋪榻榻米，與姊妹館「いにしえの宿 佳雲」共用 2 處大浴場與 5 處貸切風呂，泡湯選擇比同規模旅館多。一畑電車出雲大社前站步行約 15 分，正門前巴士站步行約 8 分，神門通逛街範圍內，入夜店家收得早。山陰住宿密度低，出雲側能同時顧到位置與房況的選項不多。適合把出雲排成半日、隔天往松江或米子移動。"],
["浜千鳥の湯 海舟","白濱・和歌山","關西",2,"白濱町，建在岬角前端，招牌是混浴露天「浜千鳥の湯」，另有貸切風呂與附溫泉風呂的客房。同集團裡規格與價格都往上一階，但仍低於南紀同級旅館。餐食走在地食材的會席路線。位置退開白良濱鬧區，館外選擇有限，晚餐等於綁在館內。適合以白良濱、Adventure World 為主的自駕行程，把它排成收尾的那一晚。"]
]},
{num:"定番二",title:"Courtyard 萬怡",rows:[
["Courtyard 福井","福井・福井","中部",1,"2024 年北陸新幹線延伸時開業的站前新館，福井站步行可達。福井站前少數的國際連鎖，房況新是最直接的優勢。站前一帶白天有商店與飲食街，入夜收得早，安靜好睡但想吃宵夜要提前打算。冬季越前蟹行程多從福井或敦賀進出，這間適合當中繼的城市夜，其餘不必多想。"],
["Courtyard 名古屋","名古屋・愛知","中部",1,"2024 年開業，位在伏見。同價位帶的名古屋商務箱多是十年以上老店，新裝的房間與衛浴就是它唯一但有效的差異。地鐵伏見站徒步圈，到名站、榮各一兩站。伏見以辦公樓為主，入夜安靜不吵，但吃飯要往榮或名站移動。館內沒有大浴場，純過夜用，名古屋想泡湯得另外安排。"],
["Courtyard 札幌","札幌・北海道","北海道",1,"薄野圈內的西式連鎖，2023 年落成，走到拉麵橫丁與二条市場都是徒步距離。札幌市中心這類新箱不多，房間新、隔音正常，旺季價格亂跳時它的浮動幅度相對小。薄野是札幌夜生活的核心，覓食與宵夜最方便，代價是週末入夜街上吵。館內無溫泉，要泡湯得往定山溪走。"],
["Courtyard 大阪本町","本町・大阪","關西",1,"本町商業區，落成於 2024 年。地鐵本町站接御堂筋線與中央線，往梅田、難波都不用換太多車。館內無大浴場，房間是連鎖標準規格。同圈的 voco 大阪本町是它最直接的對手，兩者規格接近，挑房價低的那間即可。本町是純辦公街，入夜與週末都安靜，好睡但晚餐選擇偏少，想熱鬧得往心齋橋走一段。"],
["Courtyard 東京站前","東京・東京","關東",1,"位置型物件，東京站八重洲側徒步可達。房間是集團標準規格，不大也不新，出牌理由完全來自地址：新幹線轉乘日、清晨出發日省下的移動時間就是它的全部價值。八重洲一帶以辦公與轉乘為主，安靜好睡，但入夜店家幾乎全收，觀光為主的行程住這裡會覺得乏味，夜間活動得往銀座或日本橋移動。"],
["Courtyard 新大阪","新大阪・大阪","關西",1,"新大阪站徒步圈。關西行程的移動日用它，早班新幹線不必拖行李跨市區，這是唯一的選擇理由。新大阪一帶屬轉運區，白天人多、入夜很快安靜，餐飲以連鎖與居酒屋為主，密度與變化都薄。行程若有一整晚可用，該把這晚放回市中心。房間中規中矩，無大浴場。"],
["Courtyard 東京銀座","銀座・東京","關東",1,"銀座圈的老箱改裝而來，地址一級，房間年紀藏不住，取捨很清楚：拿位置換設備新舊。銀座、築地、東京站都在徒步或一站內，逛街與餐飲行程住這裡最省時間。周邊入夜商店收得早，街區反而安靜，不必擔心吵。要求房間寬敞或新裝潢的行程，同價位另有更好選項。"],
["Courtyard 白馬","白馬・長野","中部",2,"白馬村的西式度假箱，雪季用它。同區多是民宿與老山莊，這裡的房型與清潔水準穩定，兩人滑雪或看北阿爾卑斯山景時可省去踩雷風險。村內腹地分散，館外用餐與採買都得開車，夜裡安靜到近乎無聲。非雪季白馬能玩的密度掉得很快，那時它就沒有出牌理由。以自駕前往為主。"]
]},
{num:"定番六",title:"在地連鎖精選",rows:[
["ソラリア西鉄ホテル京都プレミア","河原町・京都","關西",1,"西鐵在京都的旗艦，河原町三条鴨川畔。早餐評價在京都同價位連鎖中屬前段，鴨川側房型看得到河景，這兩點是它排這組第一的原因。先斗町、錦市場都在徒步圈，吃飯逛街不必移動，代價是週末與旺季鴨川沿線人聲雜，臨街房型要留意。旺季房價上抬明顯，淡季訂才划算。"],
["西鉄ホテルクルーム博多","博多・福岡","九州",1,"博多站筑紫口徒步 3 分，館內有大浴場。車站近加上泡澡這組條件，在博多同價位帶並不常見，這是它在這組靠前的理由。房間是標準商務尺寸，不寬敞。筑紫口側比博多口安靜，夜裡不吵，代價是覓食得走到站的另一側或地下街。適合九州行程的轉車夜與出差夜，不要指望它撐起一整晚。"],
["西鉄ホテルクルーム名古屋","名古屋・愛知","中部",1,"2019 年開業，名古屋站徒步 5 分，設有大浴場。名站周邊的商務連鎖大多沒有浴場，它靠這一項在同價位帶拉開距離。房間偏小是明確短板。名站一帶餐飲與地下街密度高，覓食方便，入夜人潮散得快，不至於吵。名古屋只住一晚或當轉運點時用它，行程重心若在榮，位置就偏了。"],
["ソラリア西鉄ホテル札幌","札幌・北海道","北海道",1,"2021 年 2 月開業，318 室，狸小路商店街上方。館內設大浴場，內湯與外湯皆有，這在札幌市中心同價位帶並不常見。地下鐵さっぽろ站徒步 2 分、JR 札幌站南口 5 分，薄野與大通都在走路範圍，晚餐選擇密集。停車僅 22 位且先到先停、不接受預約，自駕日要先算好周邊車位。旺季房價失控時的保底選項。"],
["ベッセルホテルカンパーナ沖縄","北谷・沖繩","沖繩",1,"324 室，十樓展望大浴場附三溫暖，停車 120 位免費。じゃらんアワード 2025 沖繩區塊 301 室以上組拿下接客服務部門第 2 名、早餐部門第 3 名，這是它在沖繩平價選項裡排前面的依據。美國村就在門外，逛街與晚餐不必移動，入夜後店家收得比市區早。那霸機場車程約 40 分，旺季塞車嚴重，沒有車的行程不建議。"],
["ベッセルホテルカンパーナ京都五条","五条・京都","關西",1,"2013 年開業，約 238 室，地下鐵五条站三號出口徒步 1 分。二樓男女大浴場各附三溫暖，早餐是京都家常菜配現烤麵包的和洋自助。機械式停車 32 位，一泊 1500 日圓，車高限 1.55 公尺，休旅車先問。位置退開河原町的喧鬧，安靜而仍走得到清水寺方向，京都站也近；不開車的行程，同價位有地段更好的選擇。"],
["都ホテル 京都八条","京都・京都","關西",1,"1975 年以新・都ホテル開業的近鐵系大箱，988 室，2023 年 8 月完成全面翻新。JR 與近鐵京都站徒步 2 分，就在八条口正面。房量大代表旺季仍抓得到房，與 Granvia 同屬車站型而價位低一階，那邊訂不到時直接接手。停車 93 位，一泊 2000 日圓。八条口側店家密度低於烏丸口，晚餐得走過去或搭一站。"],
["東急ステイ 京都阪井座（四条河原町）","河原町・京都","關西",1,"2021 年開業，新京極商店街內，阪急京都河原町站徒步 1 分，祇園四条站約 6 分。房內配洗衣乾衣機與微波爐，這是東急ステイ的核心規格，京都連住四五晚時作用最明顯。館內無停車場，只代為介紹周邊投幣式車位，自駕要另算成本。商店街入夜收得早，本身不吵。只住兩三晚的話，它與同價位商務箱沒有差別。"],
["東急ステイ 銀座","銀座・東京","關東",1,"2016 年 3 月開業，191 室，東銀座站徒步 1 分、銀座站 3 分。房內有洗衣設備，單人房 15 ㎡、雙床房 25 ㎡，東京連住五晚以上又想把行李帶輕的行程，它的作用才會浮現，這也是它在這組的唯一定位。銀座地段，徒步範圍餐飲密集，商業區入夜反而安靜。短住行程請直接看別的選項，這個價格並不便宜。"],
["羽田エクセルホテル東急","羽田・東京","關東",1,"2004 年 12 月隨第 2 航廈啟用開業，386 室，2020 年完成客室改裝。羽田第 2 航廈出發樓層直結，這是它唯一也充分的理由：紅眼班機、清晨起飛或深夜落地時，移動距離幾乎為零。航廈內餐飲商店走幾分鐘就到，出了航廈就沒有別的選擇。房間偏小，價格對應的規格不算高。不趕班機的夜晚住這裡，等於白白遠離市區。"],
["ザ・プリンス箱根芦ノ湖","箱根・神奈川","關東",2,"1978 年開業，2019 年完成大規模改裝，135 室，位於蘆之湖東岸。館內是箱根十七湯之一的蛸川溫泉，天然溫泉大浴場含露天，箱根同價位帶少見這種湖岸腹地。屋外停車 282 位，開車最順；小田原站有免費接駁，須事前預約。館外幾乎沒有選擇，晚餐綁在館內，餐飲與服務屬集團標準水準。冬季湖區入夜相當冷。"],
["グランドプリンスホテル新高輪","高輪・東京","關東",1,"村野藤吾設計的 1982 年建築，908 室全房型配陽台，腹地內有兩萬平方公尺的日本庭園，品川站高輪口徒步 5 分。改裝後房價在同規格中仍偏低，這是它排在這組的原因。位置在市區卻退開車站主動線，本身安靜，但大箱式運作、宴會與團體客多。當東京進出的第一晚或最後一晚很順，庭園也讓等退房的時間好過一點。"],
["★ 三井ガーデンホテル銀座五丁目","銀座・東京","關東",1,"2019 年 9 月開業，338 室，東京地鐵東銀座站徒步 1 分、銀座站 4 分。二樓設大浴場，牆面以馬賽克磚做成壁畫，這在銀座同價位帶是明確加分項。房間尺寸在東京同級也算寬敞，兩點合起來是它排在這組中段的理由。多線交會，便利商店與餐飲都在門外。定位仍是銀座過夜點，不構成來東京的理由。"],
["ホテルフォルツァ博多駅筑紫口","博多・福岡","九州",1,"博多站筑紫口旁，本館 235 室、徒步 1 分；2017 年 8 月增設的第二棟 160 室，房型 18 ㎡，兩棟水準大致相同。房間小、設備普通，出牌理由只有位置與價格兩項，這也是它排位偏後的原因。車站周邊便利商店與餐飲整晚都開，夜間人聲不少。期待值請設在純過夜，想住得舒服要往上一個價位找。"],
["ホテルフォルツァ長崎","長崎・長崎","九州",1,"2014 年 9 月開業，175 室，直結浜町拱廊商店街，路面電車觀光通電停徒步 1 分，思案橋與新地中華街各約 3 分，是長崎市區觀光密度最高的一段。房型 16 ㎡起，雙床房 25 ㎡上下，連鎖規格普通，選它的依據就是這個地址。館內無停車場，只代訂合作付費車位。行程以出島、稻佐山夜景為主軸時，這裡最省移動時間。"],
["ホテルフォルツァ名古屋栄","名古屋・愛知","中部",1,"2020 年 3 月開業，195 室，雙床房 24.5 到 29.5 ㎡，尺寸在同價位帶其實不差。問題出在位置：名稱掛榮，實際離榮站徒步約 13 分，比較靠近矢場町與大須一側，逛街方便但回程不算近。館內無停車場，只介紹周邊合作車位。沒有大浴場，設施精簡，行程重心落在大須或矢場町時才選它，這是它排位偏後的原因。"],
["★ ベッセルイン高田馬場駅前","高田馬場・東京","關東",1,"2023 年 3 月開業，160 室，高田馬場站徒步 3 分，東西線 4 號出口直結，往新宿一站。早餐主打各地食材，鮭魚卵與鮪魚每日供應，另有星鰻飯等日替菜色，是 Vessel 系的強項，也是它排前面的理由。學生街入夜熱鬧，站前偏吵。館內無大浴場，僅兩間附霧氣三溫暖的特別房，房間偏小是明確短板。"]
]}
];

const BUILT_FUT=new Set(),BUILT_WAT=new Set();
GROUPED.concat(INDIE).forEach(h=>{if(h[8]==="◎")BUILT_FUT.add(norm(h[1]));else if(h[8]==="⏳")BUILT_WAT.add(norm(h[1]));});
SLOTS.forEach(s=>s.rows.forEach(r=>{if(r[0].startsWith("◎"))BUILT_FUT.add(norm(r[0]));else if(r[0].startsWith("⏳"))BUILT_WAT.add(norm(r[0]));}));

function gmap(name,loc){
  const clean=norm(name).replace(/（.*?）/g," ").replace(/\(.*?\)/g," ").trim();
  const city=(loc.split("・")[0]||"").replace(/\s*他$/,"");
  return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(clean+" "+city);
}
function bandOf(rank,bands){return bands.find(b=>rank>=b.from&&rank<=b.to);}
function actsHTML(name){
  const n=norm(name);
  const inF=fut.has(n)||(BUILT_FUT.has(n)&&!futEx.has(n));
  const inW=wat.has(n)||(BUILT_WAT.has(n)&&!watEx.has(n));
  return `<div class="acts">
    <button class="bmk${inF?" in":""}" data-n="${n}" aria-label="加入將來" title="${inF?"移出將來":"加入將來"}">${BM_ICON}</button>
    <button class="mag${inW?" in":""}" data-n="${n}" aria-label="加入觀察" title="${inW?"移出觀察":"加入觀察"}">${MAG_ICON}</button>
  </div>`;
}
function rowHTML(h,bands,indie,trip){
  const [rank,name,loc,region,group,series,price,note,mark]=h;
  const b=bandOf(rank,bands);
  const tag=indie?(trip?`<span class="lev">獨立</span>`:""):`<span class="lev${STATUS[group]?" elite":""}">${STATUS[group]||group}</span>`;
  return `<div class="row" style="--band-color:${b.color}">
    <div class="rank">${rank}<small>${b.key}帶</small></div>
    <div class="rmain">
      <div class="rtitle">
        <a class="rname" href="${gmap(name,loc)}" target="_blank" rel="noopener">${norm(name)}</a>
        ${tag}
        ${mark==="★"?`<span class="stayed">已體驗</span>`:""}
        <span class="price" data-tip="${PRICE_TIP[price]}">${PRICE_MARK[price]}</span>
      </div>
      <div class="rloc">${loc}</div>
      <div class="rnote">${note}</div>
    </div>
    ${actsHTML(name)}
  </div>`;
}
function filterRows(list){
  const q=state.q.trim().toLowerCase();
  return list.filter(h=>{
    if(!inSet(state.regions,h[3]))return false;
    if(!inSet(state.groups,h[4]))return false;
    if(!inSet(state.seriesSel,h[5]))return false;
    if(!inSet(state.prices,h[6]))return false;
    if(q&&!(h[1]+h[2]+h[4]+h[5]+h[7]).toLowerCase().includes(q))return false;
    return true;
  });
}
function renderRank(list,bands,total,label){
  $("count").textContent=`顯示 ${list.length} ／ ${total} 間`;
  if(!list.length)return `<div class="empty">沒有符合的飯店，換個條件試試。</div>`;
  let html="";
  bands.forEach(b=>{
    const seg=list.filter(h=>h[0]>=b.from&&h[0]<=b.to);
    if(!seg.length)return;
    html+=`<div class="band-head"><span class="tag" style="background:${b.color}">${b.label}</span><span class="desc">${b.desc}・${seg.length} 間</span></div>`;
    seg.forEach(h=>html+=rowHTML(h,bands,label==="ind"));
  });
  return html;
}
function slotRowHTML(r,idx){
  const stay=r[0].startsWith("★");
  return `<div class="slot-row">
    <div class="slot-rank">${idx}</div>
    <div class="rmain">
      <div class="rtitle"><a class="rname" href="${gmap(r[0],r[1])}" target="_blank" rel="noopener">${norm(r[0])}</a>${stay?`<span class="stayed">已體驗</span>`:""}<span class="price" data-tip="${PRICE_TIP[r[3]]}">${PRICE_MARK[r[3]]}</span></div><div class="rloc">${r[1]}</div>
      <div class="rnote">${r[4]}</div>
    </div>
    ${actsHTML(r[0])}
  </div>`;
}
function slotTripHTML(r){
  const stay=r[0].startsWith("★");
  return `<div class="row" style="--band-color:var(--band-c)">
    <div class="rank stay" style="color:var(--ink-faint);font-size:13px;">定番</div>
    <div class="rmain">
      <div class="rtitle"><a class="rname" href="${gmap(r[0],r[1])}" target="_blank" rel="noopener">${norm(r[0])}</a><span class="lev">定番</span>${stay?`<span class="stayed">已體驗</span>`:""}<span class="price" data-tip="${PRICE_TIP[r[3]]}">${PRICE_MARK[r[3]]}</span></div><div class="rloc">${r[1]}</div>
      <div class="rnote">${r[4]}</div>
    </div>
    ${actsHTML(r[0])}
  </div>`;
}
function renderSlots(){
  const q=state.q.trim().toLowerCase();
  let html="";let total=0;
  SLOTS.forEach(s=>{
    const rows=s.rows.filter(r=>{
      if(!inSet(state.regions,r[2]))return false;
      if(!inSet(state.prices,r[3]))return false;
      if(q&&!(r[0]+r[1]+r[4]).toLowerCase().includes(q))return false;
      return true;
    });
    if(!rows.length)return;
    total+=rows.length;
    html+=`<section class="slot-section">
      <div class="slot-title"><span class="num">${s.num}</span>${s.title}<span class="slot-count">${rows.length} 間</span></div>
      ${rows.map(r=>slotRowHTML(r,s.rows.indexOf(r)+1)).join("")}
    </section>`;
  });
  $("count").textContent=`定番：${SLOTS.length} 組・${total} 間`;
  return html||`<div class="empty">沒有符合的定番。</div>`;
}
function tripList(kind){
  const seen=new Map();
  const addRow=n=>{
    if(seen.has(n))return;
    const g=GROUPED.find(h=>norm(h[1])===n);
    if(g){seen.set(n,{type:"g",row:g});return;}
    const i=INDIE.find(h=>norm(h[1])===n);
    if(i){seen.set(n,{type:"i",row:i});return;}
    let srow=null;SLOTS.forEach(s=>s.rows.forEach(r=>{if(norm(r[0])===n)srow=r;}));
    if(srow)seen.set(n,{type:"s",row:srow});
    else seen.set(n,{type:"x",n});
  };
  const ex=kind==="future"?futEx:watEx;
  (kind==="future"?BUILT_FUT:BUILT_WAT).forEach(n=>{if(!ex.has(n))addRow(n);});
  (kind==="future"?fut:wat).forEach(addRow);
  return [...seen.values()];
}
function renderTrip(){
  const q=state.q.trim().toLowerCase();
  if(state.trip!=="past"){
    const kind=state.trip;
    const label=kind==="future"?"將來":"觀察";
    const items=tripList(kind).filter(it=>{
      const reg=it.type==="g"||it.type==="i"?it.row[3]:it.type==="s"?it.row[2]:"";
      if(!inSet(state.regions,reg))return false;
      const hay=it.type==="x"?it.n:(it.type==="s"?it.row[0]+it.row[1]+it.row[4]:it.row[1]+it.row[2]+it.row[7]);
      if(q&&!hay.toLowerCase().includes(q))return false;
      return true;
    });
    $("count").textContent=`${label}：${items.length} 間`;
    if(!items.length)return `<div class="empty">${kind==="future"?"還沒有將來行程，按卡片右上的書籤鈕加入。":"還沒有觀察名單，按卡片右上的放大鏡鈕加入。"}</div>`;
    let html="";
    items.forEach(it=>{
      if(it.type==="g")html+=rowHTML(it.row,BANDS_G,false,true);
      else if(it.type==="i")html+=rowHTML(it.row,BANDS_I,true,true);
      else if(it.type==="s")html+=slotTripHTML(it.row);
      else html+=`<div class="row"><div class="rank stay"></div><div class="rmain"><div class="rtitle"><span class="rname">${it.n}</span></div></div>${actsHTML(it.n)}</div>`;
    });
    return html;
  }
  /* past */
  const list=STAYS.filter(s=>{
    if(!inSet(state.regions,s[2]))return false;
    if(q&&!(s[0]+s[1]+s[4]).toLowerCase().includes(q))return false;
    return true;
  }).slice().sort((a,b)=>(SCORE_VAL[b[3]]||0)-(SCORE_VAL[a[3]]||0));
  $("count").textContent=`過去：${list.length} ／ ${STAYS.length} 間`;
  if(!list.length)return `<div class="empty">沒有符合的住宿。</div>`;
  const scoreColor=s=>{const v=SCORE_VAL[s]||0;return v>=5?"var(--band-s)":v>=4?"var(--band-a)":v>=3.5?"var(--band-b)":"var(--band-c)";};
  const xref=name=>{
    const n=ALIAS[name]||name;
    const g=GROUPED.find(h=>norm(h[1])===norm(n));
    if(g)return `<span class="xref">集團 #${g[0]}</span>`;
    const i=INDIE.find(h=>norm(h[1])===norm(n));
    if(i)return `<span class="xref">獨立 #${i[0]}</span>`;
    let hit=false;SLOTS.forEach(s=>s.rows.forEach(r=>{if(norm(r[0])===norm(n))hit=true;}));
    return hit?`<span class="xref">定番</span>`:"";
  };
  let html=`<div class="band-head"><span class="tag" style="background:var(--gold)">過去</span><span class="desc">實際投宿的記錄・五分為個人最高，陸續增補</span></div>`;
  list.forEach(s=>{
    const [name,loc,region,score,comment]=s;
    html+=`<div class="row" style="--band-color:${scoreColor(score)}">
      <div class="rank stay" style="color:${scoreColor(score)}">${score}</div>
      <div class="rmain">
        <div class="rtitle"><a class="rname" href="${gmap(name,loc)}" target="_blank" rel="noopener">${name}</a>${xref(name)}</div><div class="rloc">${loc}</div>
        <div class="rnote">${comment}</div>
      </div>
      ${actsHTML(name)}
    </div>`;
  });
  return html;
}
function renderRegion(){
  let total=0,html="";
  const regs=REGIONS.slice(1).filter(r=>inSet(state.regions,r));
  regs.forEach(r=>{
    const g=filterRows(GROUPED).filter(h=>h[3]===r).sort((a,b)=>a[0]-b[0]);
    const i=filterRows(INDIE).filter(h=>h[3]===r).sort((a,b)=>a[0]-b[0]);
    const q=state.q.trim().toLowerCase();
    const sl=[];
    SLOTS.forEach(s=>s.rows.forEach(row=>{
      if(row[2]!==r)return;
      if(!inSet(state.prices,row[3]))return;
      if(q&&!(row[0]+row[1]+row[4]).toLowerCase().includes(q))return;
      sl.push(row);
    }));
    const n=g.length+i.length+sl.length;
    if(!n)return;
    total+=n;
    html+=`<div class="region-head">${PIN}<span>${r}</span><span class="desc">${n} 間</span></div>`;
    if(g.length){html+=`<div class="sec-head"><b>集 團</b>${g.length} 間</div>`;g.forEach(h=>html+=rowHTML(h,BANDS_G,false));}
    if(i.length){html+=`<div class="sec-head"><b>獨 立</b>${i.length} 間</div>`;i.forEach(h=>html+=rowHTML(h,BANDS_I,true));}
    if(sl.length){html+=`<div class="sec-head"><b>定 番</b>${sl.length} 間</div>`;sl.forEach(row=>html+=slotRowHTML(row,"・"));}
  });
  $("count").textContent=`顯示 ${total} 間`;
  return html||`<div class="empty">沒有符合的飯店。</div>`;
}
function anyFilter(){return state.regions.size>0||state.groups.size>0||state.seriesSel.size>0||state.prices.size>0||!!state.q;}

/* ---------- 多選 dropdown 濾網 ---------- */
let openDD=null;
function regionOpts(){
  const counts={};
  const sel=state.view==="sel";
  const src=state.view==="region"?GROUPED.concat(INDIE):
    state.sub==="grp"?GROUPED:state.sub==="ind"?INDIE:null;
  if(src)src.forEach(h=>counts[h[3]]=(counts[h[3]]||0)+1);
  else if(sel&&state.sub==="slot")SLOTS.forEach(s=>s.rows.forEach(r=>counts[r[2]]=(counts[r[2]]||0)+1));
  else STAYS.forEach(s=>counts[s[2]]=(counts[s[2]]||0)+1);
  return REGIONS.slice(1).map(r=>({v:r,t:r,c:counts[r]||0}));
}
function ddDefs(){
  const sel=state.view==="sel";
  const defs=[{id:"region",label:"地區",set:state.regions,opts:regionOpts()}];
  const showGrp=(state.view==="region")||(sel&&state.sub==="grp");
  const showSer=(state.view==="region")||(sel&&(state.sub==="grp"||state.sub==="ind"));
  const showPrice=(state.view==="region")||(sel&&state.sub!=="trip");
  if(showGrp)defs.push({id:"group",label:"集團",set:state.groups,opts:[...new Set(GROUPED.map(h=>h[4]))].map(g=>({v:g,t:g}))});
  if(showSer){
    const base=sel&&state.sub==="ind"?INDIE:state.view==="region"?GROUPED.concat(INDIE):GROUPED;
    const pool=state.groups.size?base.filter(h=>state.groups.has(h[4])):base;
    defs.push({id:"series",label:"系列",set:state.seriesSel,opts:[...new Set(pool.map(h=>h[5]))].sort((a,b)=>a.localeCompare(b,"ja")).map(s=>({v:s,t:s}))});
  }
  if(showPrice)defs.push({id:"price",label:"價格",set:state.prices,opts:[1,2,3,4,5].map(p=>({v:p,t:PRICE_MARK[p]}))});
  return defs;
}
function renderDD(){
  const defs=ddDefs();
  $("ddRow").innerHTML=defs.map(d=>`<div class="dd">
    <button class="dd-btn${d.set.size?" on":""}${openDD===d.id?" open":""}" data-t="${d.id}" aria-haspopup="listbox" aria-expanded="${openDD===d.id}">${d.label}${d.set.size?`・${d.set.size}`:""}<span class="car"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9.5l6 6 6-6"/></svg></span></button>
    <div class="dd-panel${openDD===d.id?"":" hidden"}">${d.opts.map(o=>
      `<div class="dd-opt${d.set.has(o.v)?" sel":""}" data-dd="${d.id}" data-v="${o.v}"><span class="bx">${d.set.has(o.v)?"✓":""}</span>${o.t}${o.c!==undefined?`<span class="cnt">${o.c}</span>`:""}</div>`).join("")}</div>
  </div>`).join("");
  document.querySelectorAll(".dd-btn").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    openDD=openDD===b.dataset.t?null:b.dataset.t;
    renderDD();
  }));
  document.querySelectorAll(".dd-panel").forEach(p=>p.addEventListener("click",e=>e.stopPropagation()));
  document.querySelectorAll(".dd-opt").forEach(o=>o.addEventListener("click",e=>{
    e.stopPropagation();
    const id=o.dataset.dd;
    const v=id==="price"?+o.dataset.v:o.dataset.v;
    const set=id==="region"?state.regions:id==="group"?state.groups:id==="series"?state.seriesSel:state.prices;
    set.has(v)?set.delete(v):set.add(v);
    if(id==="group")state.seriesSel.clear();
    render();
  }));
}
function renderTags(){
  const tags=[];
  state.regions.forEach(v=>tags.push({set:state.regions,v,t:v}));
  state.groups.forEach(v=>tags.push({set:state.groups,v,t:STATUS[v]||v}));
  state.seriesSel.forEach(v=>tags.push({set:state.seriesSel,v,t:v}));
  state.prices.forEach(v=>tags.push({set:state.prices,v,t:PRICE_MARK[v]}));
  let html=tags.map((tg,i)=>`<button class="ftag" data-i="${i}" aria-label="移除條件 ${tg.t}">${tg.t}<span class="x">×</span></button>`).join("");
  if(anyFilter())html+=`<button id="clearBtn">Clear</button>`;
  $("ftags").innerHTML=html;
  document.querySelectorAll(".ftag").forEach(b=>b.addEventListener("click",()=>{
    const tg=tags[+b.dataset.i];tg.set.delete(tg.v);render();
  }));
  const cb=$("clearBtn");
  if(cb)cb.addEventListener("click",()=>{
    state.regions.clear();state.groups.clear();state.seriesSel.clear();state.prices.clear();state.q="";
    $("search").value="";render();
  });
}
document.addEventListener("click",()=>{if(openDD){openDD=null;renderDD();}});

function render(){
  const sel=state.view==="sel";
  ["s-grp","s-ind","s-slot","s-trip"].forEach(id=>$(id).classList.toggle("hidden",!sel));
  const tripOn=sel&&state.sub==="trip";
  $("tripSep").classList.toggle("hidden",!tripOn);
  $("t-future").classList.toggle("hidden",!tripOn);
  $("t-past").classList.toggle("hidden",!tripOn);
  $("t-watch").classList.toggle("hidden",!tripOn);
  renderDD();
  renderTags();
  let html;
  if(!sel)html=renderRegion();
  else if(state.sub==="grp")html=renderRank(filterRows(GROUPED),BANDS_G,GROUPED.length,"grp");
  else if(state.sub==="ind")html=renderRank(filterRows(INDIE),BANDS_I,INDIE.length,"ind");
  else if(state.sub==="slot")html=renderSlots();
  else html=renderTrip();
  $("content").innerHTML=html;
  bindActs();
}
function bindActs(){
  document.querySelectorAll(".bmk").forEach(b=>{
    b.addEventListener("click",()=>{
      const n=b.dataset.n;
      const on=fut.has(n)||(BUILT_FUT.has(n)&&!futEx.has(n));
      if(on){fut.delete(n);if(BUILT_FUT.has(n))futEx.add(n);}
      else{fut.add(n);futEx.delete(n);}
      saveSets();render();
    });
  });
  document.querySelectorAll(".mag").forEach(b=>{
    b.addEventListener("click",()=>{
      const n=b.dataset.n;
      const on=wat.has(n)||(BUILT_WAT.has(n)&&!watEx.has(n));
      if(on){wat.delete(n);if(BUILT_WAT.has(n))watEx.add(n);}
      else{wat.add(n);watEx.delete(n);}
      saveSets();render();
    });
  });
}
function setView(v){state.view=v;$("v-sel").classList.toggle("on",v==="sel");$("v-region").classList.toggle("on",v==="region");openDD=null;render();}
function setSub(s){state.sub=s;["grp","ind","slot","trip"].forEach(x=>$("s-"+x).classList.toggle("on",x===s));state.groups.clear();state.seriesSel.clear();openDD=null;render();}
function setTrip(t){state.trip=t;["future","past","watch"].forEach(x=>$("t-"+x).classList.toggle("on",x===t));render();}
$("v-sel").addEventListener("click",()=>setView("sel"));
$("v-region").addEventListener("click",()=>setView("region"));
$("s-grp").addEventListener("click",()=>setSub("grp"));
$("s-ind").addEventListener("click",()=>setSub("ind"));
$("s-slot").addEventListener("click",()=>setSub("slot"));
$("s-trip").addEventListener("click",()=>setSub("trip"));
$("t-future").addEventListener("click",()=>setTrip("future"));
$("t-past").addEventListener("click",()=>setTrip("past"));
$("t-watch").addEventListener("click",()=>setTrip("watch"));
$("search").addEventListener("input",e=>{state.q=e.target.value;render();});

render();
</script>
</body>
</html>
